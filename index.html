<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gloria Victis — Guild Hub</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root{
--bg0:#1e1e1e;--bg1:#252525;--bg2:#2a2a2a;--bg3:#333;--bgi:#1a1a1a;--bgh:#2f2f2f;
--bd:#363636;--bd2:#444;
--t1:#dcddde;--t2:#999;--tm:#666;--tf:#4a4a4a;
--ac:#7f6df2;--acd:#6c5ce7;--acg:rgba(127,109,242,.12);--acs:rgba(127,109,242,.22);
--red:#e5534b;--redd:rgba(229,83,75,.12);--grn:#56d364;--grnd:rgba(86,211,100,.12);
--blu:#58a6ff;--blud:rgba(88,166,255,.12);--org:#d29922;--orgd:rgba(210,153,34,.12);
--yl:#e3b341;--yld:rgba(227,179,65,.12);--pk:#d2a8ff;--pkd:rgba(210,168,255,.12);
--cn:#39d4d4;--cnd:rgba(57,212,212,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg0);color:var(--t1);font-family:'Inter',-apple-system,sans-serif;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
#root{height:100%}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:10px}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Layout */
#app{display:flex;height:100%;min-height:0;overflow:hidden}
#sidebar{width:230px;min-width:230px;background:var(--bg1);border-right:1px solid var(--bd);display:flex;flex-direction:column;transition:width .2s, transform .25s;overflow:hidden}
#sidebar.map-wide{width:320px;min-width:320px}
#sidebar.hide{transform:translateX(-240px);position:absolute;z-index:50;height:100%}
#main{flex:1;min-height:0;overflow-y:auto;padding:20px 28px;background:var(--bg0)}#main.map-mode{padding:0!important;overflow:hidden!important;height:100vh!important;width:100%!important;max-height:100vh!important;background:#314b62!important;position:relative!important;box-sizing:border-box!important;}

/* Tool Switcher */
.tool-sw{padding:6px 8px;border-bottom:1px solid var(--bd);display:flex;flex-direction:column;gap:1px}
.tool-btn{padding:6px 10px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;color:var(--tm);background:transparent;border:1px solid transparent;transition:all .12s;white-space:nowrap;display:flex;align-items:center;gap:8px}
.tool-btn .tool-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.tool-btn .tool-label{flex:1}
.tool-btn .tool-badge{font-size:9px;opacity:.5;margin-left:auto}
.tool-btn:hover{color:var(--t2);background:var(--bgh)}.tool-btn.a{color:var(--ac);background:var(--acg);border-color:rgba(127,109,242,.2);font-weight:600}
.tool-btn-locked{opacity:.5}

/* Sidebar nav */
.ns{padding:4px 10px;margin-top:4px}.nst{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--tm);padding:0 8px;margin-bottom:2px;font-weight:600}
.ni{display:flex;align-items:center;gap:8px;padding:4px 8px;cursor:pointer;color:var(--t2);font-size:12px;border-radius:4px;margin:1px 0;transition:all .12s;user-select:none}
.ni:hover{color:var(--t1);background:var(--bgh)}.ni.a{color:var(--t1);background:var(--acg)}
.ni .cnt{margin-left:auto;font-size:10px;color:var(--tm);background:var(--bgi);padding:1px 5px;border-radius:3px}

/* Map legend in sidebar */
/* ── Map Sidebar ─────────────────────────────────────── */
.map-sb{display:flex;flex-direction:column;height:100%;overflow:hidden;min-height:0}
.map-sb-header{padding:10px 10px 6px;border-bottom:1px solid var(--bd);flex-shrink:0}
.map-sb-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ac);margin-bottom:8px}
.map-sb-search{display:flex;align-items:center;gap:5px;background:var(--bgi);border:1px solid var(--bd);border-radius:4px;padding:0 8px;margin-bottom:7px}
.map-sb-search:focus-within{border-color:var(--ac);box-shadow:0 0 0 2px var(--acg)}
.map-sb-search input{border:none;background:transparent;color:var(--t1);padding:5px 0;font-size:12px;flex:1;outline:none;font-family:inherit}
.map-sb-search input::placeholder{color:var(--tm)}
.map-sb-search-icon{font-size:11px;color:var(--tm)}
.map-sb-search-clear{background:none;border:none;color:var(--tm);cursor:pointer;font-size:11px;padding:0;line-height:1}
.map-sb-search-clear:hover{color:var(--t1)}
.map-sb-btns{display:flex;gap:4px}
.map-sb-btn{flex:1;padding:4px 0;font-size:10px;font-weight:600;border-radius:3px;border:1px solid var(--bd);background:transparent;color:var(--t2);cursor:pointer;transition:all .12s;font-family:inherit;text-transform:uppercase;letter-spacing:.04em}
.map-sb-btn:hover{color:var(--t1);background:var(--bgh);border-color:var(--bd2)}

/* Location list body */
.map-sb-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 8px;min-height:0}

/* Category group */
.map-loc-group{margin-bottom:10px}
.map-loc-group-header{display:flex;align-items:center;gap:7px;padding:5px 4px 5px;cursor:pointer;user-select:none;border-radius:4px;transition:background .1s}
.map-loc-group-header:hover{background:var(--bgh)}
.map-loc-group-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.map-loc-group-name{flex:1;font-size:11px;font-weight:700;color:var(--ac);text-transform:uppercase;letter-spacing:.07em}
.map-loc-group-meta{display:flex;align-items:center;gap:6px}
.map-loc-hide-btn{font-size:10px;color:var(--tm);background:none;border:none;cursor:pointer;padding:0;font-family:inherit;transition:color .1s}
.map-loc-hide-btn:hover{color:var(--t1)}
.map-loc-count{font-size:10px;color:var(--tm)}
.map-loc-arrow{font-size:9px;color:var(--tm);transition:transform .15s}
.map-loc-group.collapsed .map-loc-arrow{transform:rotate(-90deg)}
.map-loc-group.off .map-loc-group-name{opacity:.4}
.map-loc-group.off .map-loc-group-dot{filter:grayscale(1);opacity:.4}

/* Location cards — single column full width */
.map-loc-cards{display:flex;flex-direction:column;gap:4px;padding:2px 0 6px 10px}
.map-loc-card{background:var(--bg2);border:1px solid var(--bd);border-radius:5px;padding:7px 28px 7px 10px;cursor:pointer;transition:all .13s;position:relative;min-width:0}
.map-loc-card:hover{border-color:var(--bd2);background:var(--bgh)}
.map-loc-card.selected{border-color:var(--ac);background:var(--acg)}
.map-loc-card-name{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.map-loc-card-sub{font-size:10px;color:var(--tm);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.map-loc-card-tags{display:flex;flex-wrap:wrap;gap:2px}
.map-loc-tag{font-size:9px;font-weight:500;padding:1px 5px;border-radius:3px;white-space:nowrap}
.map-loc-fly{position:absolute;top:50%;right:6px;transform:translateY(-50%);width:18px;height:18px;border-radius:50%;border:1px solid var(--bd);background:var(--bg1);display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer;opacity:0;transition:opacity .12s;color:var(--t2);line-height:1}
.map-loc-card:hover .map-loc-fly{opacity:1}
.map-loc-fly:hover{background:var(--acg);border-color:var(--ac);color:var(--ac)}

/* Marker type sub-groups */
.map-loc-type-sections{padding-bottom:4px}
.map-loc-type-group{margin-bottom:2px}
.map-loc-type-group.off .map-loc-cards{opacity:.3;pointer-events:none}
.map-loc-type-group.collapsed .map-loc-cards{display:none}
.map-loc-type-header{display:flex;align-items:center;gap:6px;padding:4px 6px 4px 8px;cursor:pointer;border-radius:3px;transition:background .1s}
.map-loc-type-header:hover{background:var(--bgh)}
.map-loc-type-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.map-loc-type-name{flex:1;font-size:11px;color:var(--t2);font-weight:500}
.map-loc-type-header:hover .map-loc-type-name{color:var(--t1)}
.map-loc-type-count{font-size:10px;color:var(--tm);background:var(--bgi);padding:0px 5px;border-radius:8px;min-width:16px;text-align:center}
.map-loc-type-hide-btn{font-size:9px;color:var(--tm);background:none;border:none;cursor:pointer;padding:0 2px;font-family:inherit;transition:color .1s}
.map-loc-type-hide-btn:hover{color:var(--t1)}
.map-loc-type-arrow{font-size:8px;color:var(--tf);transition:transform .15s;width:10px;text-align:center}
.map-loc-type-group.collapsed .map-loc-type-arrow{transform:rotate(-90deg)}
.map-loc-type-group.off .map-loc-type-name{opacity:.5}

/* Selected location footer */
.map-sb-footer{flex-shrink:0;border-top:1px solid var(--bd);padding:8px 10px;background:var(--bgi)}
.map-sb-footer-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tm);font-weight:600;margin-bottom:5px}
.map-sel-empty{font-size:11px;color:var(--tm);font-style:italic}
.map-sel-name{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:2px;line-height:1.3}
.map-sel-type{font-size:10px;color:var(--ac);font-weight:500;margin-bottom:4px}
.map-sel-notes{font-size:11px;color:var(--t2);line-height:1.4;max-height:48px;overflow-y:auto}
.map-sel-coords{font-size:10px;color:var(--tm);margin-top:4px;font-family:monospace}

/* Legacy compat */
.map-leg-toggle{background:none;border:none;cursor:pointer;font-size:11px;padding:2px 4px;opacity:.6;transition:opacity .15s}
.map-leg-toggle:hover{opacity:1}
.map-leg-row{display:flex;align-items:center;gap:8px;padding:5px 8px;cursor:pointer;border-radius:4px;margin:1px 0;transition:all .15s}
.map-leg-row:hover{background:var(--bgh)}.map-leg-row.off{opacity:.35}
.map-leg-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.map-leg-name{flex:1;font-size:11px;color:var(--t2)}.map-leg-count{font-size:10px;color:var(--tm);background:var(--bgi);padding:1px 5px;border-radius:8px}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:6px;padding:14px}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.sv{font-size:22px;font-weight:600;letter-spacing:-.02em;line-height:1.2}.sl{font-size:10px;color:var(--tm);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;font-weight:500}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;border:none;font-family:inherit;color:var(--t1)}
.bp{background:var(--ac);color:#fff}.bp:hover{background:var(--acd)}
.bg{background:transparent;color:var(--t2);border:1px solid var(--bd)}.bg:hover{color:var(--t1);background:var(--bgh)}
.bs{padding:3px 7px;font-size:11px}
.bd{background:var(--redd);color:var(--red);border:1px solid rgba(229,83,75,.25)}
.bw{background:var(--orgd);color:var(--org);border:1px solid rgba(210,153,34,.25)}
.bgrn{background:var(--grnd);color:var(--grn);border:1px solid rgba(86,211,100,.25)}

/* Inputs */
.inp{width:100%;padding:6px 10px;background:var(--bgi);border:1px solid var(--bd);border-radius:4px;color:var(--t1);font-size:13px;font-family:inherit;transition:border-color .12s}
.inp:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 2px var(--acg)}.inp::placeholder{color:var(--tm)}
select.inp{cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23666' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;padding-right:26px}
textarea.inp{resize:vertical;min-height:50px}

/* Tables */
.tw{overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:7px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--tm);border-bottom:1px solid var(--bd);font-weight:600;white-space:nowrap}
tbody td{padding:7px 10px;border-bottom:1px solid var(--bd);vertical-align:middle}tbody tr{transition:background .08s}tbody tr:hover{background:var(--bgh)}

/* Badges */
.badge{display:inline-flex;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:500}
.bac{background:var(--acg);color:var(--ac)}.bgr{background:var(--grnd);color:var(--grn)}.bre{background:var(--redd);color:var(--red)}.bbl{background:var(--blud);color:var(--blu)}.bor{background:var(--orgd);color:var(--org)}.byl{background:var(--yld);color:var(--yl)}.bpk{background:var(--pkd);color:var(--pk)}.bcn{background:var(--cnd);color:var(--cn)}

/* Modal */
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px);animation:fadeIn .1s}
.md{background:var(--bg1);border:1px solid var(--bd);border-radius:8px;padding:22px;min-width:380px;max-width:560px;width:92%;max-height:85vh;overflow-y:auto;animation:fadeIn .2s}.md.md-wide{max-width:820px;width:96%}
.mt{font-size:15px;font-weight:600;color:var(--t1)}.fg{margin-bottom:11px}.fl{display:block;font-size:10px;color:var(--tm);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}

/* Tabs, search, progress */
.tb{display:flex;gap:0;border-bottom:1px solid var(--bd);margin-bottom:14px}
.ti{padding:7px 12px;font-size:12px;font-weight:500;cursor:pointer;color:var(--tm);border-bottom:2px solid transparent;transition:all .12s}.ti:hover{color:var(--t2)}.ti.a{color:var(--ac);border-bottom-color:var(--ac)}
.sb{display:flex;align-items:center;gap:6px;background:var(--bgi);border:1px solid var(--bd);border-radius:4px;padding:0 10px}
.sb:focus-within{border-color:var(--ac);box-shadow:0 0 0 2px var(--acg)}
.sb input{border:none;background:transparent;color:var(--t1);padding:6px 0;font-size:13px;flex:1;outline:none;font-family:inherit}.sb input::placeholder{color:var(--tm)}
.pb{height:3px;background:var(--bgi);border-radius:2px;overflow:hidden}.pf{height:100%;border-radius:2px;transition:width .4s}

/* Combobox */
.cb{position:relative}.cbd{position:absolute;top:100%;left:0;right:0;z-index:10;background:var(--bg1);border:1px solid var(--bd);border-radius:4px;margin-top:2px;max-height:170px;overflow-y:auto;box-shadow:0 4px 20px rgba(0,0,0,.35)}
.cbo{padding:5px 10px;cursor:pointer;font-size:13px;color:var(--t2);display:flex;align-items:center;justify-content:space-between}.cbo:hover,.cbo.hl{background:var(--bgh);color:var(--t1)}

/* Misc */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.pt{font-size:17px;font-weight:600;color:var(--t1)}
.av{width:34px;height:34px;border-radius:6px;background:var(--acg);display:flex;align-items:center;justify-content:center;color:var(--ac);font-weight:600;font-size:13px;flex-shrink:0}
.sn{position:fixed;top:12px;right:12px;z-index:200;border-radius:4px;padding:6px 14px;font-size:12px;font-weight:500;animation:fadeIn .2s}
.empty{text-align:center;padding:36px 20px;color:var(--tm)}.empty-ico{font-size:28px;margin-bottom:6px;opacity:.5}.empty-title{font-size:14px;font-weight:600;color:var(--t2);margin-bottom:4px}.empty-sub{font-size:12px;margin-bottom:12px}
.actions{display:flex;gap:4px;justify-content:flex-end}
.row-actions{display:flex;gap:3px;opacity:0;transition:opacity .12s}tr:hover .row-actions{opacity:1}
.tag{display:inline-flex;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:500;margin:1px;background:var(--acg);color:var(--ac)}
.chart-bar{display:flex;align-items:flex-end;gap:3px;height:100px;padding-top:8px}.chart-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1}.chart-fill{width:100%;border-radius:2px 2px 0 0;min-height:1px;transition:height .4s}.chart-label{font-size:9px;color:var(--tm)}.chart-val{font-size:9px;font-weight:600}
.req-card{border:1px solid var(--bd);border-radius:6px;padding:12px;background:var(--bg2);margin-bottom:8px}.req-card.done{opacity:.5}
.ann-card{border:1px solid var(--bd);border-radius:6px;padding:16px;background:var(--bg2);margin-bottom:10px}.ann-card.pinned{border-color:var(--org)}
.mbt{display:none;position:fixed;top:8px;left:8px;z-index:60;background:var(--bg2);border:1px solid var(--bd);border-radius:4px;padding:5px;cursor:pointer;color:var(--t1)}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg0)}
.login-box{background:var(--bg1);border:1px solid var(--bd);border-radius:10px;padding:32px;width:360px;animation:fadeIn .3s}
.login-title{font-size:20px;font-weight:700;color:var(--t1);text-align:center;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--tm);text-align:center;margin-bottom:24px}
.login-err{color:var(--red);font-size:12px;margin-top:8px;text-align:center;display:none}

/* Placeholder tool */
.placeholder-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;color:var(--tm);text-align:center}
.placeholder-ico{font-size:48px;margin-bottom:12px;opacity:.3}.placeholder-title{font-size:18px;font-weight:600;color:var(--t2);margin-bottom:6px}.placeholder-sub{font-size:13px;max-width:400px}

/* Character Builder */
.cb-container{display:flex;gap:16px}
.cb-left{width:280px;flex-shrink:0}
.cb-right{flex:1;min-width:0}
.cb-section{margin-bottom:12px}
.cb-stitle{font-size:11px;font-weight:600;color:var(--ac);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.cb-attr-row{display:flex;align-items:center;margin-bottom:6px}
.cb-attr-label{width:90px;font-size:12px;color:var(--t2)}
.cb-attr-controls{display:flex;align-items:center;gap:3px}
.cb-attr-btn{width:22px;height:26px;background:transparent;border:1px solid var(--bd);border-radius:3px;color:var(--tm);font-size:12px;cursor:pointer;transition:all .12s}
.cb-attr-btn:hover{border-color:var(--ac);color:var(--ac)}
.cb-attr-val{width:50px;height:28px;background:var(--bgi);border:1px solid var(--bd);border-radius:3px;color:var(--t1);font-size:13px;font-weight:600;text-align:center}
.cb-points-row{display:flex;justify-content:space-between;padding:8px 0;margin-top:6px;border-top:1px solid var(--bd);font-size:12px;color:var(--t2)}
.cb-points-val{font-weight:600;color:var(--grn)}
.cb-stat-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.cb-stat-row span:first-child{color:var(--tm)}
.cb-stat-val{color:var(--grn);font-weight:500}
.cb-input-row{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px;color:var(--tm)}
.cb-input-row span{flex:1}
.cb-stat-input{width:55px;height:24px;background:var(--bgi);border:1px solid var(--bd);border-radius:3px;color:var(--t1);text-align:center;font-size:12px}
.cb-apply-btn{width:24px;height:24px;background:transparent;border:1px solid var(--bd);border-radius:3px;color:var(--tm);cursor:pointer}
.cb-apply-btn:hover{border-color:var(--ac);color:var(--ac)}
.cb-pp{font-size:13px;color:var(--grn);font-weight:500}
.cb-skill-grid{display:flex;gap:0;justify-content:center;overflow-x:auto}
.cb-skill-col{display:flex;flex-direction:column}
.cb-skill-row{display:flex;justify-content:center}
.cb-skill-cell{width:70px;height:62px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
.cb-skill-wrap{position:relative;display:flex;flex-direction:column;align-items:center}
.cb-skill-btn{width:40px;height:40px;background-color:transparent;background-size:100% 100%;background-position:center;background-repeat:no-repeat;border:1px solid var(--bd);border-radius:4px;cursor:pointer;transition:all .12s}
.cb-skill-btn:hover:not(.cb-locked){border-color:var(--ac);box-shadow:0 0 8px rgba(127,109,242,.3);transform:scale(1.05)}
.cb-skill-btn.cb-locked{opacity:.3;cursor:not-allowed;filter:grayscale(40%)}
.cb-skill-btn.cb-active{border-color:var(--org);box-shadow:0 0 6px rgba(210,153,34,.4)}

const DKEYS=["guilds","p","gt","it","items","log","events","orders","requests","announcements","users","mapData","gear","goldRequests","playerRecipes","userProfiles","cities","vendors","vendorItems","toolStatus","savedBuilds","wikiPages","wikiDrafts"];

}
function clearSession(){

// ── Cloudflare KV backend ──────────────────────────────────
// Set this to the URL of your deployed Cloudflare Worker.
// Example: "https://guild-hub-api.YOUR-SUBDOMAIN.workers.dev"
const CF_WORKER_URL = "https://guild-hub-api.caleb-tomlinson16.workers.dev";

// All KV keys the app uses
const ALL_KV_KEYS = [SK,"gv_custom_items","gv_resources","gv_skill_xp_tables","gv_player_xp_table","gv_potion_effects"];

// Debounce timer so rapid calls collapse into one write
let _persistTimer=null;
let _persistPending=false;

function load(){
  // Return localStorage cache immediately so the app boots fast.
  // A background sync from KV fires after boot (see initKvSync).
  try{return JSON.parse(localStorage.getItem(SK))||null}catch(e){return null}
}

async function _pushToKV(key,value){
  try{
    await fetch(`${CF_WORKER_URL}/data/${encodeURIComponent(key)}`,{
      method:"PUT",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({value})
    });
  }catch(e){/* offline — localStorage already updated, will drift until next push */}
}

async function _pullFromKV(key){
  try{
    const r=await fetch(`${CF_WORKER_URL}/data/${encodeURIComponent(key)}`);
    if(!r.ok)return null;
    const j=await r.json();
    return j.value??null;
  }catch(e){return null}
}

function persist(){
  // 1. Write to localStorage immediately (keeps UI snappy)
  try{const o={};DKEYS.forEach(k=>o[k]=D[k]);localStorage.setItem(SK,JSON.stringify(o))}catch(e){}
  // 2. Debounce the KV write (500 ms) to avoid hammering on rapid changes
  _persistPending=true;
  if(_persistTimer)clearTimeout(_persistTimer);
  _persistTimer=setTimeout(async()=>{
    _persistPending=false;
    try{
      const o={};DKEYS.forEach(k=>o[k]=D[k]);
      await _pushToKV(SK,o);
    }catch(e){}
  },500);
}

// Pull all keys from KV on first load, merge into app state, then re-render.
async function initKvSync(){
  try{
    // Pull main data
    const main=await _pullFromKV(SK);
    if(main&&typeof main==="object"){
      DKEYS.forEach(k=>{if(main[k]!==undefined)D[k]=main[k];});
      try{localStorage.setItem(SK,JSON.stringify(main));}catch(e){}
    }
    // Pull craft sub-keys
    const ciRaw=await _pullFromKV("gv_custom_items");
    if(ciRaw){craftItems=Array.isArray(ciRaw)?ciRaw:JSON.parse(ciRaw);try{localStorage.setItem("gv_custom_items",JSON.stringify(craftItems))}catch(e){}}
    const crRaw=await _pullFromKV("gv_resources");
    if(crRaw){craftResources=Array.isArray(crRaw)?crRaw:JSON.parse(crRaw);try{localStorage.setItem("gv_resources",JSON.stringify(craftResources))}catch(e){}}
    const xtRaw=await _pullFromKV("gv_skill_xp_tables");
    if(xtRaw){craftSkillXpTables=(typeof xtRaw==="object"&&!Array.isArray(xtRaw))?xtRaw:JSON.parse(xtRaw);try{localStorage.setItem("gv_skill_xp_tables",JSON.stringify(craftSkillXpTables))}catch(e){}}
    const ptRaw=await _pullFromKV("gv_player_xp_table");
    if(ptRaw){playerXpTable=Array.isArray(ptRaw)?ptRaw:JSON.parse(ptRaw);try{localStorage.setItem("gv_player_xp_table",JSON.stringify(playerXpTable))}catch(e){}}
    const peRaw=await _pullFromKV("gv_potion_effects");
    if(peRaw){try{localStorage.setItem("gv_potion_effects",JSON.stringify(Array.isArray(peRaw)?peRaw:JSON.parse(peRaw)))}catch(e){}}
    // Re-resolve currentUser from fresh data (IDs are stable, data may have changed)
    if(currentUser){
      const freshUser=D.users.find(u=>u.id===currentUser.id);
      if(freshUser) currentUser=freshUser;
      else { currentUser=null; currentGuildId=null; clearSession(); }
    }
    rebuildG();
    render();
  }catch(e){console.warn("KV sync failed, running from local cache:",e);}
}

// Gold math:
// Player debt = borrowed - repaid - donated (clamped to 0)
//   Donations pay off debt first, any excess goes to guild treasury
// Guild bank = all gold physically in the bank
//   = donations + repayments - borrows (but donations used for debt don't double-count)
//   Simpler: treasury = sum of all inflows - sum of all outflows
//   Inflows: donations, repayments. Outflows: borrows.
//   Treasury = donated + repaid - borrowed
function pGold(pid){
  // Process transactions chronologically - deposits reduce existing debt first
  const tx=G.gt.filter(t=>t.playerId===pid).sort((a,b)=>a.date.localeCompare(b.date)||a.id.localeCompare(b.id));
  let debt=0, totalBorrowed=0, totalDeposited=0;
  tx.forEach(t=>{
    if(t.type==="Borrow Gold"){
      debt+=t.amount;
      totalBorrowed+=t.amount;
    } else if(t.type==="Deposit Gold"||t.type==="Repay Gold"||t.type==="Donate Gold"){
      // All deposits reduce existing debt first
      debt=Math.max(0,debt-t.amount);
      totalDeposited+=t.amount;
    }
  });
  return{borrowed:totalBorrowed,deposited:totalDeposited,debt}
}
function gStats(){
  const deposits=G.gt.filter(t=>t.type==="Deposit Gold"||t.type==="Donate Gold"||t.type==="Repay Gold").reduce((s,t)=>s+t.amount,0);
  const tb=G.gt.filter(t=>t.type==="Borrow Gold").reduce((s,t)=>s+t.amount,0);
  const treasury=deposits-tb; // net gold in the bank
  const totalDebt=G.p.reduce((s,p)=>s+pGold(p.id).debt,0);
  return{deposited:deposits,borrowed:tb,owed:totalDebt,treasury}
}
function pItems(pid){const tx=G.it.filter(t=>t.playerId===pid);return{borrowed:tx.filter(t=>t.type==="Borrowed").reduce((s,t)=>s+t.qty,0),returned:tx.filter(t=>t.type==="Returned").reduce((s,t)=>s+t.qty,0),donated:tx.filter(t=>t.type==="Donated").reduce((s,t)=>s+t.qty,0)}}

  if(!userId)return null;
  if(!D.userProfiles[userId])D.userProfiles[userId]={recipeIds:[]};
  const profile=D.userProfiles[userId];
  if(!Array.isArray(profile.recipeIds))profile.recipeIds=[];
  return profile;
}
function getUserRecipeIds(user){
  const profile=getUserProfile(user?.id);
  if(!profile)return[];
  if(!profile.recipeIds.length){
    const linked=getLinkedPlayersForUser(user);
    const seeded=[...new Set(linked.flatMap(p=>(D.playerRecipes[p.id]||[]).map(String)))];
    if(seeded.length){
      profile.recipeIds=seeded;
      persist();
    }
  }
  return profile.recipeIds.map(String);
}
function topN(type,src,n=5){const m={};(src==="gold"?G.gt:G.it).filter(t=>t.type===type).forEach(t=>{m[t.playerId]=(m[t.playerId]||0)+(src==="gold"?t.amount:t.qty)});return Object.entries(m).map(([k,v])=>({id:k,name:pN(k),value:v})).sort((a,b)=>b.value-a.value).slice(0,n)}
function feed(){const e=[];G.gt.forEach(t=>{const v=t.type==="Borrow Gold"?"borrowed":t.type==="Repay Gold"?"repaid":"donated";e.push({date:t.date,text:`${pN(t.playerId)} ${v} ${fmt(t.amount)} gold`,type:t.type,id:t.id})});G.it.forEach(t=>{const v=t.type==="Borrowed"?"borrowed":t.type==="Returned"?"returned":"donated";e.push({date:t.date,text:`${pN(t.playerId)} ${v} ${t.qty} ${iN(t.itemId)}`,type:t.type,id:t.id})});return e.sort((a,b)=>b.date.localeCompare(a.date))}

function combobox(container,onSelect){let selId="",hlIdx=0,dd=null;const wrap=document.createElement("div");wrap.className="cb";const inp=document.createElement("input");inp.className="inp";inp.placeholder="Type item name...";
function showDD(q){if(dd)dd.remove();q=(q||"").toLowerCase();const fil=q?G.items.filter(i=>i.name.toLowerCase().includes(q)):D.items;const exact=G.items.some(i=>i.name.toLowerCase()===q);const canC=q.length>0&&!exact;dd=document.createElement("div");dd.className="cbd";fil.forEach((item,i)=>{const o=document.createElement("div");o.className="cbo";o.innerHTML=`<span>${item.name}</span><span style="font-size:10px;color:var(--tm)">${item.category}</span>`;o.addEventListener("click",()=>{selId=item.id;inp.value=item.name;cDD();onSelect(item.id)});o.addEventListener("mouseenter",()=>{hlIdx=i;hDD()});dd.appendChild(o)});if(canC){const o=document.createElement("div");o.className="cbo";o.innerHTML=`<span style="color:var(--ac);font-weight:500;font-size:12px">+ Create "${q}"</span>`;o.addEventListener("click",()=>{const nid=uid();D.items.push({id:nid,name:inp.value.trim(),category:"Uncategorized",guildId:currentGuildId});persist();selId=nid;inp.value=inp.value.trim();cDD();onSelect(nid);addLog("Item Created",inp.value.trim())});dd.appendChild(o)}if(!fil.length&&!canC)dd.innerHTML=`<div style="padding:8px;color:var(--tm);font-size:12px;text-align:center">No items</div>`;wrap.appendChild(dd);hlIdx=0;hDD()}
function hDD(){if(!dd)return;[...dd.children].forEach((c,i)=>c.classList.toggle("hl",i===hlIdx))}function cDD(){if(dd){dd.remove();dd=null}}
inp.addEventListener("focus",()=>{inp.value="";showDD("")});inp.addEventListener("input",()=>showDD(inp.value));inp.addEventListener("keydown",e=>{if(!dd)return;const n=dd.children.length;if(e.key==="ArrowDown"){e.preventDefault();hlIdx=Math.min(hlIdx+1,n-1);hDD()}else if(e.key==="ArrowUp"){e.preventDefault();hlIdx=Math.max(hlIdx-1,0);hDD()}else if(e.key==="Enter"){e.preventDefault();if(dd.children[hlIdx])dd.children[hlIdx].click()}else if(e.key==="Escape")cDD()});
document.addEventListener("click",e=>{if(!wrap.contains(e.target))cDD()});wrap.appendChild(inp);container.appendChild(wrap);return{getId:()=>selId}}

        currentUser=user;currentGuildId=user.guildId||null;
        document.getElementById("root").innerHTML=`<div class="login-wrap"><div class="login-box" style="max-width:420px"><div style="text-align:center;padding:20px 0"><div style="font-size:40px;margin-bottom:12px">⏳</div><div style="font-size:16px;font-weight:600;margin-bottom:8px">Application Pending</div><div style="font-size:13px;color:var(--t2);line-height:1.7">Your application to join <strong>${D.guilds.find(g=>g.id===user.guildId)?.name||"the guild"}</strong> is waiting for approval from the Guild Leader.</div><div style="margin-top:20px"><button class="btn bg" id="pending-logout-login">Sign Out</button></div></div></div></div>`;
        document.getElementById("pending-logout-login").addEventListener("click",()=>{currentUser=null;currentGuildId=null;clearSession();loginMode="login";render();});
        return;
      }
      currentUser=user;
      currentGuildId=user.guildId||null;
      if(isSiteAdmin())currentGuildId=currentGuildId||D.guilds[0]?.id||null;
      saveSession(currentUser, currentGuildId);
      // Admin/guild_leader can access without a guild
      activeTool="treasury";pg="dashboard";
      window._regData={};
      render();
    };
    document.getElementById("login-btn").addEventListener("click",doLogin);
    document.getElementById("login-pass").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()});
    document.getElementById("goto-register").addEventListener("click",()=>{loginMode="register";renderLogin()});
  } else if(mode==="register"){
    document.getElementById("login-btn").addEventListener("click",()=>{
      const name=document.getElementById("login-user").value.trim();
      const discord=document.getElementById("login-discord").value.trim();
      const pass=document.getElementById("login-pass").value;
      const pass2=document.getElementById("login-pass2").value;
      if(!name){showErr("In-game name is required");return}
      if(!discord){showErr("Discord is required");return}
      if(!pass||pass.length<3){showErr("Password must be at least 3 characters");return}
      if(pass!==pass2){showErr("Passwords don't match");return}
      if(D.users.find(x=>x.username.toLowerCase()===name.toLowerCase())){showErr("Username already taken");return}
      // Create account with no guild — they can join/create one from the Guild Manager tab
      const newUser={id:uid(),username:name,discord,password:pass,displayName:name,role:"member",guildId:null,status:"active"};
      D.users.push(newUser);
      currentUser=newUser;
      currentGuildId=null;
      saveSession(currentUser, null);
      persist();
      window._regData={};
      activeTool="crafting";pg="dashboard";
      render();
      toast("Welcome, "+name+"! You can join or create a guild from the Guild Manager tab.");
    });
    document.getElementById("goto-login").addEventListener("click",()=>{loginMode="login";renderLogin()});
  } else if(mode==="create-guild"){
    document.getElementById("create-guild-btn").addEventListener("click",()=>{
      const guildName=document.getElementById("reg-guild-name").value.trim();
      if(!guildName){showErr("Guild name is required");return}
      // Works for both logged-in users and new registrations via _regData
      let user=currentUser;
      if(!user){
        const {name,discord,pass}=window._regData||{};
        if(!name){loginMode="register";renderLogin();return}
        user={id:uid(),username:name,discord,password:pass,displayName:name,role:"guild_leader",guildId:null,status:"active"};
        D.users.push(user);
      }
      const guildId=uid();
      const newGuild={id:guildId,name:guildName,createdBy:user.displayName,cfg:{...DEFAULT_CFG,guildName},createdDate:new Date().toISOString().slice(0,10)};
      D.guilds.push(newGuild);
      // Upgrade user to guild_leader and assign guild
      const storedUser=D.users.find(x=>x.id===user.id);
      if(storedUser){storedUser.guildId=guildId;storedUser.role="guild_leader";storedUser.status="active";}
      currentUser={...user,guildId,role:"guild_leader",status:"active"};
      currentGuildId=guildId;
      saveSession(currentUser,currentGuildId);
      rebuildG();
      addLog("Guild Created",guildName);
      persist();window._regData={};activeTool="treasury";pg="dashboard";render();toast("Welcome! Your guild \""+guildName+"\" has been created.");
    });
    document.getElementById("goto-join-guild").addEventListener("click",()=>{loginMode="join-guild";renderLogin()});
    document.getElementById("goto-login").addEventListener("click",()=>{
      // If already logged in, just close; otherwise go to login
      if(currentUser){activeTool="crafting";pg="dashboard";render();}
      else{loginMode="login";renderLogin();}
    });
  } else if(mode==="join-guild"){
    let selectedGuildId=null;
    document.querySelectorAll("[data-gid]").forEach(row=>{
      row.addEventListener("click",()=>{
        document.querySelectorAll("[data-gid]").forEach(r=>r.style.borderColor="var(--bd)");
        row.style.borderColor="var(--ac)";
        selectedGuildId=row.dataset.gid;
        const g=D.guilds.find(x=>x.id===selectedGuildId);
        const disp=document.getElementById("selected-guild-display");
        if(disp){disp.style.display="block";disp.textContent="Selected: "+g?.name;}
        const btn=document.getElementById("apply-guild-btn");
        if(btn)btn.disabled=false;
      });
    });
    document.getElementById("apply-guild-btn").addEventListener("click",()=>{
      if(!selectedGuildId){showErr("Select a guild first");return}
      const {name,discord,pass}=window._regData;
      if(!name){loginMode="register";renderLogin();return}
      const newUser={id:uid(),username:name,discord,password:pass,displayName:name,role:"member",guildId:selectedGuildId,status:"pending"};
      D.users.push(newUser);
      persist();window._regData={};
      // Show waiting screen
      document.getElementById("root").innerHTML=wrap(`${logo}<div class="login-title">Application Submitted</div><div style="text-align:center;padding:20px 0"><div style="font-size:40px;margin-bottom:12px">⏳</div><div style="font-size:13px;color:var(--t2);line-height:1.7">Your application to join <strong>${D.guilds.find(x=>x.id===selectedGuildId)?.name}</strong> has been submitted.<br><br>The Guild Leader will review your request. Come back and sign in once you've been approved.</div><div style="margin-top:20px"><button class="btn bg" id="back-to-login">Back to Sign In</button></div></div>`);
      document.getElementById("back-to-login").addEventListener("click",()=>{loginMode="login";renderLogin()});
    });
    document.getElementById("goto-create-guild").addEventListener("click",()=>{loginMode="create-guild";renderLogin()});
  }
}

function renderNoPendingGuild(){
  // User is logged in but their application is pending or they have no guild
  const userStatus=currentUser.status;
  const guild=D.guilds.find(g=>g.id===currentUser.guildId);
  document.getElementById("root").innerHTML=`<div class="login-wrap"><div class="login-box" style="max-width:420px">
    <div style="text-align:center;padding:20px 0">
      <div style="font-size:40px;margin-bottom:12px">${userStatus==="pending"?"⏳":"🚫"}</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:8px">${userStatus==="pending"?"Application Pending":"No Guild Access"}</div>
      <div style="font-size:13px;color:var(--t2);line-height:1.7">
        ${userStatus==="pending"
          ?`Your application to join <strong>${guild?.name||"a guild"}</strong> is waiting for approval from the Guild Leader.`
          :"You don't have access to any guild yet."}
      </div>
      <div style="margin-top:20px;display:flex;gap:8px;justify-content:center">
        <button class="btn bg" id="pending-logout">Sign Out</button>
      </div>

}

// TOOL: ANNOUNCEMENTS
// ═══════════════════════════════════════════════════════════
function pgAnnouncements(){
  const fil=G.announcements.slice().sort((a,b)=>{if(a.pinned!==b.pinned)return a.pinned?-1:1;return b.date.localeCompare(a.date)});
  let h=`<div class="ph"><div class="pt">Announcements</div>${isAdmin()?`<button class="btn bp" id="add-ann-btn">+ New Post</button>`:""}</div>`;
  if(!fil.length)return h+`<div class="card">${empty("📢","No announcements","",isAdmin()?"+ Post Announcement":"","add-ann-btn2")}</div>`;
  fil.forEach(a=>{
    h+=`<div class="ann-card${a.pinned?" pinned":""}">`;
    h+=`<div style="display:flex;justify-content:space-between;align-items:flex-start"><div>`;
    if(a.pinned)h+=`<span style="color:var(--org);font-size:11px;font-weight:600">📌 PINNED</span> `;
    h+=`<span style="font-size:15px;font-weight:600">${a.title}</span></div>`;
    if(isAdmin())h+=`<div style="display:flex;gap:3px"><button class="btn bg bs pin-ann" data-id="${a.id}">${a.pinned?"Unpin":"Pin"}</button><button class="btn bg bs edit-ann" data-id="${a.id}">✎</button><button class="btn bd bs del-ann" data-id="${a.id}">✕</button></div>`;
    h+=`</div>`;
    h+=`<div style="font-size:11px;color:var(--tm);margin:6px 0">Posted by ${a.author||"Admin"} on ${fmtD(a.date)}</div>`;
    h+=`<div style="font-size:13px;color:var(--t2);line-height:1.6;white-space:pre-wrap">${a.body}</div>`;
    h+=`</div>`;
  });
  return h;
}

function modalAnnouncement(e){
  if(!isAdmin())return;e=e||{};
  openModal(e.id?"Edit Announcement":"New Announcement",body=>{
    body.innerHTML=`<div class="fg"><label class="fl">Title *</label><input class="inp" id="mf-title" value="${e.title||""}" placeholder="Announcement title"></div><div class="fg"><label class="fl">Body *</label><textarea class="inp" id="mf-body" style="min-height:120px" placeholder="Write your announcement...">${e.body||""}</textarea></div><div class="actions" style="margin-top:14px"><button class="btn bg" onclick="closeModal()">Cancel</button><button class="btn bp" id="mf-save">${e.id?"Save":"Post"}</button></div>`;
    setTimeout(()=>document.getElementById("mf-save").addEventListener("click",()=>{
      const title=document.getElementById("mf-title").value.trim(),body2=document.getElementById("mf-body").value.trim();
      if(!title||!body2){toast("Title and body required","error");return}
      if(e.id){const a=G.announcements.find(x=>x.id===e.id);if(a){a.title=title;a.body=body2}addLog("Announcement Edited",title)}
      else{D.announcements.push({id:uid(),title,body:body2,author:currentUser.displayName,date:new Date().toISOString().slice(0,10),pinned:false,guildId:currentGuildId});addLog("Announcement Posted",title)}
      persist();closeModal();render();toast(e.id?"Updated!":"Posted!");
    }),0);
  });
}

// TOOL: MAP — Gloria Victis
// ═══════════════════════════════════════════════════════════
// Categories derived from gloriavict_leafletmap.sql + mapmain.sql marker-types
// ═══════════════════════════════════════════════════════════
// MAP SIDEBAR HTML BUILDER
// ═══════════════════════════════════════════════════════════
function buildMapSidebarHTML(){
  const markers = D.mapData || [];
  const searchTerm = (mapState.searchTerm || "").toLowerCase();

  function tagStyle(tag){
    const t = tag.toLowerCase();
    if(t.includes("loot zone")) return "background:var(--redd);color:var(--red)";
    if(t.includes("non-loot")) return "background:var(--grnd);color:var(--grn)";
    if(t.includes("market"))   return "background:var(--orgd);color:var(--org)";
    if(t.includes("farm"))     return "background:var(--grnd);color:var(--grn)";
    if(t.includes("dungeon"))  return "background:var(--pkd);color:var(--pk)";
    if(t.includes("chest"))    return "background:var(--pkd);color:var(--pk)";
    if(t.includes("horse"))    return "background:var(--yld);color:var(--yl)";
    if(t.includes("depot")||t.includes("logistician")) return "background:var(--blud);color:var(--blu)";
    return "background:var(--acg);color:var(--ac)";
  }

  let h = "";
  h += `<div class="map-sb-header">`;
  h += `<div class="map-sb-title">Locations</div>`;
  h += `<div class="map-sb-search"><span class="map-sb-search-icon">🔍</span><input type="text" id="map-sb-search" placeholder="Search locations..." autocomplete="off" value="${(mapState.searchTerm||"").replace(/"/g,'&quot;')}"><button class="map-sb-search-clear" id="map-sb-search-clear" style="display:${mapState.searchTerm?"inline":"none"}">✕</button></div>`;
  h += `<div class="map-sb-btns"><button class="map-sb-btn" id="map-sb-show-all">Show All</button><button class="map-sb-btn" id="map-sb-hide-all">Hide All</button><button class="map-sb-btn" id="map-sb-reset">Reset</button></div>`;
  h += `</div>`;

  h += `<div class="map-sb-body">`;

  let anyResults = false;

  MAP_CATEGORIES.forEach(cat => {
    const hidden = mapState.hiddenCats[cat.id];
    const collapsed = mapState.collapsedCats && mapState.collapsedCats[cat.id];

    // All markers in this category, filtered by search
    let catMarkers = markers.filter(m => m.category === cat.id);
    if(searchTerm){
      catMarkers = catMarkers.filter(m => {
        const hay = [m.name, m.markerType, m.region, m.notes].filter(Boolean).join(" ").toLowerCase();
        return hay.includes(searchTerm);
      });
    }

    // When searching, skip categories with no matches
    if(searchTerm && catMarkers.length === 0) return;
    anyResults = true;

    // Group markers by markerType
    const byType = {};
    catMarkers.forEach(m => {
      const t = m.markerType || "Other";
      if(!byType[t]) byType[t] = [];
      byType[t].push(m);
    });

    // All known types for this category (even if no markers yet)
    const allTypes = GV_MARKER_TYPES[cat.id] || [];
    // Build ordered list: types that have markers first (in GV order), then rest
    const typesWithMarkers = allTypes.filter(t => byType[t] && byType[t].length > 0);
    const typesEmpty = allTypes.filter(t => !byType[t] || byType[t].length === 0);
    // Also catch any marker types not in the predefined list
    const extraTypes = Object.keys(byType).filter(t => !allTypes.includes(t));
    const orderedTypes = [...typesWithMarkers, ...extraTypes, ...typesEmpty];

    h += `<div class="map-loc-group${hidden?" off":""}${collapsed?" collapsed":""}" data-cat="${cat.id}">`;

    // Group header
    h += `<div class="map-loc-group-header" data-cat-toggle="${cat.id}">`;
    h += `<span class="map-loc-group-dot" style="background:${cat.color}"></span>`;
    h += `<span class="map-loc-group-name">${cat.name}</span>`;
    h += `<span class="map-loc-group-meta">`;
    h += `<button class="map-loc-hide-btn" data-cat-vis="${cat.id}">${hidden?"Show":"Hide"}</button>`;
    h += `<span class="map-loc-count">${catMarkers.length} shown</span>`;
    h += `</span>`;
    h += `<span class="map-loc-arrow">▾</span>`;
    h += `</div>`;

    if(!collapsed){
      h += `<div class="map-loc-type-sections">`;

      orderedTypes.forEach(typeName => {
        const typeMarkers = byType[typeName] || [];
        const typeHidden = mapState.hiddenTypes?.[cat.id]?.[typeName];
        const typeCollapsed = mapState.collapsedTypes?.[cat.id]?.[typeName];

        h += `<div class="map-loc-type-group${typeHidden?" off":""}${typeCollapsed?" collapsed":""}" data-type="${cat.id}|${typeName}">`;

        // Type sub-header
        h += `<div class="map-loc-type-header" data-type-toggle="${cat.id}|${typeName}">`;
        h += `<span class="map-loc-type-dot" style="background:${cat.color}88"></span>`;
        h += `<span class="map-loc-type-name">${typeName}</span>`;
        h += `<span class="map-loc-type-count">${typeMarkers.length}</span>`;
        if(typeMarkers.length > 0){
          h += `<button class="map-loc-type-hide-btn" data-type-vis="${cat.id}|${typeName}">${typeHidden?"Show":"Hide"}</button>`;
        }
        h += `<span class="map-loc-type-arrow">${typeMarkers.length > 0 ? "▾" : ""}</span>`;
        h += `</div>`;

        // Marker cards (single column, full width)
        if(typeMarkers.length > 0 && !typeCollapsed){
          h += `<div class="map-loc-cards">`;
          typeMarkers.forEach(m => {
            const isSelected = mapState.selectedMarker === m.id;
            const tags = [];
            if(m.region) tags.push(m.region);
            if(m.has_market) tags.push("Market");
            if(m.has_depot) tags.push("Depot");
            if(m.has_logistician) tags.push("Logistician");
            if(m.has_crafting_district) tags.push("Crafting District");

            h += `<div class="map-loc-card${isSelected?" selected":""}" data-marker-id="${m.id}">`;
            h += `<button class="map-loc-fly" data-fly-id="${m.id}" title="Fly to">◎</button>`;
            h += `<div class="map-loc-card-name">${m.name || typeName}</div>`;
            if(m.region || m.notes){
              h += `<div class="map-loc-card-sub">${[m.region, m.notes ? m.notes.slice(0,40)+(m.notes.length>40?"…":"") : ""].filter(Boolean).join(" · ")}</div>`;
            }
            if(tags.length){
              h += `<div class="map-loc-card-tags">`;
              tags.slice(0,4).forEach(tag => {
                h += `<span class="map-loc-tag" style="${tagStyle(tag)}">${tag}</span>`;
              });
              h += `</div>`;
            }
            h += `</div>`;
          });
          h += `</div>`;
        }

        h += `</div>`; // map-loc-type-group
      });

      h += `</div>`; // map-loc-type-sections
    }

    h += `</div>`; // map-loc-group
  });

  if(searchTerm && !anyResults){
    h += `<div style="text-align:center;padding:24px 12px;color:var(--tm);font-size:12px">No locations match "${mapState.searchTerm}"</div>`;
  }

  h += `</div>`; // map-sb-body

  // Footer
  const sel = mapState.selectedMarker ? D.mapData.find(m => m.id === mapState.selectedMarker) : null;
  h += `<div class="map-sb-footer">`;
  h += `<div class="map-sb-footer-label">Selected Location</div>`;
  if(sel){
    h += `<div class="map-sel-name">${sel.name||sel.markerType}</div>`;
    h += `<div class="map-sel-type">${sel.markerType||""}${sel.region?` · ${sel.region}`:""}</div>`;
    if(sel.notes) h += `<div class="map-sel-notes">${sel.notes}</div>`;
    h += `<div class="map-sel-coords">x:${sel.x?.toFixed(4)} y:${sel.y?.toFixed(4)}</div>`;
  } else {
    h += `<div class="map-sel-empty">No location selected</div>`;
    h += `<div style="font-size:10px;color:var(--tm);margin-top:2px">Click a marker to see details</div>`;
  }
  h += `</div>`;

  return h;
}

// ═══════════════════════════════════════════════════════════
// MAP SIDEBAR EVENT BINDER (shared between guest + logged-in)
// ═══════════════════════════════════════════════════════════
function bindMapSidebarEvents(onVisChange){
  const rerender = typeof onVisChange === "function" ? onVisChange : () => {};

  // Widen sidebar when on map tool
  const sb = document.getElementById("sidebar");
  if(sb) sb.classList.add("map-wide");

  // Show All / Hide All / Reset
  document.getElementById("map-sb-show-all")?.addEventListener("click", () => {
    MAP_CATEGORIES.forEach(c => { mapState.hiddenCats[c.id] = false; mapState.hiddenTypes[c.id] = {}; });
    rerender();
  });
  document.getElementById("map-sb-hide-all")?.addEventListener("click", () => {
    MAP_CATEGORIES.forEach(c => { mapState.hiddenCats[c.id] = true; });
    rerender();
  });
  document.getElementById("map-sb-reset")?.addEventListener("click", () => {
    mapState.hiddenCats = {}; mapState.hiddenTypes = {}; mapState.collapsedCats = {}; mapState.collapsedTypes = {}; mapState.searchTerm = "";
    rerender();
  });

  // Category collapse toggle
  document.querySelectorAll("[data-cat-toggle]").forEach(el => {
    el.addEventListener("click", e => {
      if(e.target.closest("[data-cat-vis]")) return;
      const c = el.dataset.catToggle;
      mapState.collapsedCats = mapState.collapsedCats || {};
      mapState.collapsedCats[c] = !mapState.collapsedCats[c];
      rerender();
    });
  });

  // Per-category hide/show
  document.querySelectorAll("[data-cat-vis]").forEach(el => {
    el.addEventListener("click", e => {
      e.stopPropagation();
      const c = el.dataset.catVis;
      mapState.hiddenCats[c] = !mapState.hiddenCats[c];
      rerender();
    });
  });

  // Type sub-header collapse
  document.querySelectorAll("[data-type-toggle]").forEach(el => {
    el.addEventListener("click", e => {
      if(e.target.closest("[data-type-vis]")) return;
      const [cat, type] = el.dataset.typeToggle.split("|");
      mapState.collapsedTypes = mapState.collapsedTypes || {};
      mapState.collapsedTypes[cat] = mapState.collapsedTypes[cat] || {};
      mapState.collapsedTypes[cat][type] = !mapState.collapsedTypes[cat][type];
      rerender();
    });
  });

  // Per-type hide/show
  document.querySelectorAll("[data-type-vis]").forEach(el => {
    el.addEventListener("click", e => {
      e.stopPropagation();
      const [cat, type] = el.dataset.typeVis.split("|");
      mapState.hiddenTypes = mapState.hiddenTypes || {};
      mapState.hiddenTypes[cat] = mapState.hiddenTypes[cat] || {};
      mapState.hiddenTypes[cat][type] = !mapState.hiddenTypes[cat][type];
      rerender();
    });
  });

  // Search
  const sbSearch = document.getElementById("map-sb-search");
  const sbClear = document.getElementById("map-sb-search-clear");
  if(sbSearch){
    sbSearch.addEventListener("input", () => {
      mapState.searchTerm = sbSearch.value.trim();
      if(sbClear) sbClear.style.display = mapState.searchTerm ? "inline" : "none";
      rerender();
    });
  }
  if(sbClear){
    sbClear.addEventListener("click", () => {
      if(sbSearch) sbSearch.value = "";
      sbClear.style.display = "none";
      mapState.searchTerm = "";
      rerender();
    });
  }

  // Location card click — select + pan
  document.querySelectorAll(".map-loc-card").forEach(el => {
    el.addEventListener("click", e => {
      if(e.target.closest(".map-loc-fly")) return;
      const mid = el.dataset.markerId;
      const m = D.mapData.find(x => String(x.id) === String(mid));
      if(!m) return;
      mapState.selectedMarker = m.id;
      document.querySelectorAll(".map-loc-card").forEach(c => c.classList.toggle("selected", c.dataset.markerId === String(mid)));
      const footerEl = document.querySelector(".map-sb-footer");
      if(footerEl){
        footerEl.innerHTML = `<div class="map-sb-footer-label">Selected Location</div>
          <div class="map-sel-name">${m.name||m.markerType}</div>
          <div class="map-sel-type">${m.markerType||""}${m.region?` · ${m.region}`:""}</div>
          ${m.notes?`<div class="map-sel-notes">${m.notes}</div>`:""}
          <div class="map-sel-coords">x:${m.x?.toFixed(4)} y:${m.y?.toFixed(4)}</div>`;
      }
      if(typeof leafletMap !== "undefined" && leafletMap && typeof percentToLeaflet === "function"){
        const latLng = percentToLeaflet(m.x, m.y);
        leafletMap.setView(latLng, Math.max(4, leafletMap.getZoom()), {animate: true});
      }
    });
  });

  // Fly-to button
  document.querySelectorAll(".map-loc-fly").forEach(el => {
    el.addEventListener("click", e => {
      e.stopPropagation();
      const mid = el.dataset.flyId;
      const m = D.mapData.find(x => String(x.id) === String(mid));
      if(!m) return;
      mapState.selectedMarker = m.id;
      if(typeof leafletMap !== "undefined" && leafletMap && typeof percentToLeaflet === "function"){
        const latLng = percentToLeaflet(m.x, m.y);
        leafletMap.setView(latLng, MAP_MAX_ZOOM - 1, {animate: true});
      }
    });
  });
}

// Helper functions for coordinate conversion
// Leaflet coords: x = 0-10000 (left to right), y = 0 to -10000 (top to bottom)
// Storage coords: x = 0-100%, y = 0-100%
function percentToLeaflet(x, y) {
  return [-(y / 100) * 10000, (x / 100) * 10000]; // [lat, lng]
}

function leafletToPercent(lat, lng) {
  return {
    x: (lng / 10000) * 100,
    y: (-lat / 10000) * 100
  };
}

      <!-- bottom-right log face -->

      className: 'custom-marker',

  }

  // ── Shield SVG icon for all other Nation Location markers ──────────────────
  if (cat.id === 'guild') {
    const shieldSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="20" height="26" style="filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))">
      <path d="M14,38 L50,18 L150,18 L186,38 L186,155 L100,242 L14,155 Z" fill="none" stroke="white" stroke-width="12" stroke-linejoin="miter"/>
      <path d="M14,38 L50,18 L150,18 L186,38 L186,155 L100,242 L14,155 Z" fill="#1c0800"/>
      <path d="M18,41 L53,22 L147,22 L182,41 L182,152 L100,235 L18,152 Z" fill="#8c1a08"/>
      <path d="M35,52 L66,36 L134,36 L165,52 L165,146 L100,215 L35,146 Z" fill="#a82010"/>
      <path d="M78,38 Q100,32 122,38 L134,48 Q100,42 66,48 Z" fill="#c43018" opacity="0.6"/>
    </svg>`;
    return L.divIcon({
      html: `<div class="custom-marker-inner custom-marker-shield" style="background:none;border:none;width:20px;height:26px">${shieldSvg}</div>`,
      className: 'custom-marker',
      iconSize: [20, 26],
      iconAnchor: [10, 26]
    });
  }

  return L.divIcon({
    html: `<div class="custom-marker-inner" style="background:${cat.color};color:${cat.color}">${cat.icon}</div>`,
    className: 'custom-marker',
    iconSize: [28, 28],
    iconAnchor: [14, 14]
  });
}

function initMapBindings(){
  const mapContainer = document.getElementById("leaflet-map");
  if(!mapContainer) return;
  
  // Clean up existing map
  if(leafletMap) {
    leafletMap.remove();
    leafletMap = null;
  }
  leafletMarkers = [];
  
  // Configure CRS for the custom tile map (matching leaflet.html exactly)
  const tileExtent = [0, -10000, 10000, 0];
  const mapMaxResolution = 1.0;
  const mapMinResolution = Math.pow(2, MAP_MAX_ZOOM) * mapMaxResolution;
  
  const crs = L.CRS.Simple;
  crs.transformation = new L.Transformation(1, -tileExtent[0], -1, tileExtent[3]);
  crs.scale = function(zoom) {
    return Math.pow(2, zoom) / mapMinResolution;
  };
  crs.zoom = function(scale) {
    return Math.log(scale * mapMinResolution) / Math.LN2;
  };
  
  // Create the map
  leafletMap = new L.Map('leaflet-map', {
    maxZoom: MAP_MAX_ZOOM,
    minZoom: MAP_MIN_ZOOM,
    crs: crs,
    zoomControl: false,
    attributionControl: true,
    zoomSnap: 0.25,
    zoomDelta: 0.25,
    zoomAnimation: true,
    fadeAnimation: false,
    markerZoomAnimation: true,
    scrollWheelZoom: true,
    wheelPxPerZoomLevel: 140,
    wheelDebounceTime: 20,
    renderer: L.canvas({tolerance: 0}),
  });
  const clampZoom = z => Math.min(MAP_MAX_ZOOM, Math.max(MAP_MIN_ZOOM, z));
  const animateZoomTo = (target, focusLatLng, duration = 180) => {
    if(!leafletMap) return;
    const endZoom = clampZoom(target);
    if(Math.abs(endZoom - leafletMap.getZoom()) < 0.001) return;
    const zoomOpts = {animate:true, duration:Math.max(0.12, duration / 1000)};
    if(focusLatLng) leafletMap.setZoomAround(focusLatLng, endZoom, zoomOpts);
    else leafletMap.setZoom(endZoom, zoomOpts);
  };

  // ── Smooth scroll-wheel zoom without tile blink ───────────────────────────
  // We accumulate wheel delta and drive zoom via setZoomAround with animate:true
  // but keep the duration very short so it feels instant while tiles stay loaded.
  (function(){
    let targetZoom = null;
    let focusLatLng = null;
    let wheelReset = null;
    let queued = false;

    mapContainer.addEventListener('wheel', function(e) {
      return;
      e.preventDefault();
      e.stopPropagation();

      let delta = e.deltaY;
      if (e.deltaMode === 1) delta *= 20;
      if (e.deltaMode === 2) delta *= 400;

      if (targetZoom === null) targetZoom = leafletMap.getZoom();
      targetZoom = clampZoom(targetZoom - delta * 0.0018);

      focusLatLng = leafletMap.containerPointToLatLng(
        leafletMap.mouseEventToContainerPoint(e)
      );

      // Cancel any pending commit
      if (wheelReset) clearTimeout(wheelReset);

      // Apply incrementally — tiny duration keeps tiles alive, no blink
      if (!queued) {
        queued = true;
        requestAnimationFrame(() => {
          queued = false;
          if (targetZoom !== null) animateZoomTo(targetZoom, focusLatLng, 160);
        });
      }

      // Reset target after scrolling stops so next gesture starts fresh
      wheelReset = setTimeout(() => {
        targetZoom = null;
        focusLatLng = null;
      }, 180);

    }, { passive: false });
  })();
  
  // Add tile layer
  const tileLayer = L.tileLayer('{z}/{x}/{y}.png', {
    minZoom: MAP_MIN_ZOOM,
    maxZoom: MAP_MAX_ZOOM,
    noWrap: true,
    tms: false,
    className: 'map-tiles',
    keepBuffer: 12,
    detectRetina: false,
    updateWhenIdle: false,
    updateInterval: 80,
    updateWhenZooming: true,
    opacity: 1
  }).addTo(leafletMap);
  
  // Hide tiles that fail to load (show ocean background instead of white)
  tileLayer.on('tileerror', function(e) {
    e.tile.style.display = 'none';
  });
  
  // Use full map extent like original leaflet.html
  const bounds = L.latLngBounds(
    crs.unproject(L.point(MAP_EXTENT[2], MAP_EXTENT[3])),
    crs.unproject(L.point(MAP_EXTENT[0], MAP_EXTENT[1]))
  );
  
  const center = crs.unproject(L.point(5000, -5000));
  leafletMap.setView(center, MAP_INITIAL_ZOOM);
  
  // Update zoom display as percentage
  const updateZoomDisplay = () => {
    const zoom = leafletMap.getZoom();
    const percent = Math.round((zoom / MAP_MAX_ZOOM) * 100);
    const zoomEl = document.getElementById("map-zoom-level");
    if(zoomEl) zoomEl.textContent = `${percent}%`;
  };
  
  leafletMap.on('zoom', updateZoomDisplay);  // Real-time during zoom
  leafletMap.on('zoomend', updateZoomDisplay);
  setTimeout(updateZoomDisplay, 100);
  
  // Update coordinates display on mouse move
  leafletMap.on('mousemove', e => {
    const coords = leafletToPercent(e.latlng.lat, e.latlng.lng);
    if(coords.x >= 0 && coords.x <= 100 && coords.y >= 0 && coords.y <= 100) {
      document.getElementById("map-coords").textContent = `X: ${coords.x.toFixed(1)}%, Y: ${coords.y.toFixed(1)}%`;
    }
  });
  
  // Add markers
  const markers = D.mapData || [];
  markers.forEach((m, i) => {
    const cat = MAP_CATEGORIES.find(c => c.id === m.category) || MAP_CATEGORIES[MAP_CATEGORIES.length-1];
    const latLng = percentToLeaflet(m.x, m.y);
    
    const marker = L.marker(latLng, {
      icon: createCustomIcon(cat, false, m.markerType),
      idx: i,
      cat: m.category,
      name: [m.name, m.markerType, m.region].filter(Boolean).join(" ").toLowerCase()
    }).addTo(leafletMap);
    
    marker.on('click', () => showMarkerInfo(i, marker));
    leafletMarkers.push(marker);
  });
  
  // Filter markers visibility
  const updateMarkerVisibility = () => {
    const searchTerm = (mapState.searchTerm||"").toLowerCase();
    
    leafletMarkers.forEach((marker, i) => {
      const m = D.mapData[i];
      if(!m) return;
      
      const cat = m.category;
      const haystack = [m.name, m.markerType, m.region, m.notes].filter(Boolean).join(" ").toLowerCase();
      const hiddenByCat = !!mapState.hiddenCats[cat];
      const hiddenByType = !hiddenByCat && !!(mapState.hiddenTypes?.[cat]?.[m.markerType]);
      const hiddenBySearch = !!(searchTerm && !haystack.includes(searchTerm));
      
      const iconEl = marker.getElement()?.querySelector('.custom-marker-inner');
      if(iconEl) {
        iconEl.classList.toggle('hidden', hiddenByCat || hiddenByType);
        iconEl.classList.toggle('dimmed', !hiddenByCat && !hiddenByType && hiddenBySearch);
      }
    });

    // Update the selected location footer in sidebar
    const footerEl = document.querySelector(".map-sb-footer");
    if(footerEl){
      const sel = mapState.selectedMarker ? D.mapData.find(m=>m.id===mapState.selectedMarker) : null;
      if(sel){
        footerEl.innerHTML = `<div class="map-sb-footer-label">Selected Location</div>
          <div class="map-sel-name">${sel.name||sel.markerType}</div>
          <div class="map-sel-type">${sel.markerType||""}${sel.region?` · ${sel.region}`:""}</div>
          ${sel.notes?`<div class="map-sel-notes">${sel.notes}</div>`:""}
          <div class="map-sel-coords">x:${sel.x?.toFixed(4)} y:${sel.y?.toFixed(4)}</div>`;
      } else {
        footerEl.innerHTML = `<div class="map-sb-footer-label">Selected Location</div>
          <div class="map-sel-empty">No location selected</div>
          <div style="font-size:10px;color:var(--tm);margin-top:2px">Click a marker to see details</div>`;
      }
    }
  };
  // Expose to module level so sidebar buttons can call it without re-rendering Leaflet
  _updateMarkerVisibility = updateMarkerVisibility;
  
  // Show marker info panel
  function showMarkerInfo(idx, marker) {
    const m = D.mapData[idx];
    if(!m) return;
    
    leafletMarkers.forEach(mk => {
      const el = mk.getElement()?.querySelector('.custom-marker-inner');
      if(el) el.classList.remove('selected');
    });
    const el = marker.getElement()?.querySelector('.custom-marker-inner');
    if(el) el.classList.add('selected');

    // Update sidebar footer with selected marker
    mapState.selectedMarker = m.id;
    const footerEl = document.querySelector(".map-sb-footer");
    if(footerEl){
      footerEl.innerHTML = `<div class="map-sb-footer-label">Selected Location</div>
        <div class="map-sel-name">${m.name||m.markerType}</div>
        <div class="map-sel-type">${m.markerType||""}${m.region?` · ${m.region}`:""}</div>
        ${m.notes?`<div class="map-sel-notes">${m.notes}</div>`:""}
        <div class="map-sel-coords">x:${m.x?.toFixed(4)} y:${m.y?.toFixed(4)}</div>`;
    }
    
    const cat = MAP_CATEGORIES.find(c => c.id === m.category) || MAP_CATEGORIES[MAP_CATEGORIES.length-1];
    const panel = document.getElementById("map-info");
    const regionTag = m.region ? `<span style="font-size:10px;color:var(--ac);background:var(--acg);padding:1px 6px;border-radius:10px">${m.region}</span>` : "";
    
    // Nation location — open full modal window instead of side panel
    if(m.category === "guild") {
      modalNationLocation(m, idx);
      return;
    } else {
      // Standard marker popup
      panel.style.width = "280px";
      const typeLabel = m.markerType || m.name || "";
      panel.innerHTML = `
        <div class="map-info-name"><span>${cat.icon}</span>${m.locationName||typeLabel}${regionTag}</div>
        <div class="map-info-cat">${cat.name}</div>
        ${m.notes ? `<div class="map-info-notes">${m.notes}</div>` : ""}
        <div class="map-info-meta">Added by ${m.addedBy || "Unknown"} • ${m.addedDate ? new Date(m.addedDate).toLocaleDateString() : ""}</div>
        ${isContributor() ? `<div class="map-info-actions"><button class="btn bg bs" id="map-edit-marker" data-idx="${idx}">✎ Edit</button><button class="btn bd bs" id="map-delete-marker" data-idx="${idx}">✕ Delete</button></div>` : ""}
      `;
    }
    
    panel.style.display = "block";
    
    document.getElementById("map-edit-marker")?.addEventListener("click", () => modalEditMarker(idx));
    document.getElementById("map-delete-marker")?.addEventListener("click", () => {
      if(confirm(`Delete marker "${m.name}"?`)) {
        D.mapData.splice(idx, 1);
        persist();
        addLog("Map Marker Deleted", m.name);
        render();
        toast("Marker deleted");
      }
    });
  }
  
  // Click on map to close panels or place marker
  leafletMap.on('click', e => {
    if(mapState.addingMarker) {
      // Place temp marker
      const coords = leafletToPercent(e.latlng.lat, e.latlng.lng);
      if(coords.x < 0 || coords.x > 100 || coords.y < 0 || coords.y > 100) return;
      
      mapNewCoords = coords;
      
      // Remove existing temp marker
      if(tempLeafletMarker) {
        leafletMap.removeLayer(tempLeafletMarker);
      }
      
      // Create temp marker
      const cat = document.getElementById("map-new-cat")?.value || "other";
      const catObj = MAP_CATEGORIES.find(c => c.id === cat) || MAP_CATEGORIES[MAP_CATEGORIES.length-1];
      
      tempLeafletMarker = L.marker(e.latlng, {
        icon: L.divIcon({
          html: `<div class="temp-marker-inner">${catObj.icon}</div>`,
          className: 'custom-marker',
          iconSize: [32, 32],
          iconAnchor: [16, 16]
        })
      }).addTo(leafletMap);
      
      document.getElementById("map-new-coords").textContent = `Position: ${coords.x.toFixed(1)}%, ${coords.y.toFixed(1)}%`;
      document.getElementById("map-confirm-add").disabled = false;
    } else {
      // Close panels
      leafletMarkers.forEach(mk => {
        const el = mk.getElement()?.querySelector('.custom-marker-inner');
        if(el) el.classList.remove('selected');
      });
      document.getElementById("map-info").style.display = "none";
      document.getElementById("map-search-results").style.display = "none";
    }
  });
  
  // Toolbar buttons
  document.getElementById("map-zoom-in")?.addEventListener("click", () => {
    animateZoomTo(leafletMap.getZoom() + 0.75, leafletMap.getCenter(), 220);
  });
  
  document.getElementById("map-zoom-out")?.addEventListener("click", () => {
    animateZoomTo(leafletMap.getZoom() - 0.75, leafletMap.getCenter(), 220);
  });
  
  document.getElementById("map-reset")?.addEventListener("click", () => {
    const center = crs.unproject(L.point(5000, -5000));
    leafletMap.panTo(center, {animate:true, duration:0.25});
    animateZoomTo(MAP_INITIAL_ZOOM, center, 260);
  });
  
  // Search functionality
  const searchInput = document.getElementById("map-search");
  const searchClear = document.getElementById("map-search-clear");
  const searchResults = document.getElementById("map-search-results");
  
  const updateSearchResults = () => {
    if(!searchResults) return;
    const term = mapState.searchTerm.toLowerCase();
    searchClear.style.display = term ? "block" : "none";
    
    if(!term) {
      searchResults.style.display = "none";
      updateMarkerVisibility();
      return;
    }
    
    const dataMarkers = D.mapData || [];
    const matches = dataMarkers.map((m, i) => ({...m, idx: i})).filter(m => {
      const haystack = [m.name, m.markerType, m.region, m.notes].filter(Boolean).join(" ").toLowerCase();
      return haystack.includes(term);
    });
    
    if(matches.length === 0) {
      searchResults.innerHTML = `<div class="sr-header">No results for "${term}"</div><div class="sr-empty">Try a different search term</div>`;
    } else {
      let html = `<div class="sr-header"><span>${matches.length} result${matches.length > 1 ? "s" : ""}</span><button class="map-search-close" style="background:none;border:none;color:var(--tm);cursor:pointer">✕</button></div>`;
      matches.slice(0, 15).forEach(m => {
        const cat = MAP_CATEGORIES.find(c => c.id === m.category) || MAP_CATEGORIES[MAP_CATEGORIES.length-1];
        const displayName = m.markerType || m.name;
        const subLabel = m.region ? `${cat.name} • ${m.region}` : cat.name;
        html += `<div class="sr-item" data-idx="${m.idx}"><span class="sr-icon" style="background:${cat.color}">${cat.icon}</span><div class="sr-info"><div class="sr-name">${displayName}</div><div class="sr-cat">${subLabel}</div></div></div>`;
      });
      if(matches.length > 15) html += `<div class="sr-empty">...and ${matches.length - 15} more</div>`;
      searchResults.innerHTML = html;
      
      // Bind clicks
      searchResults.querySelectorAll(".sr-item").forEach(item => {
        item.addEventListener("click", () => {
          const idx = parseInt(item.dataset.idx);
          const m = D.mapData[idx];
          if(!m) return;
          
          // Pan to marker
          const latLng = percentToLeaflet(m.x, m.y);
          leafletMap.setView(latLng, Math.max(3, leafletMap.getZoom()));
          
          // Show marker info
          if(leafletMarkers[idx]) {
            showMarkerInfo(idx, leafletMarkers[idx]);
          }
          
          searchResults.style.display = "none";
          searchInput.blur();
        });
      });
      
      searchResults.querySelector(".map-search-close")?.addEventListener("click", () => {
        mapState.searchTerm = "";
        searchInput.value = "";
        updateSearchResults();
      });
    }
    searchResults.style.display = "block";
    updateMarkerVisibility();
  };
  
  searchInput?.addEventListener("input", e => {
    mapState.searchTerm = e.target.value;
    updateSearchResults();
  });
  
  searchInput?.addEventListener("focus", () => {
    if(mapState.searchTerm) updateSearchResults();
  });
  
  searchClear?.addEventListener("click", () => {
    mapState.searchTerm = "";
    searchInput.value = "";
    searchInput.focus();
    updateSearchResults();
  });
  
  // New map sidebar bindings
  bindMapSidebarEvents(()=>refreshMapSidebar());
  
  // Add marker mode
  document.getElementById("map-add-marker")?.addEventListener("click", function() {
    mapState.addingMarker = !mapState.addingMarker;
    this.classList.toggle("active", mapState.addingMarker);
    document.getElementById("map-add-panel").style.display = mapState.addingMarker ? "block" : "none";
    
    // Change cursor
    const container = document.getElementById("leaflet-map");
    if(container) {
      container.style.cursor = mapState.addingMarker ? "crosshair" : "";
    }
    
    if(!mapState.addingMarker) {
      if(tempLeafletMarker) {
        leafletMap.removeLayer(tempLeafletMarker);
        tempLeafletMarker = null;
      }
      mapNewCoords = null;
      if(document.getElementById("map-new-notes")) document.getElementById("map-new-notes").value = "";
      if(document.getElementById("map-new-coords")) document.getElementById("map-new-coords").textContent = "Position: --";
      if(document.getElementById("map-confirm-add")) document.getElementById("map-confirm-add").disabled = true;
    }
    document.getElementById("map-info").style.display = "none";
  });
  
  document.getElementById("map-cancel-add")?.addEventListener("click", () => {
    document.getElementById("map-add-marker")?.click();
  });
  
  // Helper: repopulate the type dropdown when category changes
  function updateTypeDropdown(catId) {
    const typeEl = document.getElementById("map-new-type");
    if(!typeEl) return;
    const types = GV_MARKER_TYPES[catId] || ["Other"];
    typeEl.innerHTML = types.map(t=>`<option>${t}</option>`).join("");
  }

  // Config per location type: {title, col1, col2}
  const LOC_RES_CONFIG = {
    Mine:      {title:"⛏ Mine Resources",      col1:"Veins",    col2:"Deposits"},
    Farm:      {title:"🌾 Farm Produce",        col1:"Qty",      col2:"Notes"},
    Lumbermill:{title:"🪵 Lumbermill Resources", col1:"Qty",      col2:"Notes"}
  };
  function updateLocResVisibility(){
    const t=document.getElementById("map-new-type")?.value||"";
    const c=document.getElementById("map-new-cat")?.value||"";
    const cfg=LOC_RES_CONFIG[t];
    const panel=document.getElementById("map-loc-resources");
    if(!panel)return;
    if(c==="guild"&&cfg){
      panel.style.display="block";
      const title=document.getElementById("map-loc-res-title");
      const h1=document.getElementById("map-loc-col1-hdr");
      const h2=document.getElementById("map-loc-col2-hdr");
      if(title)title.textContent=cfg.title;
      if(h1)h1.textContent=cfg.col1;
      if(h2)h2.textContent=cfg.col2;
    } else {
      panel.style.display="none";
    }
  }
  function addLocResRow(listEl,name,col1,col2){
    name=name||""; col1=col1||""; col2=col2||"";
    const row=document.createElement("div");
    row.className="loc-res-row";
    row.style.cssText="display:grid;grid-template-columns:1fr 65px 75px 22px;gap:4px;align-items:center";
    row.innerHTML=
      `<input class="inp loc-res-name" type="text" value="${name}" placeholder="e.g. Iron Ore..." style="padding:4px 6px;font-size:11px">`+
      `<input class="inp loc-res-col1" type="text" value="${col1}" placeholder="0" style="padding:4px 6px;font-size:11px;text-align:center">`+
      `<input class="inp loc-res-col2" type="text" value="${col2}" placeholder="—" style="padding:4px 6px;font-size:11px;text-align:center">`+
      `<button type="button" class="btn bd bs" style="padding:2px 5px;font-size:11px">✕</button>`;
    row.querySelector(".btn.bd").addEventListener("click",()=>row.remove());
    listEl.appendChild(row);
  }
  function getLocResRows(listId){
    return Array.from(document.querySelectorAll("#"+listId+" .loc-res-row")).map(row=>({
      resource:row.querySelector(".loc-res-name")?.value.trim()||"",
      col1:row.querySelector(".loc-res-col1")?.value.trim()||"",
      col2:row.querySelector(".loc-res-col2")?.value.trim()||""
    })).filter(r=>r.resource);
  }
  // Keep getMineRows as alias for backward compat
  function getMineRows(listId){ return getLocResRows(listId); }

  document.getElementById("map-new-cat")?.addEventListener("change", function() {
    updateTypeDropdown(this.value);
    const extras = document.getElementById("map-nation-extras");
    if(extras) extras.style.display = this.value === "guild" ? "block" : "none";
    updateLocResVisibility();
    // Update temp marker icon
    if(tempLeafletMarker && mapNewCoords) {
      const catObj = MAP_CATEGORIES.find(c => c.id === this.value) || MAP_CATEGORIES[MAP_CATEGORIES.length-1];
      const latLng = percentToLeaflet(mapNewCoords.x, mapNewCoords.y);
      
      leafletMap.removeLayer(tempLeafletMarker);
      tempLeafletMarker = L.marker(latLng, {
        icon: L.divIcon({
          html: `<div class="temp-marker-inner">${catObj.icon}</div>`,
          className: 'custom-marker',
          iconSize: [32, 32],
          iconAnchor: [16, 16]
        })
      }).addTo(leafletMap);
    }
  });
  
  document.getElementById("map-new-type")?.addEventListener("change", updateLocResVisibility);
  document.getElementById("map-add-resource-row")?.addEventListener("click",()=>{
    const list=document.getElementById("map-loc-resource-list");
    if(list) addLocResRow(list);
  });

  document.getElementById("map-confirm-add")?.addEventListener("click", () => {
    if(!mapNewCoords) { toast("Click on the map to place marker", "error"); return; }
    
    const catId = document.getElementById("map-new-cat")?.value || "other";
    const markerType = document.getElementById("map-new-type")?.value || "";
    const region = document.getElementById("map-new-region")?.value || "";
    // Auto-name from type + optional region
    const autoName = region ? `${markerType} (${region})` : markerType;
    
    const locationName = document.getElementById("map-new-name")?.value.trim() || "";
    const displayName = locationName || autoName;
    const nationData = catId === "guild" ? {
      locationName,
      has_market: document.getElementById("has_market")?.checked||false,
      has_logistician: document.getElementById("has_logistician")?.checked||false,
      has_depot: document.getElementById("has_depot")?.checked||false,
      has_crafting_district: document.getElementById("has_crafting_district")?.checked||false,
      workshops: (document.getElementById("map-new-workshops")?.value||"").split(",").map(s=>s.trim()).filter(Boolean),
      cityLink: document.getElementById("map-new-city-link")?.value||"",
      locResources: (markerType==="Mine"||markerType==="Farm"||markerType==="Lumbermill") ? getLocResRows("map-loc-resource-list") : [],
      locResType: markerType
    } : {};
    const marker = {
      id: Date.now(),
      name: displayName,
      markerType,
      region,
      category: catId,
      notes: document.getElementById("map-new-notes")?.value.trim() || "",
      x: mapNewCoords.x,
      y: mapNewCoords.y,
      addedBy: currentUser?.displayName || "Unknown",
      addedDate: new Date().toISOString(),
      ...nationData
    };
    D.mapData.push(marker);
    persist();
    addLog("Map Marker Added", displayName);
    mapNewCoords = null;
    render();
    toast(`Marker "${autoName}" added!`);
  });
  
  // Initial visibility update
  updateMarkerVisibility();
}

// Module-level marker visibility updater — called by sidebar buttons without re-rendering Leaflet
let _updateMarkerVisibility = null;

function refreshMapSidebar(){
  // Rebuild just the sidebar HTML without touching the Leaflet map
  const sbPanel = document.getElementById("map-sidebar-panel");
  if(!sbPanel) return;
  sbPanel.innerHTML = buildMapSidebarHTML();
  // Re-bind sidebar events, passing a lightweight updater instead of full rerender
  bindMapSidebarEvents(()=>{
    refreshMapSidebar();
    if(_updateMarkerVisibility) _updateMarkerVisibility();
  });
  // Update marker visibility on map
  if(_updateMarkerVisibility) _updateMarkerVisibility();
}

      let left=rect.left - pw - 10;

    });

}
