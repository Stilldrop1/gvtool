  const marker=D.mapData[idx];
  if(!marker)return;
  
  let catOpts="";
  MAP_CATEGORIES.forEach(c=>{catOpts+=`<option value="${c.id}"${marker.category===c.id?" selected":""}>${c.icon} ${c.name}</option>`});
  
  const currCat=marker.category||"other";
  const types=GV_MARKER_TYPES[currCat]||["Other"];
  let typeOpts=types.map(t=>`<option${marker.markerType===t?" selected":""}>${t}</option>`).join("");
  
  let regionOpts=`<option value="">— Any —</option>`+GV_REGIONS.map(r=>`<option${marker.region===r?" selected":""}>${r}</option>`).join("");
  
  const isNation=currCat==="guild";
  const featFields=[{id:"has_market",l:"🛒 Market"},{id:"has_logistician",l:"📦 Logistician"},{id:"has_depot",l:"🏬 Depot"},{id:"has_crafting_district",l:"⚒ Crafting District"}];
  openModal("Edit Marker",body=>{
    body.innerHTML=`
      <div class="fg"><label class="fl">Category</label><select class="inp" id="edit-marker-cat">${catOpts}</select></div>
      <div class="fg"><label class="fl">Type</label><select class="inp" id="edit-marker-type">${typeOpts}</select></div>
      <div class="fg"><label class="fl">Name / Location</label><input class="inp" id="edit-marker-name" value="${marker.locationName||marker.name||""}" placeholder="e.g. Dunfen, Iron Keep..."></div>
      <div class="fg"><label class="fl">Region</label><select class="inp" id="edit-marker-region">${regionOpts}</select></div>
      <div id="edit-nation-extras" style="display:${isNation?"block":"none"}">
        <div style="font-size:10px;font-weight:600;color:var(--ac);text-transform:uppercase;letter-spacing:.05em;margin:8px 0 6px">Location Features</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px">
          ${featFields.map(f=>`<label style="display:flex;align-items:center;gap:5px;padding:4px 8px;background:var(--bgi);border:1px solid var(--bd);border-radius:4px;cursor:pointer;font-size:11px;user-select:none"><input type="checkbox" id="edit-${f.id}" ${marker[f.id]?"checked":""} style="accent-color:var(--ac)"> ${f.l}</label>`).join("")}
        </div>
        <div class="fg"><label class="fl">Workshops</label><input class="inp" id="edit-workshops" value="${(marker.workshops||[]).join(", ")}" placeholder="e.g. Blacksmith, Tannery..."></div>
        ${(()=>{const mt=marker.markerType||"";const cfg={"Mine":{title:"⛏ Mine Resources",col1:"Veins",col2:"Deposits"},"Farm":{title:"🌾 Farm Produce",col1:"Qty",col2:"Notes"},"Lumbermill":{title:"🪵 Lumbermill Resources",col1:"Qty",col2:"Notes"}}[mt];if(!cfg||currCat!=="guild")return"";const rows=(marker.locResources||marker.mineResources||[]).map(r=>`<div class="loc-res-row" style="display:grid;grid-template-columns:1fr 65px 75px 22px;gap:4px;align-items:center"><input class="inp loc-res-name" type="text" value="${r.resource||""}" placeholder="e.g. Iron Ore..." style="padding:4px 6px;font-size:11px"><input class="inp loc-res-col1" type="text" value="${r.col1||r.veins||""}" placeholder="0" style="padding:4px 6px;font-size:11px;text-align:center"><input class="inp loc-res-col2" type="text" value="${r.col2||r.deposits||""}" placeholder="—" style="padding:4px 6px;font-size:11px;text-align:center"><button type="button" class="btn bd bs loc-res-del-edit" style="padding:2px 5px">✕</button></div>`).join("");return`<div id="edit-loc-resources"><div style="font-size:10px;font-weight:600;color:var(--ac);text-transform:uppercase;letter-spacing:.05em;margin:8px 0 4px">${cfg.title}</div><div style="display:grid;grid-template-columns:1fr 65px 75px 22px;gap:4px;font-size:9px;color:var(--tm);font-weight:600;padding:0 2px;margin-bottom:4px"><span>Name</span><span style="text-align:center">${cfg.col1}</span><span style="text-align:center">${cfg.col2}</span><span></span></div><div id="edit-loc-res-list" style="display:flex;flex-direction:column;gap:4px;max-height:180px;overflow-y:auto;margin-bottom:6px">${rows}</div><button type="button" class="btn bg bs" id="edit-add-res-row" style="width:100%;justify-content:center;font-size:11px">+ Add Row</button></div>`;})()}
        <div class="fg"><label class="fl">Linked City (Item Search)</label><select class="inp" id="edit-city-link"><option value="">— None —</option>${D.cities.map(c=>`<option value="${c.id}"${marker.cityLink===c.id?" selected":""}>${c.name}</option>`).join("")}</select></div>
      </div>
      <div class="fg"><label class="fl">Notes</label><textarea class="inp" id="edit-marker-notes" rows="3">${marker.notes||""}</textarea></div>
      <div class="actions"><button class="btn bg" onclick="closeModal()">Cancel</button><button class="btn bp" id="save-marker">Save</button></div>
    `;
    body.querySelectorAll(".loc-res-del-edit").forEach(btn=>btn.addEventListener("click",()=>btn.closest(".loc-res-row").remove()));
    document.getElementById("edit-add-res-row")?.addEventListener("click",()=>addLocResRow(document.getElementById("edit-loc-res-list")));
    document.getElementById("edit-marker-type")?.addEventListener("change",function(){
      // rebuild loc-resources block when type changes in edit
      const mt=this.value;
      const cfg={"Mine":{title:"⛏ Mine Resources",col1:"Veins",col2:"Deposits"},"Farm":{title:"🌾 Farm Produce",col1:"Qty",col2:"Notes"},"Lumbermill":{title:"🪵 Lumbermill Resources",col1:"Qty",col2:"Notes"}}[mt];
      const existing=document.getElementById("edit-loc-resources");
      const cat=document.getElementById("edit-marker-cat")?.value||"";
      if(existing)existing.remove();
      if(cfg&&cat==="guild"){
        const container=document.getElementById("edit-nation-extras");
        if(!container)return;
        const div=document.createElement("div");
        div.id="edit-loc-resources";
        div.innerHTML=`<div style="font-size:10px;font-weight:600;color:var(--ac);text-transform:uppercase;letter-spacing:.05em;margin:8px 0 4px">${cfg.title}</div><div style="display:grid;grid-template-columns:1fr 65px 75px 22px;gap:4px;font-size:9px;color:var(--tm);font-weight:600;padding:0 2px;margin-bottom:4px"><span>Name</span><span style="text-align:center">${cfg.col1}</span><span style="text-align:center">${cfg.col2}</span><span></span></div><div id="edit-loc-res-list" style="display:flex;flex-direction:column;gap:4px;max-height:180px;overflow-y:auto;margin-bottom:6px"></div><button type="button" class="btn bg bs" id="edit-add-res-row2" style="width:100%;justify-content:center;font-size:11px">+ Add Row</button>`;
        const ws=document.getElementById("edit-workshops");
        ws?container.insertBefore(div,ws.parentNode.nextSibling):container.appendChild(div);
        div.querySelector("#edit-add-res-row2")?.addEventListener("click",()=>addLocResRow(document.getElementById("edit-loc-res-list")));
      }
    });
    document.getElementById("edit-marker-cat")?.addEventListener("change",function(){
      const t=document.getElementById("edit-marker-type");
      if(!t)return;
      const ts=GV_MARKER_TYPES[this.value]||["Other"];
      t.innerHTML=ts.map(x=>`<option>${x}</option>`).join("");
      const ex=document.getElementById("edit-nation-extras");
      if(ex)ex.style.display=this.value==="guild"?"block":"none";
      updateEditMineVis();
    });
    document.getElementById("save-marker")?.addEventListener("click",()=>{
      const cat=document.getElementById("edit-marker-cat")?.value||"other";
      const mType=document.getElementById("edit-marker-type")?.value||"";
      const region=document.getElementById("edit-marker-region")?.value||"";
      const locationName=document.getElementById("edit-marker-name")?.value.trim()||"";
      const displayName=locationName||(region?`${mType} (${region})`:mType);
      marker.name=displayName;
      marker.locationName=locationName;
      marker.markerType=mType;
      marker.region=region;
      marker.category=cat;
      marker.notes=document.getElementById("edit-marker-notes")?.value.trim()||"";
      if(cat==="guild"){
        featFields.forEach(f=>{marker[f.id]=document.getElementById("edit-"+f.id)?.checked||false;});
        marker.workshops=(document.getElementById("edit-workshops")?.value||"").split(",").map(s=>s.trim()).filter(Boolean);
        marker.cityLink=document.getElementById("edit-city-link")?.value||"";
        marker.locResources=getLocResRows("edit-loc-res-list");
        marker.locResType=document.getElementById("edit-marker-type")?.value||marker.locResType||"";
        marker.mineResources=marker.locResources; // backward compat
      }
      persist();addLog("Map Marker Updated",displayName);closeModal();render();toast("Marker updated!");
    });
  });
}

const WIKI_CATEGORIES=["Getting Started","Combat","Crafting","Economy","Guilds","Map & Exploration","Classes & Builds","Events","Guides","Other"];

function wikiRenderBody(text){
  if(!text)return"";
  return text
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.+?)\*/g,"<em>$1</em>")
    .replace(/`(.+?)`/g,"<code>$1</code>")
    .replace(/^TIP: (.+)$/gm,'<div class="wiki-tip">💡 $1</div>')
    .replace(/^WARN: (.+)$/gm,'<div class="wiki-warn">⚠ $1</div>');
}

function pgWiki(){
  // Not logged in — show read-only list, prompt to log in to write
  // No guild needed to READ or WRITE wiki

  // Guild join page (shown when treasury tab clicked with no guild)
  if(pg==="wiki-join-guild"){
    const guilds=D.guilds.filter(g=>g.id!=="__legacy__");
    let h=`<div class="ph"><div class="pt">Join a Guild</div></div>`;
    if(!currentUser){
      h+=`<div class="card" style="text-align:center;padding:32px"><div style="font-size:40px;margin-bottom:12px">🔐</div><div style="font-size:16px;font-weight:600;margin-bottom:8px">Sign in Required</div><div style="font-size:13px;color:var(--tm);margin-bottom:16px">You need an account to access the Guild Manager.</div><button class="btn bp" id="wiki-goto-login">Sign In</button></div>`;
      return h;
    }
    if(currentUser.status==="pending"){
      const pendingGuild=D.guilds.find(g=>g.id===currentUser.guildId);
      h+=`<div class="card" style="border-color:var(--org);text-align:center;padding:32px"><div style="font-size:40px;margin-bottom:12px">⏳</div><div style="font-size:16px;font-weight:600;margin-bottom:8px">Application Pending</div><div style="font-size:13px;color:var(--t2)">Your application to join <strong>${pendingGuild?.name||"a guild"}</strong> is waiting for approval from the Guild Leader.</div></div>`;
      return h;
    }
    h+=`<div style="font-size:13px;color:var(--tm);margin-bottom:18px">You're not in a guild yet. Apply to join one below — the Guild Leader will approve your request.</div>`;
    if(!guilds.length){
      h+=`<div class="card">${empty("🏰","No guilds yet","No guilds have been created yet. You can create the first one!")}</div>`;
    } else {
      guilds.forEach(g=>{
        const leader=D.users.find(u=>u.guildId===g.id&&u.role==="guild_leader");
        const members=D.p.filter(p=>p.guildId===g.id).length;
        const alreadyApplied=currentUser.guildId===g.id;
        h+=`<div class="card" style="display:flex;align-items:center;gap:14px;margin-bottom:10px">
          <div style="width:42px;height:42px;border-radius:8px;background:var(--acg);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">🏰</div>
          <div style="flex:1">
            <div style="font-weight:600;font-size:14px">${g.name}</div>
            <div style="font-size:11px;color:var(--tm);margin-top:2px">Led by ${leader?.displayName||"Unknown"} · ${members} members</div>
          </div>
          ${alreadyApplied?`<span class="badge byl">Applied</span>`:`<button class="btn bp bs guild-apply-btn" data-guild-id="${g.id}" data-guild-name="${g.name.replace(/"/g,'&quot;')}">Apply</button>`}
        </div>`;
      });
    }
    h+=`<div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--bd);text-align:center">
      <div style="font-size:12px;color:var(--tm);margin-bottom:10px">Want to start your own guild instead?</div>
      <button class="btn bg bs" id="wiki-create-guild-btn">🏰 Create a Guild</button>
    </div>`;
    return h;
  }

  // Wiki article viewer
  if(pg==="wiki-article"&&F.wikiPage){
    const art=D.wikiPages.find(p=>p.id===F.wikiPage);
    if(!art){pg="wiki-home";F.wikiPage=null;return pgWiki();}
    // Increment views
    art.views=(art.views||0)+1;
    const sections=art.sections||[];
    let toc="";
    sections.forEach((s,i)=>{
      if(s.heading) toc+=`<a class="wiki-toc-item${s.level===2?" h2":""}" data-section-id="ws-${i}">${s.heading}</a>`;
    });
    let content=`<div class="wiki-article-title">${art.title}</div>`;
    content+=`<div class="wiki-article-meta">
      <span>📁 ${art.category||"Uncategorized"}</span>
      <span>✍ ${art.author}</span>
      <span>📅 ${fmtD(art.updatedDate||art.date)}</span>
      <span>👁 ${art.views} views</span>
      ${(art.tags||[]).map(t=>`<span class="tag" data-wiki-tag="${t}">${t}</span>`).join("")}
    </div>`;
    if(art.summary) content+=`<div style="font-size:13px;color:var(--t2);background:var(--bgi);border-left:3px solid var(--ac);padding:10px 14px;border-radius:0 5px 5px 0;margin-bottom:18px;line-height:1.6">${art.summary}</div>`;
    sections.forEach((s,i)=>{
      content+=`<div class="wiki-section" id="ws-${i}">`;
      if(s.heading) content+=`<div class="wiki-h${s.level||1}">${s.heading}</div>`;
      if(s.body) content+=`<div class="wiki-body">${wikiRenderBody(s.body)}</div>`;
      content+=`</div>`;
    });
    // Edit/delete for admins or author
    const canEdit=isSiteAdmin()||(currentUser&&currentUser.displayName===art.author);
    if(canEdit) content+=`<div style="display:flex;gap:8px;margin-top:24px;padding-top:14px;border-top:1px solid var(--bd)"><button class="btn bg bs" id="wiki-edit-published" data-id="${art.id}">✎ Edit</button>${isSiteAdmin()?`<button class="btn bd bs" id="wiki-delete-published" data-id="${art.id}">Delete</button>`:""}</div>`;
    let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><button class="btn bg bs" id="wiki-back-btn">← Back</button></div>`;
    h+=`<div class="wiki-layout"><div class="wiki-toc"><div class="wiki-toc-title">Contents</div>${toc}</div><div class="wiki-content">${content}</div></div>`;
    return h;
  }

  // Wiki editor (new or edit draft)
  if(pg==="wiki-new"||pg==="wiki-edit"){
    if(!currentUser){
      return`<div class="card" style="text-align:center;padding:32px"><div style="font-size:40px;margin-bottom:12px">🔐</div><div style="font-size:16px;font-weight:600;margin-bottom:8px">Sign in to Write</div><div style="font-size:13px;color:var(--tm);margin-bottom:16px">You need an account to write wiki articles.</div><button class="btn bp" id="wiki-goto-login">Sign In</button></div>`;
    }
    const draft=F.wikiEditDraft||(pg==="wiki-edit"&&F.wikiPage?(D.wikiPages.find(p=>p.id===F.wikiPage)||null):null);
    const sections=draft?.sections||[{heading:"",level:1,body:""}];
    let h=`<div class="ph"><div class="pt">${draft?"Edit Article":"Write Article"}</div><div style="display:flex;gap:6px"><button class="btn bg bs" id="wiki-save-draft-btn">💾 Save Draft</button><button class="btn bp bs" id="wiki-submit-btn">📤 Submit for Review</button></div></div>`;
    h+=`<div class="card" style="margin-bottom:12px">
      <div class="fg"><label class="fl">Title *</label><input class="inp" id="wiki-title" placeholder="Article title..." value="${draft?.title?.replace(/"/g,'&quot;')||""}"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="fg"><label class="fl">Category</label><select class="inp" id="wiki-category">${WIKI_CATEGORIES.map(c=>`<option${draft?.category===c?" selected":""}>${c}</option>`).join("")}</select></div>
        <div class="fg"><label class="fl">Tags (comma-separated)</label><input class="inp" id="wiki-tags" placeholder="e.g. combat, beginner" value="${(draft?.tags||[]).join(", ")}"></div>
      </div>
      <div class="fg"><label class="fl">Summary / Introduction</label><textarea class="inp" id="wiki-summary" rows="3" placeholder="A brief overview shown at the top of the article...">${draft?.summary||""}</textarea></div>
    </div>`;
    h+=`<div id="wiki-sections-list">`;
    sections.forEach((s,i)=>{
      h+=`<div class="wiki-editor-section" data-sec-idx="${i}">
        <div class="wiki-editor-section-handle">
          <span>Section ${i+1}</span>
          <div style="display:flex;gap:4px">
            <select class="inp" id="wiki-sec-level-${i}" style="width:100px;padding:2px 6px;font-size:11px">
              <option value="1"${s.level===1?" selected":""}>H1 — Heading</option>
              <option value="2"${s.level===2?" selected":""}>H2 — Subheading</option>
              <option value="0"${s.level===0?" selected":""}>Body only</option>
            </select>
            <button class="btn bd bs wiki-remove-section" data-idx="${i}" style="font-size:10px">✕</button>
          </div>
        </div>
        <input class="inp" id="wiki-sec-heading-${i}" placeholder="Section heading (optional)" value="${(s.heading||"").replace(/"/g,'&quot;')}" style="margin-bottom:6px">
        <textarea class="inp" id="wiki-sec-body-${i}" rows="5" placeholder="Content... Use **bold**, *italic*, \`code\`, TIP: text, WARN: text">${s.body||""}</textarea>
      </div>`;
    });
    h+=`</div>`;
    h+=`<button class="btn bg bs" id="wiki-add-section-btn" style="margin-top:4px">+ Add Section</button>`;
    h+=`<div style="font-size:11px;color:var(--tm);margin-top:10px">💡 Formatting: **bold** · *italic* · \`code\` · TIP: text (tip box) · WARN: text (warning box)</div>`;
    return h;
  }

  // My drafts page
  if(pg==="wiki-drafts"){
    if(!currentUser) return`<div class="card">${empty("🔐","Sign in required","")}</div>`;
    const myDrafts=(D.wikiDrafts||[]).filter(d=>d.authorId===currentUser.id);
    let h=`<div class="ph"><div class="pt">My Drafts</div><button class="btn bp bs" id="wiki-new-btn2">+ New Article</button></div>`;
    if(!myDrafts.length) return h+`<div class="card">${empty("📝","No drafts yet","Write an article and submit it for review.")}</div>`;
    myDrafts.slice().reverse().forEach(d=>{
      const statusColor=d.status==="rejected"?"var(--red)":d.status==="pending"?"var(--org)":"var(--grn)";
      const statusLabel=d.status==="rejected"?"Rejected":d.status==="pending"?"Pending Review":"Published";
      h+=`<div class="wiki-draft-card ${d.status||"pending"}">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
          <div><div style="font-weight:600;font-size:14px">${d.title}</div><div style="font-size:11px;color:var(--tm);margin-top:2px">Submitted ${fmtD(d.submittedDate)} · ${d.category||"Uncategorized"}</div></div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:11px;font-weight:600;color:${statusColor}">${statusLabel}</span>
            ${d.status==="rejected"||d.status==="pending"?`<button class="btn bg bs wiki-edit-draft-btn" data-id="${d.id}">✎ Edit</button>`:""}
            <button class="btn bd bs wiki-delete-draft-btn" data-id="${d.id}">✕</button>
          </div>
        </div>
        ${d.status==="rejected"&&d.rejectReason?`<div style="margin-top:8px;padding:8px 10px;background:var(--redd);border:1px solid rgba(229,83,75,.25);border-radius:4px;font-size:11px;color:var(--red)">❌ Rejection reason: ${d.rejectReason}</div>`:""}
      </div>`;
    });
    return h;
  }

  // Admin review queue
  if(pg==="wiki-review"){
    if(!isSiteAdmin()) return`<div class="card">${empty("🔒","Admins Only","")}</div>`;
    const pending=(D.wikiDrafts||[]).filter(d=>d.status==="pending");
    let h=`<div class="ph"><div class="pt">Review Queue</div><span style="font-size:13px;color:var(--tm)">${pending.length} pending</span></div>`;
    if(!pending.length) return h+`<div class="card">${empty("✅","All caught up","No articles waiting for review.")}</div>`;
    pending.forEach(d=>{
      h+=`<div class="wiki-draft-card pending">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px">
          <div>
            <div style="font-weight:600;font-size:14px">${d.title}</div>
            <div style="font-size:11px;color:var(--tm);margin-top:2px">by ${d.authorName} · ${d.category||"Uncategorized"} · submitted ${fmtD(d.submittedDate)}</div>
            ${(d.tags||[]).length?`<div style="margin-top:4px">${d.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>`:""}
          </div>
        </div>
        ${d.summary?`<div style="font-size:12px;color:var(--t2);background:var(--bgi);padding:8px 10px;border-radius:4px;margin-bottom:10px;line-height:1.5">${d.summary}</div>`:""}
        ${(d.sections||[]).map(s=>`<div style="margin-bottom:8px">${s.heading?`<div style="font-size:12px;font-weight:600;color:var(--ac);margin-bottom:4px">${s.heading}</div>`:""}<div style="font-size:12px;color:var(--t2);white-space:pre-wrap;max-height:80px;overflow:hidden">${s.body||""}</div></div>`).join("")}
        <div style="display:flex;gap:6px;margin-top:12px;padding-top:10px;border-top:1px solid var(--bd)">
          <button class="btn bgrn bs wiki-publish-btn" data-id="${d.id}">✓ Publish</button>
          <button class="btn bg bs wiki-review-edit-btn" data-id="${d.id}">✎ Edit & Publish</button>
          <button class="btn bd bs wiki-reject-btn" data-id="${d.id}">✕ Reject</button>
        </div>
      </div>`;
    });
    return h;
  }

  // ── Default: article list ───────────────────────────────
  const pages=D.wikiPages||[];
  const search=(F.wikiSearch||"").toLowerCase();
  const catFilter=F.wikiCat||"";
  let filtered=pages.filter(p=>{
    if(catFilter&&p.category!==catFilter)return false;
    if(search){
      const hay=[p.title,p.category,...(p.tags||[]),p.summary||""].join(" ").toLowerCase();
      return hay.includes(search);
    }
    return true;
  });

  let h=`<div class="ph">
    <div class="pt">Wiki${catFilter?` — ${catFilter}`:""}</div>
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      ${catFilter?`<button class="btn bg bs" id="wiki-clear-cat">✕ ${catFilter}</button>`:""}
      <button class="btn bp bs" id="wiki-new-btn">✏ Write Article</button>
    </div>
  </div>`;

  // Search bar
  h+=`<div class="sb" style="margin-bottom:14px"><span style="color:var(--tm);padding:0 4px">🔍</span><input id="wiki-search-inp" placeholder="Search articles..." value="${F.wikiSearch||""}"></div>`;

  if(!filtered.length){
    h+=pages.length
      ? `<div class="card">${empty("🔍","No articles found","Try a different search or category.")}</div>`
      : `<div class="card">${empty("📖","Wiki is empty","Be the first to write an article! Click 'Write Article' to get started.")}</div>`;
    return h;
  }

  // Group by category if no filter
  if(!catFilter){
    const byCat={};
    filtered.forEach(p=>{const c=p.category||"Other";if(!byCat[c])byCat[c]=[];byCat[c].push(p);});
    Object.keys(byCat).sort().forEach(cat=>{
      h+=`<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ac);margin:16px 0 8px">${cat}</div>`;
      h+=`<div class="wiki-card-grid">`;
      byCat[cat].forEach(p=>{
        h+=`<div class="wiki-card wiki-open-article" data-id="${p.id}">
          <div class="wiki-card-title">${p.title}</div>
          <div style="font-size:11px;color:var(--tm);margin-bottom:6px">${p.summary?p.summary.slice(0,80)+(p.summary.length>80?"…":""):""}</div>
          ${(p.tags||[]).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join("")}
          <div class="wiki-card-meta"><span>✍ ${p.author}</span><span>👁 ${p.views||0}</span><span>📅 ${fmtD(p.updatedDate||p.date)}</span></div>
        </div>`;
      });
      h+=`</div>`;
    });
  } else {
    h+=`<div class="wiki-card-grid">`;
    filtered.forEach(p=>{
      h+=`<div class="wiki-card wiki-open-article" data-id="${p.id}">
        <div class="wiki-card-title">${p.title}</div>
        <div style="font-size:11px;color:var(--tm);margin-bottom:6px">${p.summary?p.summary.slice(0,80)+(p.summary.length>80?"…":""):""}</div>
        ${(p.tags||[]).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join("")}
        <div class="wiki-card-meta"><span>✍ ${p.author}</span><span>👁 ${p.views||0}</span></div>
      </div>`;
    });
    h+=`</div>`;
  }
  return h;
}

// ═══════════════════════════════════════════════════════════
// WIKI — EVENT BINDINGS
// ═══════════════════════════════════════════════════════════
function initWikiBindings(rerender){
  const re=typeof rerender==="function"?rerender:()=>render();

  // Helper: collect editor state into a draft object
  function collectDraft(){
    const title=document.getElementById("wiki-title")?.value.trim()||"";
    const category=document.getElementById("wiki-category")?.value||WIKI_CATEGORIES[0];
    const tagsRaw=document.getElementById("wiki-tags")?.value||"";
    const tags=tagsRaw.split(",").map(t=>t.trim()).filter(Boolean);
    const summary=document.getElementById("wiki-summary")?.value.trim()||"";
    const sectionEls=document.querySelectorAll(".wiki-editor-section");
    const sections=[];
    sectionEls.forEach(el=>{
      const i=el.dataset.secIdx;
      sections.push({
        heading:document.getElementById(`wiki-sec-heading-${i}`)?.value.trim()||"",
        level:parseInt(document.getElementById(`wiki-sec-level-${i}`)?.value||"1"),
        body:document.getElementById(`wiki-sec-body-${i}`)?.value||""
      });
    });
    return{title,category,tags,summary,sections};
  }

  // Open article
  document.querySelectorAll(".wiki-open-article").forEach(el=>{
    el.addEventListener("click",()=>{F.wikiPage=el.dataset.id;pg="wiki-article";re();});
  });

  // Back button
  document.getElementById("wiki-back-btn")?.addEventListener("click",()=>{F.wikiPage=null;pg="wiki-home";re();});

  // New article buttons
  document.getElementById("wiki-new-btn")?.addEventListener("click",()=>{F.wikiEditDraft=null;F.wikiPage=null;pg="wiki-new";re();});
  document.getElementById("wiki-new-btn2")?.addEventListener("click",()=>{F.wikiEditDraft=null;F.wikiPage=null;pg="wiki-new";re();});

  // Clear category filter
  document.getElementById("wiki-clear-cat")?.addEventListener("click",()=>{F.wikiCat="";re();});

  // Search
  document.getElementById("wiki-search-inp")?.addEventListener("input",e=>{F.wikiSearch=e.target.value;re();});

  // TOC smooth scroll
  document.querySelectorAll(".wiki-toc-item[data-section-id]").forEach(el=>{
    el.addEventListener("click",()=>{
      const target=document.getElementById(el.dataset.sectionId);
      if(target)target.scrollIntoView({behavior:"smooth",block:"start"});
    });
  });

  // Tag filter from article view
  document.querySelectorAll("[data-wiki-tag]").forEach(el=>{
    el.addEventListener("click",()=>{F.wikiSearch=el.dataset.wikiTag;F.wikiPage=null;pg="wiki-home";re();});
  });

  // Edit published article
  document.getElementById("wiki-edit-published")?.addEventListener("click",e=>{
    const art=D.wikiPages.find(p=>p.id===e.target.dataset.id);
    if(!art)return;
    F.wikiEditDraft={...art,_publishedId:art.id};
    pg="wiki-edit";re();
  });

  // Delete published article (admin only)
  document.getElementById("wiki-delete-published")?.addEventListener("click",e=>{
    confirmAction("Delete this article?",()=>{
      D.wikiPages=D.wikiPages.filter(p=>p.id!==e.target.dataset.id);
      F.wikiPage=null;pg="wiki-home";persist();re();toast("Article deleted!");
    });
  });

  // Add section
  document.getElementById("wiki-add-section-btn")?.addEventListener("click",()=>{
    const d=collectDraft();
    d.sections.push({heading:"",level:1,body:""});
    F.wikiEditDraft={...(F.wikiEditDraft||{}), ...d};
    re();
  });

  // Remove section
  document.querySelectorAll(".wiki-remove-section").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const d=collectDraft();
      const idx=parseInt(btn.dataset.idx);
      d.sections.splice(idx,1);
      if(!d.sections.length)d.sections.push({heading:"",level:1,body:""});
      F.wikiEditDraft={...(F.wikiEditDraft||{}), ...d};
      re();
    });
  });

  // Save draft locally
  document.getElementById("wiki-save-draft-btn")?.addEventListener("click",()=>{
    if(!currentUser){toast("Sign in to save","error");return;}
    const d=collectDraft();
    if(!d.title){toast("Title is required","error");return;}
    if(!F.wikiEditDraft)F.wikiEditDraft={};
    F.wikiEditDraft={...F.wikiEditDraft,...d};
    toast("Draft saved locally — use 'Submit for Review' to send it.");
  });

  // Submit for review
  document.getElementById("wiki-submit-btn")?.addEventListener("click",()=>{
    if(!currentUser){toast("Sign in required","error");return;}
    const d=collectDraft();
    if(!d.title){toast("Title is required","error");return;}
    if(!d.sections.some(s=>s.body?.trim())){toast("Add some content to at least one section","error");return;}
    D.wikiDrafts=D.wikiDrafts||[];
    // If editing an existing draft, replace it
    const existingIdx=F.wikiEditDraft?.id?D.wikiDrafts.findIndex(x=>x.id===F.wikiEditDraft.id):-1;
    const draft={
      id:F.wikiEditDraft?.id||uid(),
      ...d,
      authorId:currentUser.id,
      authorName:currentUser.displayName||currentUser.username,
      submittedDate:new Date().toISOString().slice(0,10),
      status:"pending",
      rejectReason:""
    };
    if(existingIdx>=0) D.wikiDrafts[existingIdx]=draft;
    else D.wikiDrafts.push(draft);
    F.wikiEditDraft=null;
    persist();pg="wiki-drafts";re();
    toast("Article submitted for review!");
  });

  // Edit draft from drafts page
  document.querySelectorAll(".wiki-edit-draft-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const d=D.wikiDrafts.find(x=>x.id===btn.dataset.id);
      if(!d)return;
      F.wikiEditDraft={...d};
      pg="wiki-new";re();
    });
  });

  // Delete draft
  document.querySelectorAll(".wiki-delete-draft-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      confirmAction("Delete this draft?",()=>{
        D.wikiDrafts=D.wikiDrafts.filter(x=>x.id!==btn.dataset.id);
        persist();re();toast("Draft deleted!");
      });
    });
  });

  // Admin: publish draft
  document.querySelectorAll(".wiki-publish-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const d=D.wikiDrafts.find(x=>x.id===btn.dataset.id);
      if(!d)return;
      D.wikiPages=D.wikiPages||[];
      // Check if editing published article
      if(d._publishedId){
        const idx=D.wikiPages.findIndex(p=>p.id===d._publishedId);
        if(idx>=0){D.wikiPages[idx]={...D.wikiPages[idx],...d,id:d._publishedId,updatedDate:new Date().toISOString().slice(0,10)};D.wikiDrafts=D.wikiDrafts.filter(x=>x.id!==d.id);persist();re();toast("Article updated!");return;}
      }
      D.wikiPages.push({id:uid(),title:d.title,category:d.category,tags:d.tags,summary:d.summary,sections:d.sections,author:d.authorName,date:new Date().toISOString().slice(0,10),updatedDate:new Date().toISOString().slice(0,10),views:0});
      D.wikiDrafts=D.wikiDrafts.filter(x=>x.id!==d.id);
      addLog("Wiki Published",d.title);
      persist();re();toast(`"${d.title}" published!`);
    });
  });

  // Admin: edit & publish (load into editor)
  document.querySelectorAll(".wiki-review-edit-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const d=D.wikiDrafts.find(x=>x.id===btn.dataset.id);
      if(!d)return;
      F.wikiEditDraft={...d};
      pg="wiki-new";re();
    });
  });

  // Admin: reject draft
  document.querySelectorAll(".wiki-reject-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const d=D.wikiDrafts.find(x=>x.id===btn.dataset.id);
      if(!d)return;
      openModal("Reject Article",body=>{
        body.innerHTML=`<div class="fg"><label class="fl">Reason for rejection (shown to author)</label><textarea class="inp" id="reject-reason" rows="3" placeholder="What needs to be changed?"></textarea></div><div class="actions"><button class="btn bg" onclick="closeModal()">Cancel</button><button class="btn bd" id="confirm-reject">Reject</button></div>`;
        setTimeout(()=>{
          document.getElementById("confirm-reject")?.addEventListener("click",()=>{
            const reason=document.getElementById("reject-reason")?.value.trim()||"Please review and resubmit.";
            d.status="rejected";
            d.rejectReason=reason;
            addLog("Wiki Rejected",d.title);
            persist();closeModal();re();toast("Draft rejected.");
          });
        },0);
      });
    });
  });

  // Guild apply buttons (shown in wiki-join-guild page)
  document.querySelectorAll(".guild-apply-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const guildId=btn.dataset.guildId;
      const guildName=btn.dataset.guildName;
      confirmAction(`Apply to join "${guildName}"? The Guild Leader must approve your request.`,()=>{
        const u=D.users.find(x=>x.id===currentUser.id);
        if(u){
          u.guildId=guildId;u.status="pending";
          currentUser=u;
          saveSession(currentUser,guildId);
          addLog("Guild Application",`${currentUser.displayName} applied to join ${guildName}`);
          persist();re();toast(`Application sent to ${guildName}!`);
        }
      });
    });
  });

  // Sign in redirects from wiki pages
  document.getElementById("wiki-goto-login")?.addEventListener("click",()=>{activeTool="treasury";renderLogin();});

  // Create guild from join page
  document.getElementById("wiki-create-guild-btn")?.addEventListener("click",()=>{loginMode="create-guild";renderLogin();});
}

function goldChart(){const now=new Date();const wks=[];for(let i=7;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i*7);wks.push({start:new Date(d.getFullYear(),d.getMonth(),d.getDate()-d.getDay()),label:""})}wks.forEach((w,i)=>{w.end=wks[i+1]?.start||new Date(now.getTime()+864e5);w.label=(w.start.getMonth()+1)+"/"+w.start.getDate()});const data=wks.slice(0,-1).map(w=>{const ir=t=>{const td=new Date(t.date);return td>=w.start&&td<w.end};return{label:w.label,don:G.gt.filter(t=>t.type==="Donate Gold"&&ir(t)).reduce((s,t)=>s+t.amount,0),bor:G.gt.filter(t=>t.type==="Borrow Gold"&&ir(t)).reduce((s,t)=>s+t.amount,0)}});const mx=Math.max(1,...data.map(d=>Math.max(d.don,d.bor)));let h=`<div style="display:flex;gap:16px;margin-bottom:4px"><span style="font-size:10px;color:var(--grn)">● Donated</span><span style="font-size:10px;color:var(--red)">● Borrowed</span></div><div class="chart-bar">`;data.forEach(d=>{h+=`<div class="chart-col"><div class="chart-val" style="color:var(--grn)">${d.don?fmt(d.don):""}</div><div class="chart-fill" style="height:${Math.max(d.don/mx*90,1)}px;background:var(--grn)"></div><div class="chart-fill" style="height:${Math.max(d.bor/mx*90,1)}px;background:var(--red)"></div><div class="chart-val" style="color:var(--red)">${d.bor?fmt(d.bor):""}</div><div class="chart-label">${d.label}</div></div>`});return h+`</div>`}

function tDash(){
  if(!G.p.length)return`<div class="ph"><div class="pt">Dashboard</div></div>`+empty("⊞","Welcome to Guild Guild Manager","Add your first member to get started.",isAdmin()?"+ Add Member":"","empty-add-player");
  const s=gStats(),td=topN("Donate Gold","gold"),tb=topN("Borrow Gold","gold"),f=feed(),mx=td[0]?.value||1;
  const upEv=G.events.filter(e=>e.date>=new Date().toISOString().slice(0,10)).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,3);
  const oReq=G.requests.filter(r=>r.status==="Open").length,oOrd=G.orders.filter(o=>o.status!=="Complete"&&o.status!=="Cancelled").length;
  let h=`<div class="ph"><div class="pt">Dashboard</div><span style="font-size:11px;color:var(--tm)">${G.p.filter(x=>x.status==="Active").length} active / ${G.p.length} total</span></div>`;
  h+=`<div class="cg" style="margin-bottom:14px">${stat("Guild Manager",fmt(s.treasury)+"g","var(--ac)")}${stat("Total In",fmt(s.deposited)+"g","var(--grn)")}${stat("Outstanding",fmt(s.owed)+"g","var(--red)")}${stat("Members",G.p.length,"var(--blu)")}${stat("Open Requests",oReq,"var(--org)")}${stat("Active Orders",oOrd,"var(--pk)")}</div>`;
  if(G.gt.length>2)h+=`<div class="card" style="margin-bottom:14px"><div style="font-size:10px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Gold Flow (8 weeks)</div>${goldChart()}</div>`;
  if(upEv.length){h+=`<div class="card" style="margin-bottom:14px"><div style="font-size:10px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Upcoming Events</div>`;upEv.forEach(e=>{h+=`<div style="display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--bd)"><span style="font-size:11px;color:var(--tm);min-width:68px">${fmtD(e.date)}</span>${B(e.type,e.type==="Raid"?"r":"b")}<span style="font-size:12px;font-weight:500">${e.title}</span><span style="font-size:11px;color:var(--tm);margin-left:auto">${(e.attendees||[]).length} RSVPs</span></div>`});h+=`</div>`}
  if(td.length){h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px"><div class="card"><div style="font-size:10px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Top Donors</div>`;td.forEach((d,i)=>{h+=`<div style="display:flex;align-items:center;gap:8px;padding:4px 0"><span style="color:var(--tm);font-size:10px;width:12px">${i+1}</span><span class="plink" data-pid="${d.id}" style="flex:1;font-size:12px;cursor:pointer;color:var(--ac)">${d.name}</span>${bar(d.value,mx,"var(--grn)")}<span style="font-size:11px;color:var(--grn);font-weight:500;min-width:50px;text-align:right">${fmt(d.value)}g</span></div>`});h+=`</div><div class="card"><div style="font-size:10px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Top Borrowers</div>`;tb.forEach((d,i)=>{h+=`<div style="display:flex;align-items:center;gap:8px;padding:4px 0"><span style="color:var(--tm);font-size:10px;width:12px">${i+1}</span><span class="plink" data-pid="${d.id}" style="flex:1;font-size:12px;cursor:pointer;color:var(--ac)">${d.name}</span><span style="font-size:11px;color:var(--red);font-weight:500">${fmt(d.value)}g</span></div>`});h+=`</div></div>`}

function tGold(){const s=gStats();const fil=G.gt.filter(t=>{if(F.gtType!=="All"&&t.type!==F.gtType)return false;if(F.s){const n=pN(t.playerId).toLowerCase();if(!n.includes(F.s.toLowerCase())&&!(t.notes||"").toLowerCase().includes(F.s.toLowerCase()))return false}return true}).sort((a,b)=>b.date.localeCompare(a.date));let h=`<div class="ph"><div class="pt">Gold Ledger</div><div style="display:flex;gap:6px">${isAdmin()?`<button class="btn bg bs" id="csv-gold">CSV</button><button class="btn bp" id="add-gold-btn">+ Record</button>`:""}</div></div><div class="cg" style="margin-bottom:12px">${stat("Guild Bank Total",fmt(s.treasury)+"g","var(--ac)")}${stat("Outstanding Debt",fmt(s.owed)+"g","var(--org)")}</div><div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap"><div class="sb" style="flex:1;min-width:160px"><input id="gsearch" placeholder="Search..." value="${F.s}"></div><select class="inp" id="fgttype" style="width:140px">${["All","Deposit Gold","Borrow Gold"].map(o=>`<option${F.gtType===o?" selected":""}>${o}</option>`).join("")}</select></div>`;if(!fil.length)return h+`<div class="card">${empty("💰","No transactions","",isAdmin()&&G.p.length?"+ Record":"","add-gold-btn2")}</div>`;h+=`<div class="card tw"><table><thead><tr><th>Date</th><th>Player</th><th>Type</th><th>Amount</th><th>Notes</th>${isAdmin()?`<th style="width:60px"></th>`:""}</tr></thead><tbody>`;fil.forEach(t=>{h+=`<tr><td style="font-size:11px;color:var(--tm)">${fmtD(t.date)}</td><td class="plink" data-pid="${t.playerId}" style="cursor:pointer;color:var(--ac);font-weight:500">${pN(t.playerId)}</td><td>${txB(t.type)}</td><td style="font-weight:500">${fmt(t.amount)}g</td><td style="color:var(--tm);font-size:11px">${t.notes||""}</td>${isAdmin()?`<td><div class="row-actions"><button class="btn bg bs edit-gt" data-id="${t.id}">✎</button><button class="btn bd bs del-gt" data-id="${t.id}">✕</button></div></td>`:""}</tr>`});h+=`</tbody></table></div>`;return h}

function tBank(){const inv={};G.items.forEach(i=>{inv[i.id]={...i,cur:0,don:0,loan:0,ret:0}});G.it.forEach(t=>{if(!inv[t.itemId])return;if(t.type==="Donated"){inv[t.itemId].cur+=t.qty;inv[t.itemId].don+=t.qty}else if(t.type==="Borrowed"){inv[t.itemId].cur-=t.qty;inv[t.itemId].loan+=t.qty}else{inv[t.itemId].cur+=t.qty;inv[t.itemId].ret+=t.qty}});const cats=["All",...new Set(G.items.map(i=>i.category))];const list=Object.values(inv).filter(i=>F.invCat==="All"||i.category===F.invCat);let h=`<div class="ph"><div class="pt">Guild Bank</div><select class="inp" id="finvcat" style="width:140px">${cats.map(c=>`<option${F.invCat===c?" selected":""}>${c}</option>`).join("")}</select></div>`;if(!list.length)return h+`<div class="card">${empty("📦","Empty","Items appear from transactions.")}</div>`;h+=`<div class="card tw"><table><thead><tr><th>Item</th><th>Category</th><th>Stock</th><th>Donated</th><th>Loaned</th><th>Returned</th></tr></thead><tbody>`;list.forEach(i=>{h+=`<tr><td style="font-weight:500">${i.name}</td><td>${B(i.category,"b")}</td><td style="font-weight:600;color:${i.cur>0?"var(--grn)":i.cur<0?"var(--red)":"var(--tm)"}">${i.cur}</td><td style="color:var(--grn)">${i.don}</td><td style="color:var(--red)">${i.loan}</td><td style="color:var(--blu)">${i.ret}</td></tr>`});h+=`</tbody></table></div>`;return h}

function tGoldRequestManage(){
  if(!isAdmin())return`<div class="ph"><div class="pt">Manage Gold Requests</div></div><div class="card">${empty("🔒","Admin Only","")}</div>`;
  
  const fil=G.goldRequests.filter(r=>{

    const order={Pending:0,Claimed:1,Completed:2};

    h+=`<div><span style="font-size:18px;font-weight:600;color:var(--ac)">${fmt(r.amount)}g</span>`;
    h+=`<span style="font-size:12px;color:var(--tm);margin-left:10px">requested by <strong style="color:var(--t1)">${requester?.displayName||"Unknown"}</strong></span></div>`;
    h+=`<span class="badge" style="background:${sc}22;color:${sc}">${r.status}</span>`;
    h+=`</div>`;
    h+=`<div style="font-size:13px;color:var(--t2);margin-bottom:10px;padding:8px;background:var(--bg2);border-radius:4px">${r.reason}</div>`;
    h+=`<div style="display:flex;justify-content:space-between;align-items:center">`;

const normRecipeName=name=>(name||"").trim().toLowerCase();
function removeRecipeIdsFromPlayers(ids){
  const idSet=new Set((ids||[]).map(String));
  if(!idSet.size)return false;
  let changed=false;
  Object.keys(D.playerRecipes||{}).forEach(pid=>{
    const arr=(D.playerRecipes[pid]||[]).map(String);
    const next=arr.filter(id=>!idSet.has(id));
    if(next.length!==arr.length){
      D.playerRecipes[pid]=next;
      changed=true;
    }
  });
  return changed;
}
function syncRecipeEntryFromVendorItem(vi){
  if(!vi||vi.itemType!=="Recipe"||!vi.itemName)return false;
  const name=vi.itemName.trim();
  if(!name)return false;
  const crafted=craftItems.find(i=>!i.isRecipe&&!i.isResource&&normRecipeName(i.name)===normRecipeName(name));
  const inferredSkill=crafted?.skill||"other";
  const inferredLevel=Math.max(1, crafted?.requiredLevel||1);
  const inferredTime=Math.max(30, crafted?.craftTimeSeconds||30);
  const existing=craftItems.find(i=>i.isRecipe&&normRecipeName(i.name)===normRecipeName(name));
  if(existing){
    let changed=false;
    if(!existing.vendorSynced){existing.vendorSynced=true;changed=true;}
    if((!existing.skill||existing.skill==="other")&&inferredSkill!=="other"){existing.skill=inferredSkill;changed=true;}
    if((!existing.requiredLevel||existing.requiredLevel<=1)&&inferredLevel>1){existing.requiredLevel=inferredLevel;changed=true;}
    if((!existing.craftTimeSeconds||existing.craftTimeSeconds<30)&&inferredTime>=30){existing.craftTimeSeconds=inferredTime;changed=true;}
    return changed;
  }
  craftItems.push({id:Date.now()+Math.floor(Math.random()*1000),name,isRecipe:true,isResource:false,vendorSynced:true,skill:inferredSkill,requiredLevel:inferredLevel,craftTimeSeconds:inferredTime});
  return true;
}
function purgeMissingVendorSyncedRecipes(){
  const activeVendorRecipes=new Set(D.vendorItems.filter(vi=>vi.itemType==="Recipe"&&vi.itemName).map(vi=>normRecipeName(vi.itemName)));
  const removedIds=[];
  craftItems=craftItems.filter(item=>{
    if(!item.isRecipe||!item.vendorSynced)return true;
    if(activeVendorRecipes.has(normRecipeName(item.name)))return true;
    removedIds.push(String(item.id));
    return false;
  });
  return removeRecipeIdsFromPlayers(removedIds)||removedIds.length>0;
}
// Helper to find an item by name (unified - searches craftItems)
function findItemByName(name){return craftItems.find(i=>i.name===name)}
// Check if item is a processed resource (has materials and isResource flag)
function isProcessedResource(name){const item=findItemByName(name);return item&&item.isResource&&item.materials&&Object.keys(item.materials).length>0}
// Check if item is a crafted item (not a resource)
function isCraftedItem(name){const item=findItemByName(name);return item&&!item.isResource}

// Memoized XP-to-level cache — invalidated when skill tables change
const _xpCache={};
(function syncVendorRecipesOnLoad(){
  let changed=false;
  D.vendorItems.forEach(vi=>{if(syncRecipeEntryFromVendorItem(vi))changed=true;});
  if(purgeMissingVendorSyncedRecipes())changed=true;
  if(changed)saveCraftItems();
})();
function craftGetXPForLevel(lv,skill){
  if(lv<=1)return 0;
  const key=(skill||"")+":"+lv;
  if(_xpCache[key]!==undefined)return _xpCache[key];
  const table=skill&&craftSkillXpTables[skill];
  let t=0;
  for(let i=2;i<=lv;i++){
    if(table&&table[i]!=null)t+=table[i];
    else t+=Math.floor(80*Math.pow(1.12,i-1));
  }
  _xpCache[key]=t;
  return t;
}
function craftClearXpCache(){for(const k in _xpCache)delete _xpCache[k];}
function craftGetXPForLevelStep(lv,skill){
  // XP needed for just one level: lv-1 -> lv
  if(lv<=1)return 0;
  const table=skill&&craftSkillXpTables[skill];
  if(table&&table[lv]!=null)return table[lv];
  return Math.floor(80*Math.pow(1.12,lv-1));
}
function craftGetItemXP(item,lv){return(item.xpByLevel&&item.xpByLevel[lv]!==undefined)?item.xpByLevel[lv]:(item.baseXP||0)}
function craftCalcXP(pLv,iLv,base){const d=pLv-iLv;let m=craftXpMods[999];if(d<=0)m=craftXpMods[0];else if(d<=5)m=craftXpMods[5];else if(d<=10)m=craftXpMods[10];else if(d<=15)m=craftXpMods[15];return Math.floor(base*(m/100))}

// Returns array of {name, qty} alts — handles both legacy single-alt and new multi-alt format
function craftMatAlts(v){
  if(typeof v!=="object")return [];
  if(v.alts&&Array.isArray(v.alts))return v.alts.filter(a=>a&&a.name);

}

function craftMatAlt(v){const a=craftMatAlts(v);return a.length?a.map(x=>`${x.name}${a.length>1?" ×"+x.qty:""}`).join(" / "):null;}
function craftTotalMats(mats){return Object.values(mats).reduce((s,v)=>s+craftMatQty(v),0)}
function craftEfficiency(item,pLv,opt,xpBoostMult=1){if(item.requiredLevel>pLv)return{score:-1,effectiveXP:0};if(item.isRecipe||!item.craftTimeSeconds)return{score:-1,effectiveXP:0};const bxp=craftGetItemXP(item,pLv);const exP=Math.floor(craftCalcXP(pLv,item.requiredLevel,bxp)*xpBoostMult);const tm=craftTotalMats(item.materials);const xps=exP/item.craftTimeSeconds;const xpm=tm>0?exP/tm:exP;let s;if(opt==="time")s=xps;else if(opt==="materials")s=xpm;else s=Math.sqrt(xps*xpm);return{score:s,effectiveXP:exP,xps,xpm,tm}}
function craftFindBest(items,pLv,opt,xpBoostMult=1){let best=null,be={score:-1};for(const it of items){const e=craftEfficiency(it,pLv,opt,xpBoostMult);if(e.score>be.score){best=it;be=e}}return best?{item:best,eff:be}:null}

// Recursively expand craftable materials into raw materials + intermediate crafts
function craftExpandMats(mats,qty=1,depth=0,seen=new Set()){
  if(depth>10)return{raw:{},crafts:{},resourceCrafts:{}};// Prevent infinite loops
  const raw={},crafts={},resourceCrafts={};
  for(const[matName,matVal]of Object.entries(mats)){
    const matQty=craftMatQty(matVal);
    const needed=matQty*qty;
    // Find the item in the unified database
    const item=craftItems.find(i=>i.name===matName);
    const hasMats=item&&item.materials&&Object.keys(item.materials).length>0;
    
    if(item&&hasMats&&!seen.has(matName)){
      // This material has sub-materials
      if(item.isResource){
        // It's a processed resource (like Leather made from Hide)
        resourceCrafts[matName]=(resourceCrafts[matName]||0)+needed;
      }else{
        // It's a crafted item
        crafts[matName]=(crafts[matName]||0)+needed;
      }
      const newSeen=new Set(seen);newSeen.add(matName);
      const sub=craftExpandMats(item.materials,needed,depth+1,newSeen);
      for(const[r,c]of Object.entries(sub.raw))raw[r]=(raw[r]||0)+c;
      for(const[r,c]of Object.entries(sub.crafts))crafts[r]=(crafts[r]||0)+c;
      for(const[r,c]of Object.entries(sub.resourceCrafts))resourceCrafts[r]=(resourceCrafts[r]||0)+c;
    }else{
      // True raw material (no sub-materials or not in database)
      raw[matName]=(raw[matName]||0)+needed;
    }
  }
  return{raw,crafts,resourceCrafts};
}

function craftSimulate(skill,startLv,endLv,opt,itemsOverride,xpBoostMult=1){
  const items=itemsOverride||craftItems.filter(i=>i.skill===skill&&!i.isRecipe&&!i.isResource);
  if(!items.length)return{error:"No items for this skill. Add items in the Item Database first."};

  // Pre-build XP-per-level table once to avoid O(n²) repeated summation
  const xpTable={};
  for(let lv=startLv;lv<=endLv;lv++)xpTable[lv]=craftGetXPForLevel(lv,skill);

  const path=[];const totalMats={};let crafts=0,time=0,cLv=startLv,cXP=xpTable[startLv]||0,step=null;
  let safetyIter=0;const MAX_ITER=500000;

  while(cLv<endLv){
    if(++safetyIter>MAX_ITER)return{error:"Calculation exceeded safe limit. Check that your items have XP values set."};
    const b=craftFindBest(items,cLv,opt,xpBoostMult);
    if(!b)return{error:`No craftable items at level ${cLv}`};

    // Guard: if best item gives 0 effective XP we cannot progress
    if(b.eff.effectiveXP<=0)return{error:`Item "${b.item.name}" gives 0 XP at level ${cLv}. Set XP values in the Item Database.`};

    if(!step||step.item.name!==b.item.name){
      if(step){step.lvEnd=cLv;path.push(step)}
      step={item:b.item,lvStart:cLv,lvEnd:cLv,count:0,xp:0,mats:{},eff:b.eff}
    }

    const nextXP=xpTable[cLv+1]||craftGetXPForLevel(cLv+1,skill);
    const need=nextXP-cXP;
    if(need<=0){cLv++;continue;}

    // Calculate exact crafts needed to reach next level in one shot
    const craftsNeeded=Math.ceil(need/b.eff.effectiveXP);
    const ef=craftEfficiency(b.item,cLv,opt,xpBoostMult);

    step.count+=craftsNeeded;
    step.xp+=ef.effectiveXP*craftsNeeded;
    crafts+=craftsNeeded;
    time+=b.item.craftTimeSeconds*craftsNeeded;
    cXP+=ef.effectiveXP*craftsNeeded;

    for(const[m,v]of Object.entries(b.item.materials)){
      const c=craftMatQty(v);
      const total=c*craftsNeeded;
      step.mats[m]=(step.mats[m]||0)+total;
      totalMats[m]=(totalMats[m]||0)+total;
      const alts=craftMatAlts(v);
      if(alts.length){if(!step.matAlts)step.matAlts={};step.matAlts[m]=alts;}
    }

    // Level up as many times as the accumulated XP allows
    while(cLv<endLv){
      const nxt=xpTable[cLv+1]||craftGetXPForLevel(cLv+1,skill);
      if(cXP<nxt)break;
      cLv++;
      // If best item changes at new level, break to re-evaluate
      const nb=craftFindBest(items,cLv,opt,xpBoostMult);
      if(nb&&nb.item.name!==b.item.name)break;
    }
  }
  if(step){step.lvEnd=cLv;path.push(step)}
  const expanded=craftExpandMats(totalMats);
  return{ok:true,boosted:xpBoostMult>1,path,stats:{crafts,time,totalMats,rawMats:expanded.raw,craftMats:expanded.crafts,resourceCrafts:expanded.resourceCrafts,levels:endLv-startLv,startLv,endLv}}
}
function craftFmtTime(s){if(s<60)return s+"s";if(s<3600){const m=Math.floor(s/60);return m+"m"+(s%60?" "+(s%60)+"s":"")}const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h+"h"+(m?" "+m+"m":"");}
function craftFmtNum(n){if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(1)+"K";return n.toLocaleString()}

function pgShopSearch(){

  return h;
}

function modalFindDuplicates(vendorId){

      group.forEach((vi,idx)=>{

function getDatabaseDuplicateGroups(){
  const groups={};
  D.vendorItems.forEach(vi=>{
    const vendor=D.vendors.find(v=>v.id===vi.vendorId);
    const city=vendor?D.cities.find(c=>c.id===vendor.cityId):null;
    const key=(vi.vendorId||"")+"||"+(vi.itemName.toLowerCase().trim())+"||"+(vi.itemType||"");
    if(!groups[key])groups[key]={key,name:vi.itemName,type:vi.itemType||"",entries:[]};
    groups[key].entries.push({vi,vendor,city});
  });
  return Object.values(groups).filter(g=>g.entries.length>1).sort((a,b)=>b.entries.length-a.entries.length||a.name.localeCompare(b.name)||a.type.localeCompare(b.type));
}
function getCraftItemDuplicateGroups(){
  const groups={};
  craftItems.forEach((item,idx)=>{
    const key=(item.name||"").toLowerCase().trim()+"||"+
      (item.isRecipe?"recipe":item.isResource?"resource":item.isFood?"food":item.isPotion?"potion":"craft")+"||"+
      (item.skill||"");
    if(!groups[key])groups[key]={key,name:item.name||"",entries:[]};
    groups[key].entries.push({item,idx});
  });
  return Object.values(groups).filter(g=>g.entries.length>1).sort((a,b)=>b.entries.length-a.entries.length||a.name.localeCompare(b.name));
}

      const group=getCraftItemDuplicateGroups()[parseInt(el.dataset.groupIndex,10)];
      if(!group||group.entries.length<2)return;
      const deleteIdxs=group.entries.slice(1).map(entry=>entry.idx).sort((a,b)=>b-a);
      confirmAction(`Delete ${deleteIdxs.length} duplicate item database entries for "${group.name}"?`,()=>{
        deleteIdxs.forEach(idx=>craftItems.splice(idx,1));
        saveCraftItems();
        persist();
        closeModal();
        render();
        toast("Item DB duplicate group cleaned up!");
      });
    }));
  },true);
}

function modalCopyItemsFrom(targetVendorId){

    .sort((a,b)=>a.name.localeCompare(b.name));

      </div>
      <div style="max-height:320px;overflow-y:auto;border:1px solid var(--bd);border-radius:4px">
        ${otherVendors.map(v=>{

      <div class="actions" style="margin-top:14px">
        <button class="btn bg" onclick="closeModal()">Cancel</button>

      </div>`;
    let selectedSourceId=null;
    body.querySelectorAll(".shop-copy-source-row").forEach(row=>{
      row.addEventListener("click",()=>{
        body.querySelectorAll(".shop-copy-source-row").forEach(r=>r.style.background="");
        row.style.background="var(--acg)";
        selectedSourceId=row.dataset.vendorId;
        const srcItems=D.vendorItems.filter(vi=>vi.vendorId===selectedSourceId);
        const existing=new Set(D.vendorItems.filter(vi=>vi.vendorId===targetVendorId).map(vi=>vi.itemName.toLowerCase()));
        const newItems=srcItems.filter(vi=>!existing.has(vi.itemName.toLowerCase()));
        const preview=body.querySelector("#copy-source-preview");
        preview.style.display="block";
        if(!newItems.length){
          preview.textContent=`All ${srcItems.length} items already exist in ${targetVendor.name}.`;
        }else{
          preview.innerHTML=`Will add <strong>${newItems.length}</strong> new item${newItems.length!==1?"s":""}: ${newItems.slice(0,5).map(i=>i.itemName).join(", ")}${newItems.length>5?` +${newItems.length-5} more`:""}`;
        }
        body.querySelector("#confirm-copy-items-btn").disabled=false;
      });
    });
    body.querySelector("#confirm-copy-items-btn").addEventListener("click",()=>{
      if(!selectedSourceId)return;
      const srcItems=D.vendorItems.filter(vi=>vi.vendorId===selectedSourceId);
      const existing=new Set(D.vendorItems.filter(vi=>vi.vendorId===targetVendorId).map(vi=>vi.itemName.toLowerCase()));
      let added=0;
      srcItems.forEach(vi=>{
        if(!existing.has(vi.itemName.toLowerCase())){
          D.vendorItems.push({...vi,id:uid(),vendorId:targetVendorId});
          added++;
        }
      });
      persist();closeModal();render();
      toast(added?`Copied ${added} item${added!==1?"s":""}!`:"No new items to copy.");
    });
  });
}

function modalCopySpecificItems(targetVendorId){
if(!canManageDatabase())return;
  const targetVendor=D.vendors.find(v=>v.id===targetVendorId);
  if(!targetVendor)return;
  // All items from every other vendor
  const allSourceItems=D.vendorItems.filter(vi=>vi.vendorId!==targetVendorId);
  if(!allSourceItems.length){toast("No items found in other vendors","error");return;}
  const existing=()=>new Set(D.vendorItems.filter(vi=>vi.vendorId===targetVendorId).map(vi=>vi.itemName.toLowerCase()));
  let specSearchQ="";
  // Track checked state separately so it survives re-renders
  const checkedIds=new Set();
  openModal("Copy Specific Items",body=>{
    function renderList(){
      const ex=existing();
      const q=specSearchQ.toLowerCase().trim();
      const filtered=q.length>=1?allSourceItems.filter(vi=>vi.itemName.toLowerCase().includes(q)):[];
      // Group by vendor for display
      const byVendor={};
      filtered.forEach(vi=>{if(!byVendor[vi.vendorId])byVendor[vi.vendorId]=[];byVendor[vi.vendorId].push(vi);});
      const listEl=body.querySelector("#spec-item-list");
      if(!listEl)return;
      if(!q){
        listEl.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--tm);font-size:12px;padding:20px;text-align:center">Start typing to search items across all vendors</div>`;
      } else if(!filtered.length){
        listEl.innerHTML=`<div style="padding:20px;text-align:center;color:var(--tm);font-size:12px">No items match "${specSearchQ}"</div>`;
      } else {
        let h="";
        Object.entries(byVendor).forEach(([vid,items])=>{
          const vendor=D.vendors.find(v=>v.id===vid);
          const city=vendor?D.cities.find(c=>c.id===vendor.cityId):null;
          h+=`<div style="padding:4px 10px;background:var(--bg2);border-bottom:1px solid var(--bd);font-size:10px;color:var(--tm);font-weight:600;text-transform:uppercase;letter-spacing:.05em;position:sticky;top:0">${vendor?vendor.name:"Unknown"}${city?` · ${city.name}`:""}</div>`;
          items.sort((a,b)=>a.itemName.localeCompare(b.itemName)).forEach(vi=>{
            const isDup=ex.has(vi.itemName.toLowerCase());
            const isChk=checkedIds.has(vi.id);
            h+=`<label style="display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;border-bottom:1px solid var(--bd);user-select:none;${isDup?"opacity:.45":""}background:${isChk?"var(--acg)":"transparent"};transition:background .08s">
              <input type="checkbox" class="spec-item-chk" data-id="${vi.id}" ${isChk?"checked":""} style="width:14px;height:14px;accent-color:var(--ac);flex-shrink:0">
              ${shopTypeTag(vi.itemType)}<span style="font-size:12px;flex:1">${vi.itemName}</span>
              <span style="font-size:11px;color:var(--org);white-space:nowrap">${shopFormatPrice(vi)}</span>
              ${isDup?`<span style="font-size:9px;color:var(--tm);white-space:nowrap;margin-left:4px">exists</span>`:""}
            </label>`;
          });
        });
        listEl.innerHTML=h;
      }
      // Update summary
      const summaryEl=body.querySelector("#spec-copy-summary");
      if(summaryEl)summaryEl.textContent=checkedIds.size?`${checkedIds.size} item${checkedIds.size!==1?"s":""} selected`:(q?"":"");
      // Bind checkboxes
      body.querySelectorAll(".spec-item-chk").forEach(c=>{
        c.addEventListener("change",()=>{
          if(c.checked)checkedIds.add(c.dataset.id);else checkedIds.delete(c.dataset.id);
          const lbl=c.closest("label");
          if(lbl)lbl.style.background=c.checked?"var(--acg)":"transparent";
          if(summaryEl)summaryEl.textContent=checkedIds.size?`${checkedIds.size} item${checkedIds.size!==1?"s":""} selected`:"";
        });
      });
    }
    body.innerHTML=`
      <div style="display:flex;flex-direction:column;gap:10px">
        <div class="sb"><span style="color:var(--tm);font-size:12px">🔍</span><input id="spec-search" type="text" placeholder="Search items across all vendors..." autocomplete="off" style="font-size:13px"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
          <div id="spec-copy-summary" style="font-size:11px;color:var(--tm);min-height:16px"></div>
          <div style="display:flex;gap:4px">
            <button class="btn bg bs" id="spec-sel-none" style="font-size:10px">Clear All</button>
          </div>
        </div>
        <div id="spec-item-list" style="overflow-y:auto;max-height:340px;border:1px solid var(--bd);border-radius:4px;min-height:120px">
          <div style="display:flex;align-items:center;justify-content:center;height:120px;color:var(--tm);font-size:12px;padding:20px;text-align:center">Start typing to search items across all vendors</div>
        </div>
      </div>
      <div class="actions" style="margin-top:12px">
        <button class="btn bg" onclick="closeModal()">Cancel</button>
        <button class="btn bp" id="spec-confirm-btn">Copy Selected</button>
      </div>`;
    // Search input
    const searchEl=body.querySelector("#spec-search");
    searchEl?.addEventListener("input",e=>{specSearchQ=e.target.value;renderList();});
    setTimeout(()=>searchEl?.focus(),50);
    // Clear all
    body.querySelector("#spec-sel-none")?.addEventListener("click",()=>{checkedIds.clear();renderList();});
    // Confirm
    body.querySelector("#spec-confirm-btn")?.addEventListener("click",()=>{
      if(!checkedIds.size){toast("Select at least one item","error");return;}
      const ex3=existing();
      let added=0;
      checkedIds.forEach(id=>{
        const vi=D.vendorItems.find(x=>x.id===id);
        if(vi&&!ex3.has(vi.itemName.toLowerCase())){D.vendorItems.push({...vi,id:uid(),vendorId:targetVendorId});added++;}
      });
      persist();closeModal();render();
      toast(added?`Copied ${added} item${added!==1?"s":""}!`:"No new items to copy (all already exist).");
    });
    renderList();
  });
}

      <div class="actions" style="margin-top:14px">

        <button class="btn bp" id="confirm-copy-vendor-btn">Copy to Selected Cities</button>
      </div>`;

      const checked=Array.from(body.querySelectorAll(".city-copy-check:checked"));
      if(!checked.length){toast("Select at least one city","error");return;}
      let totalAdded=0,citiesAffected=0;
      checked.forEach(cb=>{
        const cityId=cb.dataset.cityId;
        // Find or create vendor with same name in target city
        let targetVendor=D.vendors.find(v=>v.cityId===cityId&&v.name.toLowerCase()===sourceVendor.name.toLowerCase());
        if(!targetVendor){
          targetVendor={id:uid(),cityId,name:sourceVendor.name,type:sourceVendor.type,notes:sourceVendor.notes};
          D.vendors.push(targetVendor);
        }
        // Copy items that don't already exist
        const existing=new Set(D.vendorItems.filter(vi=>vi.vendorId===targetVendor.id).map(vi=>vi.itemName.toLowerCase()));
        srcItems.forEach(vi=>{
          if(!existing.has(vi.itemName.toLowerCase())){
            D.vendorItems.push({...vi,id:uid(),vendorId:targetVendor.id});
            totalAdded++;
          }
        });
        citiesAffected++;
      });
      persist();closeModal();render();
      toast(`Copied to ${citiesAffected} cit${citiesAffected!==1?"ies":"y"} — ${totalAdded} item${totalAdded!==1?"s":""} added.`);
    });
  });
}


// Updates only the search results section without a full re-render
// Prevents the backwards-typing cursor bug
function shopBuildResults(){
  const q=(window._shopSearchQ||"").toLowerCase().trim();
  const cityFilter=window._shopCityFilter||"all";
  let results=[];
  if(q.length>=2){
    D.vendorItems.forEach(vi=>{
      if(!vi.itemName.toLowerCase().includes(q))return;
      const vendor=D.vendors.find(v=>v.id===vi.vendorId);
      const city=vendor?D.cities.find(c=>c.id===vendor.cityId):null;
      if(cityFilter!=="all"&&(!city||city.id!==cityFilter))return;
      const typeFilter=window._shopTypeFilter||"all";
      if(typeFilter!=="all"&&vi.itemType!==typeFilter)return;
      results.push({vi,vendor,city});
    });
  }
  let h="";
  if(q.length>=2){
    if(!results.length){
      h+=`<div class="card">${empty("🔍","No results found",`No vendors sell "${q}"${cityFilter!=="all"?" in this city":""}.`)}</div>`;
    }else{
      h+=`<div style="font-size:10px;color:var(--tm);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">${results.length} result${results.length!==1?"s":""} for "${q}"</div>`;
      const byCityId={};
      results.forEach(r=>{const cid=r.city?.id||"unknown";if(!byCityId[cid])byCityId[cid]=[];byCityId[cid].push(r);});
      Object.values(byCityId).forEach(group=>{
        const city=group[0].city;
        h+=`<div class="card" style="margin-bottom:10px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bd)"><span style="font-size:16px">🏘️</span><div><div style="font-weight:600;font-size:14px">${city?city.name:"Unknown City"}</div>${city?.region?`<div style="font-size:11px;color:var(--tm)">${city.region}</div>`:""}</div></div>`;
        const byVendor={};
        group.forEach(r=>{const vid=r.vendor?.id||"?";if(!byVendor[vid])byVendor[vid]=[];byVendor[vid].push(r);});
        Object.values(byVendor).forEach(vgroup=>{
          const vendor=vgroup[0].vendor;
          h+=`<div style="margin-bottom:10px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="font-size:12px">🧑‍💼</span><span style="font-weight:600;font-size:12px;color:var(--t2)">${vendor?vendor.name:"Unknown Vendor"}</span>${vendor?.type?`<span class="badge bac" style="font-size:10px">${vendor.type}</span>`:""}</div>`;
          vgroup.forEach(r=>{
            const vi=r.vi;
            const priceStr=shopFormatPrice(vi);
            h+=`<div style="display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:7px 10px;background:var(--bgi);border:1px solid var(--bd);border-radius:4px;margin-bottom:4px"><div style="font-weight:500;font-size:13px;display:flex;align-items:center;min-width:0">${shopDisplayItemLabel(vi)}</div><div style="font-size:13px;font-weight:600;color:var(--org);white-space:nowrap">${priceStr}${vi.notes?`<span style="font-size:10px;color:var(--tm);font-weight:400;margin-left:6px">${vi.notes}</span>`:""}</div></div>`;
          });
          h+=`</div>`;
        });
        h+=`</div>`;
      });
    }
  }else{
    if(!D.cities.length){
      h+=`<div class="card">${empty("🏘️","No cities added yet","Ask an admin or contributor to add cities and vendors.")}</div>`;
    }else{
      h+=`<div style="font-size:10px;color:var(--tm);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Browse by City</div>`;
      D.cities.slice().sort((a,b)=>a.name.localeCompare(b.name)).forEach(city=>{
        const cityVendors=D.vendors.filter(v=>v.cityId===city.id);
        const cityItems=D.vendorItems.filter(vi=>cityVendors.some(v=>v.id===vi.vendorId));
        h+=`<div class="card" style="margin-bottom:8px;cursor:pointer;transition:border-color .15s" id="city-browse-${city.id}"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:20px">🏘️</span><div style="flex:1"><div style="font-weight:600;font-size:13px">${city.name}</div>${city.region?`<div style="font-size:11px;color:var(--tm)">${city.region}</div>`:""}</div><div style="text-align:right"><div style="font-size:12px;color:var(--ac);font-weight:600">${cityVendors.length} vendor${cityVendors.length!==1?"s":""}</div><div style="font-size:11px;color:var(--tm)">${cityItems.length} items</div></div></div></div>`;
      });
    }
  }
  return h;
}

function shopUpdateResults(){
  const resultsEl=document.getElementById("shop-results");
  if(!resultsEl){render();return;} // fallback if container not found
  resultsEl.innerHTML=shopBuildResults();
  // Re-bind city browse click handlers
  document.querySelectorAll("[id^='city-browse-']").forEach(el=>{
    el.addEventListener("click",()=>{
      window._shopCityFilter=el.id.replace("city-browse-","");
      const sel=document.getElementById("shop-city-filter");
      if(sel)sel.value=window._shopCityFilter;
      window._shopSearchQ=" ";
      const inp=document.getElementById("shop-search-input");
      if(inp)inp.value=" ";
      shopUpdateResults();
    });
  });
}

// Format vendor item price from structured currency data
function shopFormatPriceLong(vi){
  if(vi.priceType==="free")return"Free";
  if(vi.priceType==="tokens")return`${(vi.price||0).toLocaleString()} Valley Tokens`;
  if(vi.priceType==="champions")return`${(vi.price||0).toLocaleString()} Champions Guild Token${(vi.price||0)!==1?"s":""}`;
  if(vi.priceType==="frontier")return`${(vi.price||0).toLocaleString()} Frontier Pass Token${(vi.price||0)!==1?"s":""}`;
  if(vi.priceType==="contribution")return`${(vi.price||0).toLocaleString()} Contribution Points`;
  if(vi.priceType==="currency"){
    const parts=[];
    if(vi.pGold>0)parts.push(`${vi.pGold.toLocaleString()} Gold`);
    if(vi.pSilver>0)parts.push(`${vi.pSilver} Silver`);
    if(vi.pIronCrown>0)parts.push(`${vi.pIronCrown} Iron Crown${vi.pIronCrown!==1?"s":""}`);
    if(vi.pCopperCrown>0)parts.push(`${vi.pCopperCrown} Copper Crown${vi.pCopperCrown!==1?"s":""}`);
    return parts.length?parts.join(" + "):"Free";
  }
  return vi.price>0?`${vi.price.toLocaleString()} ${vi.currency||"Gold"}`:"Free";
}
function shopFormatPrice(vi){
  if(vi.priceType==="free")return"Free";
  if(vi.priceType==="tokens")return`${(vi.price||0).toLocaleString()} VT`;
  if(vi.priceType==="champions")return`${(vi.price||0).toLocaleString()} CGT`;
  if(vi.priceType==="frontier")return`${(vi.price||0).toLocaleString()} FPT`;
  if(vi.priceType==="contribution")return`${(vi.price||0).toLocaleString()} CP`;
  if(vi.priceType==="currency"){
    const parts=[];
    if(vi.pGold>0)parts.push(`${vi.pGold.toLocaleString()}G`);
    if(vi.pSilver>0)parts.push(`${vi.pSilver}S`);
    if(vi.pIronCrown>0)parts.push(`${vi.pIronCrown}IC`);
    if(vi.pCopperCrown>0)parts.push(`${vi.pCopperCrown}CC`);
    return parts.length?parts.join(" + "):"Free";
  }
  // Legacy: plain price field
  return vi.price>0?`${vi.price.toLocaleString()}${vi.currency||"G"}`:"Free";
}
function shopDisplayItemName(vi){
  return vi?.itemName||"";
}
function shopDisplayItemLabel(vi){
  return `${shopTypeTag(vi?.itemType)}<span>${shopDisplayItemName(vi)}</span>`;
}

function initShopBindings(){
  const inp=document.getElementById("shop-search-input");
  if(inp){
    // Update state then re-render only the results section (not the whole page)
    // This prevents cursor jumping backwards on each keystroke
    inp.addEventListener("input",e=>{
      window._shopSearchQ=e.target.value;
      shopUpdateResults();
    });
    inp.addEventListener("keydown",e=>{
      if(e.key==="Escape"){
        window._shopSearchQ="";
        inp.value="";
        shopUpdateResults();
      }
    });
    setTimeout(()=>{try{inp.focus()}catch(e){}},50);
  }
  document.getElementById("shop-city-filter")?.addEventListener("change",e=>{
    window._shopCityFilter=e.target.value;
    shopUpdateResults();
  });
  document.getElementById("shop-type-filter")?.addEventListener("change",e=>{
    window._shopTypeFilter=e.target.value;
    shopUpdateResults();
  });
  document.querySelectorAll("[id^='city-browse-']").forEach(el=>{
    el.addEventListener("click",()=>{window._shopCityFilter=el.id.replace("city-browse-","");window._shopSearchQ=" ";render();});
  });
  document.querySelectorAll(".shop-city-row").forEach(row=>{
    row.addEventListener("click",e=>{if(e.target.closest("button"))return;window._shopSelCity=row.dataset.cityId;window._shopSelVendor=null;render();});
    const acts=row.querySelector(".shop-city-acts");
    if(acts){row.addEventListener("mouseenter",()=>acts.style.opacity="1");row.addEventListener("mouseleave",()=>acts.style.opacity="0");}
  });
  document.querySelectorAll(".shop-vendor-toggle").forEach(el=>{
    el.addEventListener("click",e=>{if(e.target.closest("button"))return;const vid=el.dataset.vendorId;window._shopSelVendor=window._shopSelVendor===vid?null:vid;render();});
  });
  document.getElementById("shop-add-city-btn")?.addEventListener("click",()=>modalShopCity());
  document.getElementById("shop-find-db-dupes-btn")?.addEventListener("click",()=>modalFindDatabaseDuplicates());
  document.getElementById("shop-find-db-dupes-search-btn")?.addEventListener("click",()=>modalFindDatabaseDuplicates());
  document.getElementById("shop-add-vendor-btn")?.addEventListener("click",function(){modalShopVendor(null,this.dataset.cityId);});

  });

  });
  document.querySelectorAll(".shop-copy-vendor-btn").forEach(btn=>{

  });
  document.querySelectorAll(".shop-edit-city").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();modalShopCity(D.cities.find(c=>c.id===el.dataset.id));}));
  document.querySelectorAll(".shop-del-city").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    const city=D.cities.find(c=>c.id===el.dataset.id);if(!city)return;
    confirmAction(`Delete "${city.name}" and all its vendors and items?`,()=>{
      const vids=D.vendors.filter(v=>v.cityId===city.id).map(v=>v.id);
      D.vendorItems=D.vendorItems.filter(vi=>!vids.includes(vi.vendorId));
      D.vendors=D.vendors.filter(v=>v.cityId!==city.id);
      D.cities=D.cities.filter(c=>c.id!==city.id);
      if(window._shopSelCity===city.id){window._shopSelCity=null;window._shopSelVendor=null;}
      if(purgeMissingVendorSyncedRecipes())saveCraftItems();
      persist();render();toast("City deleted");

  }));
  document.querySelectorAll(".shop-edit-vendor").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();modalShopVendor(D.vendors.find(v=>v.id===el.dataset.id));}));
  document.querySelectorAll(".shop-del-vendor").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    const vendor=D.vendors.find(v=>v.id===el.dataset.id);if(!vendor)return;
    confirmAction(`Delete "${vendor.name}" and all their items?`,()=>{
      D.vendorItems=D.vendorItems.filter(vi=>vi.vendorId!==vendor.id);

      if(window._shopSelVendor===vendor.id)window._shopSelVendor=null;
      if(purgeMissingVendorSyncedRecipes())saveCraftItems();
      persist();render();toast("Vendor deleted");
    });
  }));
  document.querySelectorAll(".shop-edit-item").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();modalShopItem(D.vendorItems.find(vi=>vi.id===el.dataset.id));}));
  document.querySelectorAll(".shop-del-item").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();confirmAction("Remove this item?",()=>{D.vendorItems=D.vendorItems.filter(vi=>vi.id!==el.dataset.id);if(purgeMissingVendorSyncedRecipes())saveCraftItems();persist();render();toast("Removed!")});}));
}

function pgCraftXpEditor(){
  const skills=Object.entries(SKILL_NAMES);
  const selSkill=window._xpEditorSkill||skills[0][0];
  window._xpEditorSkill=selSkill;
  const table=craftSkillXpTables[selSkill]||{};
  // Compute cumulative totals for preview
  function getStep(lv){return table[lv]!=null?table[lv]:Math.floor(80*Math.pow(1.12,lv-1));}
  let h=`<div class="ph"><div class="pt">XP Table Editor</div></div>`;
  // Skill tabs
  h+=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px">`;
  skills.forEach(([k,v])=>{
    const hasData=craftSkillXpTables[k]&&Object.keys(craftSkillXpTables[k]).length>0;
    const active=k===selSkill;
    h+=`<button class="btn${active?" bp":" bg"} xp-skill-tab" data-skill="${k}" style="font-size:12px;position:relative">${v}${hasData?`<span style="position:absolute;top:-4px;right:-4px;width:8px;height:8px;background:var(--grn);border-radius:50%;border:2px solid var(--bg2)"></span>`:""}`;
    h+=`</button>`;
  });
  h+=`</div>`;
  // Summary bar
  const filledCount=Object.keys(table).filter(k=>table[k]>0).length;
  const totalXp=Array.from({length:99},(_,i)=>getStep(i+2)).reduce((a,b)=>a+b,0);
  h+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px">`;
  h+=`<div class="card"><div class="sv">${filledCount}<span style="font-size:13px;color:var(--tm)">/99</span></div><div class="sl">Levels Filled</div></div>`;
  h+=`<div class="card"><div class="sv" style="font-size:16px">${totalXp.toLocaleString()}</div><div class="sl">Total XP (1→100)</div></div>`;
  h+=`<div class="card" style="display:flex;flex-direction:column;justify-content:center;gap:6px">`;
  h+=`<button class="btn bp" id="xp-paste-btn" style="font-size:11px;justify-content:center">📋 Paste from Clipboard</button>`;
  h+=`<button class="btn bg" id="xp-clear-skill-btn" style="font-size:11px;justify-content:center">🗑 Clear This Skill</button>`;
  h+=`</div>`;
  h+=`</div>`;
  // Paste instructions
  h+=`<div class="card" style="margin-bottom:16px;background:var(--bgi)"><div style="font-size:11px;color:var(--tm);line-height:1.7">`;
  h+=`<strong style="color:var(--t2)">Quick Fill:</strong> Paste a list of XP values (one per line, or comma/tab separated) into the Paste button — values will fill levels 1→2, 2→3, 3→4 etc. in order.`;
  h+=`</div></div>`;
  // XP entry grid
  h+=`<div class="card"><div style="font-size:10px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">XP Required per Level — ${SKILL_NAMES[selSkill]}</div>`;
  h+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px" id="xp-table-grid">`;
  for(let lv=2;lv<=100;lv++){
    const val=table[lv]!=null?table[lv]:"";
    const placeholder=Math.floor(80*Math.pow(1.12,lv-1));
    const cumul=Array.from({length:lv-1},(_,i)=>getStep(i+2)).reduce((a,b)=>a+b,0);
    h+=`<div style="display:grid;grid-template-columns:48px 1fr;gap:6px;align-items:center">`;
    h+=`<span style="font-size:11px;color:var(--tm);text-align:right;font-weight:600">${lv-1}→${lv}</span>`;
    h+=`<input class="inp xp-lv-input" type="number" min="0" data-lv="${lv}" value="${val}" placeholder="${placeholder}" style="padding:4px 8px;font-size:12px" title="Cumulative to reach lv ${lv}: ~${cumul.toLocaleString()} XP">`;
    h+=`</div>`;
  }
  h+=`</div>`;
  h+=`<div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end">`;
  h+=`<button class="btn bg" id="xp-fill-formula-btn">↺ Reset to GV Values</button>`;
  h+=`<button class="btn bp" id="xp-save-btn" style="padding:7px 18px">💾 Save XP Table</button>`;
  h+=`</div></div>`;
  return h;
}
