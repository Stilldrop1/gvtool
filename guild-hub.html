<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gloria Victis — Guild Hub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root{
--bg0:#1e1e1e;--bg1:#252525;--bg2:#2a2a2a;--bg3:#333;--bgi:#1a1a1a;--bgh:#2f2f2f;
--bd:#363636;--bd2:#444;
--t1:#dcddde;--t2:#999;--tm:#666;--tf:#4a4a4a;
--ac:#7f6df2;--acd:#6c5ce7;--acg:rgba(127,109,242,.12);--acs:rgba(127,109,242,.22);
--red:#e5534b;--redd:rgba(229,83,75,.12);--grn:#56d364;--grnd:rgba(86,211,100,.12);
--blu:#58a6ff;--blud:rgba(88,166,255,.12);--org:#d29922;--orgd:rgba(210,153,34,.12);
--yl:#e3b341;--yld:rgba(227,179,65,.12);--pk:#d2a8ff;--pkd:rgba(210,168,255,.12);
--cn:#39d4d4;--cnd:rgba(57,212,212,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg0);color:var(--t1);font-family:'Inter',-apple-system,sans-serif;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:10px}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Layout */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:230px;min-width:230px;background:var(--bg1);border-right:1px solid var(--bd);display:flex;flex-direction:column;transition:transform .25s;overflow:hidden}
#sidebar.hide{transform:translateX(-240px);position:absolute;z-index:50;height:100%}
#main{flex:1;overflow-y:auto;padding:20px 28px;background:var(--bg0)}

/* Tool Switcher */
.tool-sw{padding:6px 8px;border-bottom:1px solid var(--bd);display:flex;flex-direction:column;gap:1px}
.tool-btn{padding:6px 10px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;color:var(--tm);background:transparent;border:1px solid transparent;transition:all .12s;white-space:nowrap;display:flex;align-items:center;gap:8px}
.tool-btn .tool-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.tool-btn .tool-label{flex:1}
.tool-btn .tool-badge{font-size:9px;opacity:.5;margin-left:auto}
.tool-btn:hover{color:var(--t2);background:var(--bgh)}.tool-btn.a{color:var(--ac);background:var(--acg);border-color:rgba(127,109,242,.2);font-weight:600}
.tool-btn-locked{opacity:.5}

/* Sidebar nav */
.ns{padding:4px 10px;margin-top:4px}.nst{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--tm);padding:0 8px;margin-bottom:2px;font-weight:600}
.ni{display:flex;align-items:center;gap:8px;padding:4px 8px;cursor:pointer;color:var(--t2);font-size:12px;border-radius:4px;margin:1px 0;transition:all .12s;user-select:none}
.ni:hover{color:var(--t1);background:var(--bgh)}.ni.a{color:var(--t1);background:var(--acg)}
.ni .cnt{margin-left:auto;font-size:10px;color:var(--tm);background:var(--bgi);padding:1px 5px;border-radius:3px}

/* Map legend in sidebar */
.map-leg-toggle{background:none;border:none;cursor:pointer;font-size:11px;padding:2px 4px;opacity:.6;transition:opacity .15s}
.map-leg-toggle:hover{opacity:1}
.map-leg-row{display:flex;align-items:center;gap:8px;padding:5px 8px;cursor:pointer;border-radius:4px;margin:1px 0;transition:all .15s}
.map-leg-row:hover{background:var(--bgh)}
.map-leg-row.off{opacity:.35}
.map-leg-row.off .map-leg-icon{filter:grayscale(1)}
.map-leg-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.map-leg-name{flex:1;font-size:11px;color:var(--t2)}
.map-leg-row:hover .map-leg-name{color:var(--t1)}
.map-leg-count{font-size:10px;color:var(--tm);background:var(--bgi);padding:1px 5px;border-radius:8px}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:6px;padding:14px}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.sv{font-size:22px;font-weight:600;letter-spacing:-.02em;line-height:1.2}.sl{font-size:10px;color:var(--tm);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;font-weight:500}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;border:none;font-family:inherit;color:var(--t1)}
.bp{background:var(--ac);color:#fff}.bp:hover{background:var(--acd)}
.bg{background:transparent;color:var(--t2);border:1px solid var(--bd)}.bg:hover{color:var(--t1);background:var(--bgh)}
.bs{padding:3px 7px;font-size:11px}
.bd{background:var(--redd);color:var(--red);border:1px solid rgba(229,83,75,.25)}
.bw{background:var(--orgd);color:var(--org);border:1px solid rgba(210,153,34,.25)}
.bgrn{background:var(--grnd);color:var(--grn);border:1px solid rgba(86,211,100,.25)}

/* Inputs */
.inp{width:100%;padding:6px 10px;background:var(--bgi);border:1px solid var(--bd);border-radius:4px;color:var(--t1);font-size:13px;font-family:inherit;transition:border-color .12s}
.inp:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 2px var(--acg)}.inp::placeholder{color:var(--tm)}
select.inp{cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23666' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;padding-right:26px}
textarea.inp{resize:vertical;min-height:50px}

/* Tables */
.tw{overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:7px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--tm);border-bottom:1px solid var(--bd);font-weight:600;white-space:nowrap}
tbody td{padding:7px 10px;border-bottom:1px solid var(--bd);vertical-align:middle}tbody tr{transition:background .08s}tbody tr:hover{background:var(--bgh)}

/* Badges */
.badge{display:inline-flex;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:500}
.bac{background:var(--acg);color:var(--ac)}.bgr{background:var(--grnd);color:var(--grn)}.bre{background:var(--redd);color:var(--red)}.bbl{background:var(--blud);color:var(--blu)}.bor{background:var(--orgd);color:var(--org)}.byl{background:var(--yld);color:var(--yl)}.bpk{background:var(--pkd);color:var(--pk)}.bcn{background:var(--cnd);color:var(--cn)}

/* Modal */
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px);animation:fadeIn .1s}
.md{background:var(--bg1);border:1px solid var(--bd);border-radius:8px;padding:22px;min-width:380px;max-width:560px;width:92%;max-height:85vh;overflow-y:auto;animation:fadeIn .2s}
.mt{font-size:15px;font-weight:600;color:var(--t1)}.fg{margin-bottom:11px}.fl{display:block;font-size:10px;color:var(--tm);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}

/* Tabs, search, progress */
.tb{display:flex;gap:0;border-bottom:1px solid var(--bd);margin-bottom:14px}
.ti{padding:7px 12px;font-size:12px;font-weight:500;cursor:pointer;color:var(--tm);border-bottom:2px solid transparent;transition:all .12s}.ti:hover{color:var(--t2)}.ti.a{color:var(--ac);border-bottom-color:var(--ac)}
.sb{display:flex;align-items:center;gap:6px;background:var(--bgi);border:1px solid var(--bd);border-radius:4px;padding:0 10px}
.sb:focus-within{border-color:var(--ac);box-shadow:0 0 0 2px var(--acg)}
.sb input{border:none;background:transparent;color:var(--t1);padding:6px 0;font-size:13px;flex:1;outline:none;font-family:inherit}.sb input::placeholder{color:var(--tm)}
.pb{height:3px;background:var(--bgi);border-radius:2px;overflow:hidden}.pf{height:100%;border-radius:2px;transition:width .4s}

/* Combobox */
.cb{position:relative}.cbd{position:absolute;top:100%;left:0;right:0;z-index:10;background:var(--bg1);border:1px solid var(--bd);border-radius:4px;margin-top:2px;max-height:170px;overflow-y:auto;box-shadow:0 4px 20px rgba(0,0,0,.35)}
.cbo{padding:5px 10px;cursor:pointer;font-size:13px;color:var(--t2);display:flex;align-items:center;justify-content:space-between}.cbo:hover,.cbo.hl{background:var(--bgh);color:var(--t1)}

/* Misc */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.pt{font-size:17px;font-weight:600;color:var(--t1)}
.av{width:34px;height:34px;border-radius:6px;background:var(--acg);display:flex;align-items:center;justify-content:center;color:var(--ac);font-weight:600;font-size:13px;flex-shrink:0}
.sn{position:fixed;top:12px;right:12px;z-index:200;border-radius:4px;padding:6px 14px;font-size:12px;font-weight:500;animation:fadeIn .2s}
.empty{text-align:center;padding:36px 20px;color:var(--tm)}.empty-ico{font-size:28px;margin-bottom:6px;opacity:.5}.empty-title{font-size:14px;font-weight:600;color:var(--t2);margin-bottom:4px}.empty-sub{font-size:12px;margin-bottom:12px}
.actions{display:flex;gap:4px;justify-content:flex-end}
.row-actions{display:flex;gap:3px;opacity:0;transition:opacity .12s}tr:hover .row-actions{opacity:1}
.tag{display:inline-flex;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:500;margin:1px;background:var(--acg);color:var(--ac)}
.chart-bar{display:flex;align-items:flex-end;gap:3px;height:100px;padding-top:8px}.chart-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1}.chart-fill{width:100%;border-radius:2px 2px 0 0;min-height:1px;transition:height .4s}.chart-label{font-size:9px;color:var(--tm)}.chart-val{font-size:9px;font-weight:600}
.req-card{border:1px solid var(--bd);border-radius:6px;padding:12px;background:var(--bg2);margin-bottom:8px}.req-card.done{opacity:.5}
.ann-card{border:1px solid var(--bd);border-radius:6px;padding:16px;background:var(--bg2);margin-bottom:10px}.ann-card.pinned{border-color:var(--org)}
.mbt{display:none;position:fixed;top:8px;left:8px;z-index:60;background:var(--bg2);border:1px solid var(--bd);border-radius:4px;padding:5px;cursor:pointer;color:var(--t1)}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg0)}
.login-box{background:var(--bg1);border:1px solid var(--bd);border-radius:10px;padding:32px;width:360px;animation:fadeIn .3s}
.login-title{font-size:20px;font-weight:700;color:var(--t1);text-align:center;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--tm);text-align:center;margin-bottom:24px}
.login-err{color:var(--red);font-size:12px;margin-top:8px;text-align:center;display:none}

/* Placeholder tool */
.placeholder-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;color:var(--tm);text-align:center}
.placeholder-ico{font-size:48px;margin-bottom:12px;opacity:.3}.placeholder-title{font-size:18px;font-weight:600;color:var(--t2);margin-bottom:6px}.placeholder-sub{font-size:13px;max-width:400px}

/* Character Builder */
.cb-container{display:flex;gap:16px}
.cb-left{width:280px;flex-shrink:0}
.cb-right{flex:1;min-width:0}
.cb-section{margin-bottom:12px}
.cb-stitle{font-size:11px;font-weight:600;color:var(--ac);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.cb-attr-row{display:flex;align-items:center;margin-bottom:6px}
.cb-attr-label{width:90px;font-size:12px;color:var(--t2)}
.cb-attr-controls{display:flex;align-items:center;gap:3px}
.cb-attr-btn{width:22px;height:26px;background:transparent;border:1px solid var(--bd);border-radius:3px;color:var(--tm);font-size:12px;cursor:pointer;transition:all .12s}
.cb-attr-btn:hover{border-color:var(--ac);color:var(--ac)}
.cb-attr-val{width:50px;height:28px;background:var(--bgi);border:1px solid var(--bd);border-radius:3px;color:var(--t1);font-size:13px;font-weight:600;text-align:center}
.cb-points-row{display:flex;justify-content:space-between;padding:8px 0;margin-top:6px;border-top:1px solid var(--bd);font-size:12px;color:var(--t2)}
.cb-points-val{font-weight:600;color:var(--grn)}
.cb-stat-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.cb-stat-row span:first-child{color:var(--tm)}
.cb-stat-val{color:var(--grn);font-weight:500}
.cb-input-row{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px;color:var(--tm)}
.cb-input-row span{flex:1}
.cb-stat-input{width:55px;height:24px;background:var(--bgi);border:1px solid var(--bd);border-radius:3px;color:var(--t1);text-align:center;font-size:12px}
.cb-apply-btn{width:24px;height:24px;background:transparent;border:1px solid var(--bd);border-radius:3px;color:var(--tm);cursor:pointer}
.cb-apply-btn:hover{border-color:var(--ac);color:var(--ac)}
.cb-pp{font-size:13px;color:var(--grn);font-weight:500}
.cb-skill-grid{display:flex;gap:0;justify-content:center;overflow-x:auto}
.cb-skill-col{display:flex;flex-direction:column}
.cb-skill-row{display:flex;justify-content:center}
.cb-skill-cell{width:70px;height:62px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
.cb-skill-wrap{position:relative;display:flex;flex-direction:column;align-items:center}
.cb-skill-btn{width:40px;height:40px;background-color:transparent;background-size:100% 100%;background-position:center;background-repeat:no-repeat;border:1px solid var(--bd);border-radius:4px;cursor:pointer;transition:all .12s}
.cb-skill-btn:hover:not(.cb-locked){border-color:var(--ac);box-shadow:0 0 8px rgba(127,109,242,.3);transform:scale(1.05)}
.cb-skill-btn.cb-locked{opacity:.3;cursor:not-allowed;pointer-events:none;filter:grayscale(40%)}
.cb-skill-btn.cb-active{border-color:var(--org);box-shadow:0 0 6px rgba(210,153,34,.4)}
.cb-skill-btn.cb-maxed{border-color:var(--grn);box-shadow:0 0 6px rgba(86,211,100,.4)}
.cb-skill-cnt{font-size:10px;font-weight:500;margin-top:2px;color:var(--tm)}
.cb-skill-cnt.cb-active{color:var(--org)}
.cb-skill-cnt.cb-maxed{color:var(--grn)}
.cb-tooltip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);width:200px;padding:10px;background:var(--bg1);border:1px solid var(--ac);border-radius:4px;box-shadow:0 4px 12px rgba(0,0,0,.5);z-index:100;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .12s;font-size:12px}
.cb-skill-wrap:hover .cb-tooltip{opacity:1;visibility:visible}
.cb-tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--ac)}
.cb-reset-row{display:flex;justify-content:center;gap:10px;margin-top:16px;padding-top:14px;border-top:1px solid var(--bd)}
@media(max-width:900px){.cb-container{flex-direction:column}.cb-left{width:100%}}

@media(max-width:768px){#sidebar{position:fixed;z-index:50;height:100%}.mbt{display:flex}#main{padding:12px;padding-top:44px}.cg{grid-template-columns:1fr}.tool-sw{flex-wrap:wrap}}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast" class="sn" style="display:none"></div>
<button class="mbt" id="mob-toggle" style="display:none">☰</button>

<script>
// ═══════════════════════════════════════════════════════════
// STORAGE & UTILS
// ═══════════════════════════════════════════════════════════
const SK="gv_platform_v1";
const DKEYS=["guilds","p","gt","it","items","log","events","orders","requests","announcements","users","mapData","gear","goldRequests","playerRecipes","cities","vendors","vendorItems","toolStatus"];
function load(){try{return JSON.parse(localStorage.getItem(SK))||null}catch(e){return null}}
function persist(){try{const o={};DKEYS.forEach(k=>o[k]=D[k]);localStorage.setItem(SK,JSON.stringify(o))}catch(e){}}
function toast(m,t){const el=document.getElementById("toast");el.textContent=m;el.style.display="block";el.style.background=t==="error"?"var(--redd)":t==="warn"?"var(--orgd)":"var(--grnd)";el.style.color=t==="error"?"var(--red)":t==="warn"?"var(--org)":"var(--grn)";el.style.border="1px solid "+(t==="error"?"rgba(229,83,75,.25)":t==="warn"?"rgba(210,153,34,.25)":"rgba(86,211,100,.25)");setTimeout(()=>el.style.display="none",2200)}
function exportJSON(){const o={};DKEYS.forEach(k=>o[k]=D[k]);o._craftItems=craftItems;o._craftResources=craftResources;o._craftSkillXpTables=craftSkillXpTables;const b=new Blob([JSON.stringify(o,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="guild-hub-backup-"+new Date().toISOString().slice(0,10)+".json";a.click();toast("Exported!")}
function exportCSV(rows,fn){const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");const b=new Blob([csv],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=fn;a.click();toast("CSV exported!")}
function importJSON(file){const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);DKEYS.forEach(k=>{if(d[k])D[k]=d[k]});if(d._craftItems){craftItems=d._craftItems;saveCraftItems()}if(d._craftResources){craftResources=d._craftResources;saveCraftResources()}if(d._craftSkillXpTables){craftSkillXpTables=d._craftSkillXpTables;saveCraftSkillXpTables()}persist();toast("Imported!");render()}catch(err){toast("Invalid file","error")}};r.readAsText(file)}

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const fmt=n=>n.toLocaleString();
const fmtD=d=>new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
const fmtDT=d=>new Date(d).toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});

// ═══════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════
const saved=load();
const DEFAULT_CFG={guildName:"My Guild",ranks:["Guild Leader","Officer","Member","Recruit"],tags:["Tank","Healer","DPS","Crafter","Gatherer","Scout"]};
const DEFAULT_SITE_ADMIN={id:"__site_admin__",username:"admin",password:"admin",role:"site_admin",displayName:"Site Admin",discord:"",guildId:null};
const D={
  guilds:saved?.guilds||[],    // [{id, name, createdBy, cfg:{guildName,ranks,tags}}]
  users:saved?.users||[DEFAULT_SITE_ADMIN],
  p:saved?.p||[],              // all members across all guilds, each has guildId
  gt:saved?.gt||[],            // gold transactions, each has guildId
  it:saved?.it||[],            // item transactions, each has guildId
  items:saved?.items||[],      // bank item definitions, each has guildId
  log:saved?.log||[],          // audit log, each has guildId
  events:saved?.events||[],
  orders:saved?.orders||[],
  requests:saved?.requests||[],
  announcements:saved?.announcements||[],
  mapData:saved?.mapData||[],
  gear:saved?.gear||[],
  goldRequests:saved?.goldRequests||[],
  playerRecipes:saved?.playerRecipes||{},
  cities:saved?.cities||[],
  vendors:saved?.vendors||[],
  vendorItems:saved?.vendorItems||[],
  toolStatus:saved?.toolStatus||{crafting:false,charbuilder:true,announcements:true,map:true,itemsearch:true,wiki:true},
};
// Migration: upgrade legacy "admin" role account to "site_admin"
(function migrateAdminRole(){
  D.users.forEach(u=>{
    if(u.role==="admin"&&(!u.guildId||u.username.toLowerCase()==="admin")){
      u.role="site_admin";
    }
  });
  // Ensure DEFAULT_SITE_ADMIN exists if no site_admin account present
  if(!D.users.some(u=>u.role==="site_admin"||u.role==="admin")){
    D.users.push({...DEFAULT_SITE_ADMIN});
  }
  // persist() called after migrateData below
})();
(function migrateData(){
  const needsMigration=D.p.some(x=>!x.guildId)||D.gt.some(x=>!x.guildId)||D.items.some(x=>!x.guildId);
  if(!needsMigration)return;
  const legacyId="__legacy__";
  if(!D.guilds.find(g=>g.id===legacyId)){
    const legacyCfg=saved?.cfg||DEFAULT_CFG;
    D.guilds.push({id:legacyId,name:legacyCfg.guildName||"My Guild",createdBy:"admin",cfg:legacyCfg,createdDate:new Date().toISOString().slice(0,10)});
  }
  ["p","gt","it","items","log","events","orders","requests","announcements","gear","goldRequests"].forEach(k=>{
    if(Array.isArray(D[k]))D[k].forEach(x=>{if(!x.guildId)x.guildId=legacyId;});
  });
  if(D.playerRecipes&&typeof D.playerRecipes==="object"&&!Array.isArray(D.playerRecipes)){
    // playerRecipes is keyed by playerId, migrate by finding player's guildId
  }
  persist(); // single persist after both migrations
})();
if(!saved)persist(); // save defaults on first run

// Gold math:
// Player debt = borrowed - repaid - donated (clamped to 0)
//   Donations pay off debt first, any excess goes to guild treasury
// Guild bank = all gold physically in the bank
//   = donations + repayments - borrows (but donations used for debt don't double-count)
//   Simpler: treasury = sum of all inflows - sum of all outflows
//   Inflows: donations, repayments. Outflows: borrows.
//   Treasury = donated + repaid - borrowed
function pGold(pid){
  // Process transactions chronologically - deposits reduce existing debt first
  const tx=G.gt.filter(t=>t.playerId===pid).sort((a,b)=>a.date.localeCompare(b.date)||a.id.localeCompare(b.id));
  let debt=0, totalBorrowed=0, totalDeposited=0;
  tx.forEach(t=>{
    if(t.type==="Borrow Gold"){
      debt+=t.amount;
      totalBorrowed+=t.amount;
    } else if(t.type==="Deposit Gold"||t.type==="Repay Gold"||t.type==="Donate Gold"){
      // All deposits reduce existing debt first
      debt=Math.max(0,debt-t.amount);
      totalDeposited+=t.amount;
    }
  });
  return{borrowed:totalBorrowed,deposited:totalDeposited,debt}
}
function gStats(){
  const deposits=G.gt.filter(t=>t.type==="Deposit Gold"||t.type==="Donate Gold"||t.type==="Repay Gold").reduce((s,t)=>s+t.amount,0);
  const tb=G.gt.filter(t=>t.type==="Borrow Gold").reduce((s,t)=>s+t.amount,0);
  const treasury=deposits-tb; // net gold in the bank
  const totalDebt=G.p.reduce((s,p)=>s+pGold(p.id).debt,0);
  return{deposited:deposits,borrowed:tb,owed:totalDebt,treasury}
}
function pItems(pid){const tx=G.it.filter(t=>t.playerId===pid);return{borrowed:tx.filter(t=>t.type==="Borrowed").reduce((s,t)=>s+t.qty,0),returned:tx.filter(t=>t.type==="Returned").reduce((s,t)=>s+t.qty,0),donated:tx.filter(t=>t.type==="Donated").reduce((s,t)=>s+t.qty,0)}}
function topN(type,src,n=5){const m={};(src==="gold"?G.gt:G.it).filter(t=>t.type===type).forEach(t=>{m[t.playerId]=(m[t.playerId]||0)+(src==="gold"?t.amount:t.qty)});return Object.entries(m).map(([k,v])=>({id:k,name:pN(k),value:v})).sort((a,b)=>b.value-a.value).slice(0,n)}
function feed(){const e=[];G.gt.forEach(t=>{const v=t.type==="Borrow Gold"?"borrowed":t.type==="Repay Gold"?"repaid":"donated";e.push({date:t.date,text:`${pN(t.playerId)} ${v} ${fmt(t.amount)} gold`,type:t.type,id:t.id})});G.it.forEach(t=>{const v=t.type==="Borrowed"?"borrowed":t.type==="Returned"?"returned":"donated";e.push({date:t.date,text:`${pN(t.playerId)} ${v} ${t.qty} ${iN(t.itemId)}`,type:t.type,id:t.id})});return e.sort((a,b)=>b.date.localeCompare(a.date))}

inp.addEventListener("focus",()=>{inp.value="";showDD("")});inp.addEventListener("input",()=>showDD(inp.value));inp.addEventListener("keydown",e=>{if(!dd)return;const n=dd.children.length;if(e.key==="ArrowDown"){e.preventDefault();hlIdx=Math.min(hlIdx+1,n-1);hDD()}else if(e.key==="ArrowUp"){e.preventDefault();hlIdx=Math.max(hlIdx-1,0);hDD()}else if(e.key==="Enter"){e.preventDefault();if(dd.children[hlIdx])dd.children[hlIdx].click()}else if(e.key==="Escape")cDD()});

    html=wrap(`${logo}<div class="login-title">Join a Guild</div><div class="login-sub" style="margin-bottom:16px">Select the guild you want to apply to</div>

    let sh=`<div style="padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:9px"><div style="width:24px;height:24px;border-radius:4px;background:var(--acs);display:inline-flex;align-items:center;justify-content:center;color:var(--ac);font-weight:700;font-size:10px">GV</div><div style="flex:1"><div style="font-weight:600;color:var(--t1);font-size:12px">Gloria Victis Guild Hub</div><div style="font-size:9px;color:var(--tm)">Sign in to continue</div></div></div>`;

    sb.innerHTML=sh;
    document.querySelectorAll("[data-tool-from-login]").forEach(el=>{
      el.addEventListener("click",()=>{
        const tk=el.dataset.toolFromLogin;
        if(tk!=="treasury"){activeTool=tk;pg="dashboard";loginMode="login";renderGuest();}
      });
    });
  })();
  // Put login form centered in #main
  // Strip outer login-wrap since #main provides the centering
  const loginContent=html.replace(/^<div class="login-wrap"><div class="login-box"[^>]*>/,'').replace(/<\/div><\/div>$/,'');
  document.getElementById("main").innerHTML=`<div style="display:flex;align-items:center;justify-content:center;min-height:70vh;padding:20px"><div class="login-box" style="max-width:420px;width:100%">${loginContent}</div></div>`;

  window._regData=window._regData||{};

  if(mode==="login"){
    const doLogin=()=>{
      const u=document.getElementById("login-user").value.trim();
      const p=document.getElementById("login-pass").value;
      const user=D.users.find(x=>x.username.toLowerCase()===u.toLowerCase()&&x.password===p);
      if(!user){showErr("Invalid username or password");return}
      if(user.status==="pending"){
        // Show pending screen directly
        currentUser=user;currentGuildId=user.guildId||null;
        document.getElementById("root").innerHTML=`<div class="login-wrap"><div class="login-box" style="max-width:420px"><div style="text-align:center;padding:20px 0"><div style="font-size:40px;margin-bottom:12px">⏳</div><div style="font-size:16px;font-weight:600;margin-bottom:8px">Application Pending</div><div style="font-size:13px;color:var(--t2);line-height:1.7">Your application to join <strong>${D.guilds.find(g=>g.id===user.guildId)?.name||"the guild"}</strong> is waiting for approval from the Guild Leader.</div><div style="margin-top:20px"><button class="btn bg" id="pending-logout-login">Sign Out</button></div></div></div></div>`;
        document.getElementById("pending-logout-login").addEventListener("click",()=>{currentUser=null;currentGuildId=null;loginMode="login";render();});
        return;
      }
      currentUser=user;
      currentGuildId=user.guildId||null;
      if(isSiteAdmin())currentGuildId=currentGuildId||D.guilds[0]?.id||null;
      // Admin/guild_leader can access without a guild
      activeTool="treasury";pg="dashboard";
      window._regData={};
      render();
    };
    document.getElementById("login-btn").addEventListener("click",doLogin);
    document.getElementById("login-pass").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()});
    document.getElementById("goto-register").addEventListener("click",()=>{loginMode="register";renderLogin()});
  } else if(mode==="register"){
    document.getElementById("login-btn").addEventListener("click",()=>{
      const name=document.getElementById("login-user").value.trim();
      const discord=document.getElementById("login-discord").value.trim();
      const pass=document.getElementById("login-pass").value;
      const pass2=document.getElementById("login-pass2").value;
      if(!name){showErr("In-game name is required");return}
      if(!discord){showErr("Discord is required");return}
      if(!pass||pass.length<3){showErr("Password must be at least 3 characters");return}
      if(pass!==pass2){showErr("Passwords don't match");return}
      if(D.users.find(x=>x.username.toLowerCase()===name.toLowerCase())){showErr("Username already exists");return}
      window._regData={name,discord,pass};
      loginMode="create-guild";renderLogin();
    });
    document.getElementById("goto-login").addEventListener("click",()=>{loginMode="login";renderLogin()});
  } else if(mode==="create-guild"){
    document.getElementById("create-guild-btn").addEventListener("click",()=>{
      const guildName=document.getElementById("reg-guild-name").value.trim();
      if(!guildName){showErr("Guild name is required");return}
      const {name,discord,pass}=window._regData;
      if(!name){loginMode="register";renderLogin();return}
      const guildId=uid();
      const newGuild={id:guildId,name:guildName,createdBy:name,cfg:{...DEFAULT_CFG,guildName},createdDate:new Date().toISOString().slice(0,10)};
      D.guilds.push(newGuild);
      const newUser={id:uid(),username:name,discord,password:pass,displayName:name,role:"guild_leader",guildId};
      D.users.push(newUser);
      currentUser=newUser;currentGuildId=guildId;
      rebuildG();
      addLog("Guild Created",guildName);
      persist();window._regData={};activeTool="treasury";pg="dashboard";render();toast("Welcome, "+name+"! Your guild has been created.");
    });
    document.getElementById("goto-join-guild").addEventListener("click",()=>{loginMode="join-guild";renderLogin()});

  } else if(mode==="join-guild"){

    document.querySelectorAll("[data-gid]").forEach(row=>{
      row.addEventListener("click",()=>{
        document.querySelectorAll("[data-gid]").forEach(r=>r.style.borderColor="var(--bd)");

        if(disp){disp.style.display="block";disp.textContent="Selected: "+g?.name;}
        const btn=document.getElementById("apply-guild-btn");
        if(btn)btn.disabled=false;
      });
    });
    document.getElementById("apply-guild-btn").addEventListener("click",()=>{
      if(!selectedGuildId){showErr("Select a guild first");return}

      const newUser={id:uid(),username:name,discord,password:pass,displayName:name,role:"member",guildId:selectedGuildId,status:"pending"};

      document.getElementById("back-to-login").addEventListener("click",()=>{loginMode="login";renderLogin()});
    });
    document.getElementById("goto-create-guild").addEventListener("click",()=>{loginMode="create-guild";renderLogin()});
  }
}

function renderNoPendingGuild(){
  // User is logged in but their application is pending or they have no guild
  const userStatus=currentUser.status;
  const guild=D.guilds.find(g=>g.id===currentUser.guildId);
  document.getElementById("root").innerHTML=`<div class="login-wrap"><div class="login-box" style="max-width:420px">
    <div style="text-align:center;padding:20px 0">
      <div style="font-size:40px;margin-bottom:12px">${userStatus==="pending"?"⏳":"🚫"}</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:8px">${userStatus==="pending"?"Application Pending":"No Guild Access"}</div>

          :"You don't have access to any guild yet."}

        <button class="btn bg" id="pending-logout">Sign Out</button>

}

function pgAnnouncements(){
  const fil=G.announcements.slice().sort((a,b)=>{if(a.pinned!==b.pinned)return a.pinned?-1:1;return b.date.localeCompare(a.date)});
  let h=`<div class="ph"><div class="pt">Announcements</div>${isAdmin()?`<button class="btn bp" id="add-ann-btn">+ New Post</button>`:""}</div>`;
  if(!fil.length)return h+`<div class="card">${empty("📢","No announcements","",isAdmin()?"+ Post Announcement":"","add-ann-btn2")}</div>`;
  fil.forEach(a=>{
    h+=`<div class="ann-card${a.pinned?" pinned":""}">`;
    h+=`<div style="display:flex;justify-content:space-between;align-items:flex-start"><div>`;
    if(a.pinned)h+=`<span style="color:var(--org);font-size:11px;font-weight:600">📌 PINNED</span> `;
    h+=`<span style="font-size:15px;font-weight:600">${a.title}</span></div>`;
    if(isAdmin())h+=`<div style="display:flex;gap:3px"><button class="btn bg bs pin-ann" data-id="${a.id}">${a.pinned?"Unpin":"Pin"}</button><button class="btn bg bs edit-ann" data-id="${a.id}">✎</button><button class="btn bd bs del-ann" data-id="${a.id}">✕</button></div>`;
    h+=`</div>`;
    h+=`<div style="font-size:11px;color:var(--tm);margin:6px 0">Posted by ${a.author||"Admin"} on ${fmtD(a.date)}</div>`;
    h+=`<div style="font-size:13px;color:var(--t2);line-height:1.6;white-space:pre-wrap">${a.body}</div>`;
    h+=`</div>`;
  });
  return h;
}

function modalAnnouncement(e){
  if(!isAdmin())return;e=e||{};
  openModal(e.id?"Edit Announcement":"New Announcement",body=>{
    body.innerHTML=`<div class="fg"><label class="fl">Title *</label><input class="inp" id="mf-title" value="${e.title||""}" placeholder="Announcement title"></div><div class="fg"><label class="fl">Body *</label><textarea class="inp" id="mf-body" style="min-height:120px" placeholder="Write your announcement...">${e.body||""}</textarea></div><div class="actions" style="margin-top:14px"><button class="btn bg" onclick="closeModal()">Cancel</button><button class="btn bp" id="mf-save">${e.id?"Save":"Post"}</button></div>`;
    setTimeout(()=>document.getElementById("mf-save").addEventListener("click",()=>{
      const title=document.getElementById("mf-title").value.trim(),body2=document.getElementById("mf-body").value.trim();
      if(!title||!body2){toast("Title and body required","error");return}
      if(e.id){const a=G.announcements.find(x=>x.id===e.id);if(a){a.title=title;a.body=body2}addLog("Announcement Edited",title)}
      else{D.announcements.push({id:uid(),title,body:body2,author:currentUser.displayName,date:new Date().toISOString().slice(0,10),pinned:false,guildId:currentGuildId});addLog("Announcement Posted",title)}
      persist();closeModal();render();toast(e.id?"Updated!":"Posted!");
    }),0);
  });
}

.map-temp-marker{position:absolute;transform:translate(-50%,-50%);pointer-events:none;z-index:20}
.map-temp-marker-icon{display:flex;align-items:center;justify-content:center;width:32px;height:32px;background:var(--ac);border:3px dashed #fff;border-radius:50%;font-size:16px;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.1)}}
</style>`;
  
  return h;
}

let mapTempMarker=null;
let mapNewCoords=null;

function initMapBindings(){
  const viewport=document.getElementById("map-viewport");
  const wrapper=document.getElementById("map-wrapper");
  const img=document.getElementById("map-image");
  if(!viewport||!wrapper||!img)return;
  
  const updateMapTransform=()=>{
    wrapper.style.transform=`translate(${mapState.panX}px,${mapState.panY}px) scale(${mapState.zoom})`;
    const zoomEl=document.getElementById("map-zoom-level");
    if(zoomEl)zoomEl.textContent=Math.round(mapState.zoom*100)+"%";
  };
  
  // Wait for image to load to get dimensions
  const initMap=(resetZoom=true)=>{
    const imgW=img.naturalWidth||8192;
    const imgH=img.naturalHeight||8192;
    const vpW=viewport.clientWidth;
    const vpH=viewport.clientHeight;
    
    if(resetZoom){
      // Calculate zoom to fit the map nicely in viewport (show ~70% of map)
      const fitZoom=Math.max(vpW/imgW,vpH/imgH)*1.4;
      mapState.zoom=Math.max(0.1,Math.min(1.5,fitZoom));
    }
    
    // Center the map
    mapState.panX=(vpW-imgW*mapState.zoom)/2;
    mapState.panY=(vpH-imgH*mapState.zoom)/2;
    updateMapTransform();
  };
  
  if(img.complete&&img.naturalWidth>0){initMap();}else{
    img.onload=()=>initMap();
    img.onerror=()=>{
      const ld=document.getElementById("map-loading");
      if(ld)ld.innerHTML="<div style=\'font-size:24px;margin-bottom:8px\'>⚠️</div><div>Map image could not be loaded.<br><small>The GitHub URL may not be accessible.</small></div>";
    };
    // Retry after 3s if still not loaded (handles slow connections)
    setTimeout(()=>{if(!img.naturalWidth&&img.src)img.src=img.src;},3000);
  }
  
  // Pan
  viewport.addEventListener("mousedown",e=>{
    if(e.target===viewport||e.target===img||e.target.id==="map-wrapper"){
      if(mapState.addingMarker){
        // Place temp marker
        const rect=viewport.getBoundingClientRect();
        const x=((e.clientX-rect.left-mapState.panX)/mapState.zoom)/img.naturalWidth*100;
        const y=((e.clientY-rect.top-mapState.panY)/mapState.zoom)/img.naturalHeight*100;
        mapNewCoords={x:Math.max(0,Math.min(100,x)),y:Math.max(0,Math.min(100,y))};
        
        // Show temp marker
        let tm=document.getElementById("map-temp-marker");
        if(!tm){
          tm=document.createElement("div");
          tm.id="map-temp-marker";
          tm.className="map-temp-marker";
          document.getElementById("map-markers").appendChild(tm);
        }
        const cat=document.getElementById("map-new-cat")?.value||"other";
        const catObj=MAP_CATEGORIES.find(c=>c.id===cat)||MAP_CATEGORIES[5];
        tm.innerHTML=`<span class="map-temp-marker-icon">${catObj.icon}</span>`;
        tm.style.left=mapNewCoords.x+"%";
        tm.style.top=mapNewCoords.y+"%";
        
        document.getElementById("map-new-coords").textContent=`Position: ${mapNewCoords.x.toFixed(1)}%, ${mapNewCoords.y.toFixed(1)}%`;
        document.getElementById("map-confirm-add").disabled=false;
        return;
      }
      mapState.dragging=true;
      mapState.dragStart={x:e.clientX-mapState.panX,y:e.clientY-mapState.panY};
      viewport.classList.add("grabbing");
    }
  });
  
  const _mapMouseMove=e=>{
    if(mapState.dragging){
      mapState.panX=e.clientX-mapState.dragStart.x;
      mapState.panY=e.clientY-mapState.dragStart.y;
      updateMapTransform();
    }
    // Update coords display
    const rect=wrapper.getBoundingClientRect();
    const x=((e.clientX-rect.left)/mapState.zoom)/img.naturalWidth*100;
    const y=((e.clientY-rect.top)/mapState.zoom)/img.naturalHeight*100;
    if(x>=0&&x<=100&&y>=0&&y<=100){
      document.getElementById("map-coords").textContent=`X: ${x.toFixed(1)}%, Y: ${y.toFixed(1)}%`;
    }
  };
  const _mapMouseUp=()=>{
    mapState.dragging=false;
    viewport.classList.remove("grabbing");
  };
  // Remove any previous listeners before adding new ones (prevents stacking on re-render)
  document.removeEventListener("mousemove",window._mapMouseMove);
  document.removeEventListener("mouseup",window._mapMouseUp);
  window._mapMouseMove=_mapMouseMove;
  window._mapMouseUp=_mapMouseUp;
  document.addEventListener("mousemove",_mapMouseMove);
  document.addEventListener("mouseup",_mapMouseUp);
  
  // Zoom
  viewport.addEventListener("wheel",e=>{
    e.preventDefault();
    const rect=viewport.getBoundingClientRect();
    const mouseX=e.clientX-rect.left;
    const mouseY=e.clientY-rect.top;
    
    const oldZoom=mapState.zoom;
    const delta=e.deltaY>0?0.9:1.1;
    mapState.zoom=Math.max(0.08,Math.min(3,mapState.zoom*delta));
    
    // Zoom toward mouse position
    mapState.panX=mouseX-(mouseX-mapState.panX)*(mapState.zoom/oldZoom);
    mapState.panY=mouseY-(mouseY-mapState.panY)*(mapState.zoom/oldZoom);
    updateMapTransform();
  },{passive:false});
  
  // Toolbar buttons
  document.getElementById("map-zoom-in")?.addEventListener("click",()=>{
    const vpW=viewport.clientWidth;const vpH=viewport.clientHeight;
    const centerX=vpW/2;const centerY=vpH/2;
    const oldZoom=mapState.zoom;
    mapState.zoom=Math.min(3,mapState.zoom*1.4);
    mapState.panX=centerX-(centerX-mapState.panX)*(mapState.zoom/oldZoom);
    mapState.panY=centerY-(centerY-mapState.panY)*(mapState.zoom/oldZoom);
    updateMapTransform();
  });
  document.getElementById("map-zoom-out")?.addEventListener("click",()=>{
    const vpW=viewport.clientWidth;const vpH=viewport.clientHeight;
    const centerX=vpW/2;const centerY=vpH/2;
    const oldZoom=mapState.zoom;
    mapState.zoom=Math.max(0.1,mapState.zoom/1.4);
    mapState.panX=centerX-(centerX-mapState.panX)*(mapState.zoom/oldZoom);
    mapState.panY=centerY-(centerY-mapState.panY)*(mapState.zoom/oldZoom);
    updateMapTransform();
  });
  document.getElementById("map-reset")?.addEventListener("click",()=>{
    initMap(true);
  });
  
  // Filter markers based on search and category toggles
  const updateMarkerVisibility=()=>{
    const searchTerm=mapState.searchTerm.toLowerCase();
    const markers=document.querySelectorAll(".map-marker");
    let visibleCount=0;
    
    markers.forEach(m=>{
      const cat=m.dataset.cat;
      const name=m.dataset.name||"";
      const hiddenByCat=mapState.hiddenCats[cat];
      const hiddenBySearch=searchTerm&&!name.includes(searchTerm);
      
      if(hiddenByCat){
        m.classList.add("hidden");
        m.classList.remove("dimmed");
      }else if(hiddenBySearch){
        m.classList.remove("hidden");
        m.classList.add("dimmed");
      }else{
        m.classList.remove("hidden","dimmed");
        visibleCount++;
      }
    });
    return visibleCount;
  };
  
  // Search functionality
  const searchInput=document.getElementById("map-search");
  const searchClear=document.getElementById("map-search-clear");
  const searchResults=document.getElementById("map-search-results");
  
  const updateSearchResults=()=>{
    if(!searchResults)return;
    const term=mapState.searchTerm.toLowerCase();
    searchClear.style.display=term?"block":"none";
    
    if(!term){
      searchResults.style.display="none";
      updateMarkerVisibility();
      return;
    }
    
    const markers=D.mapData||[];
    const matches=markers.map((m,i)=>({...m,idx:i})).filter(m=>m.name.toLowerCase().includes(term));
    
    if(matches.length===0){
      searchResults.innerHTML=`<div class="sr-header">No results for "${term}"</div><div class="sr-empty">Try a different search term</div>`;
    }else{
      let html=`<div class="sr-header"><span>${matches.length} result${matches.length>1?"s":""}</span><button class="map-search-close" style="background:none;border:none;color:var(--tm);cursor:pointer">✕</button></div>`;
      matches.slice(0,15).forEach(m=>{
        const cat=MAP_CATEGORIES.find(c=>c.id===m.category)||MAP_CATEGORIES[5];
        html+=`<div class="sr-item" data-idx="${m.idx}"><span class="sr-icon" style="background:${cat.color}">${cat.icon}</span><div class="sr-info"><div class="sr-name">${m.name}</div><div class="sr-cat">${cat.name}</div></div></div>`;
      });
      if(matches.length>15)html+=`<div class="sr-empty">...and ${matches.length-15} more</div>`;
      searchResults.innerHTML=html;
      
      // Bind clicks
      searchResults.querySelectorAll(".sr-item").forEach(item=>{
        item.addEventListener("click",()=>{
          const idx=parseInt(item.dataset.idx);
          const marker=D.mapData[idx];
          if(!marker)return;
          
          // Pan to marker
          const imgW=img.naturalWidth||8192;
          const imgH=img.naturalHeight||8192;
          const vpW=viewport.clientWidth;
          const vpH=viewport.clientHeight;
          mapState.zoom=Math.max(0.6,mapState.zoom);
          mapState.panX=vpW/2-marker.x/100*imgW*mapState.zoom;
          mapState.panY=vpH/2-marker.y/100*imgH*mapState.zoom;
          updateMapTransform();
          
          // Highlight marker
          document.querySelectorAll(".map-marker").forEach(x=>x.classList.remove("selected","highlight"));
          const markerEl=document.querySelector(`.map-marker[data-idx="${idx}"]`);
          if(markerEl){
            markerEl.classList.add("selected","highlight");
            markerEl.click();
          }
          
          // Close search results
          searchResults.style.display="none";
          searchInput.blur();
        });
      });
      
      searchResults.querySelector(".map-search-close")?.addEventListener("click",()=>{
        mapState.searchTerm="";
        searchInput.value="";
        updateSearchResults();
      });
    }
    searchResults.style.display="block";
    updateMarkerVisibility();
  };
  
  searchInput?.addEventListener("input",e=>{
    mapState.searchTerm=e.target.value;
    updateSearchResults();
  });
  
  searchInput?.addEventListener("focus",()=>{
    if(mapState.searchTerm)updateSearchResults();
  });
  
  searchClear?.addEventListener("click",()=>{
    mapState.searchTerm="";
    searchInput.value="";
    searchInput.focus();
    updateSearchResults();
  });
  
  // Legend row toggles (in left sidebar)
  document.querySelectorAll(".map-leg-row").forEach(row=>{
    row.addEventListener("click",function(){
      const cat=this.dataset.cat;
      mapState.hiddenCats[cat]=!mapState.hiddenCats[cat];
      this.classList.toggle("off",mapState.hiddenCats[cat]);
      updateMarkerVisibility();
    });
  });
  
  // Toggle all button
  document.getElementById("map-toggle-all")?.addEventListener("click",function(){
    const anyVisible=MAP_CATEGORIES.some(c=>!mapState.hiddenCats[c.id]);
    MAP_CATEGORIES.forEach(c=>{
      mapState.hiddenCats[c.id]=anyVisible;
    });
    document.querySelectorAll(".map-leg-row").forEach(row=>{
      row.classList.toggle("off",anyVisible);
    });
    updateMarkerVisibility();
  });
  
  // Add marker mode
  document.getElementById("map-add-marker")?.addEventListener("click",function(){
    mapState.addingMarker=!mapState.addingMarker;
    this.classList.toggle("active",mapState.addingMarker);
    document.getElementById("map-add-panel").style.display=mapState.addingMarker?"block":"none";
    viewport.classList.toggle("placing",mapState.addingMarker);
    if(!mapState.addingMarker){
      document.getElementById("map-temp-marker")?.remove();
      mapNewCoords=null;
      document.getElementById("map-new-name").value="";
      document.getElementById("map-new-notes").value="";
      document.getElementById("map-new-coords").textContent="Position: --";
      document.getElementById("map-confirm-add").disabled=true;
    }
    document.getElementById("map-info").style.display="none";
  });
  
  document.getElementById("map-cancel-add")?.addEventListener("click",()=>{
    document.getElementById("map-add-marker")?.click();
  });
  
  document.getElementById("map-new-cat")?.addEventListener("change",function(){
    const tm=document.getElementById("map-temp-marker");
    if(tm){
      const catObj=MAP_CATEGORIES.find(c=>c.id===this.value)||MAP_CATEGORIES[5];
      tm.querySelector(".map-temp-marker-icon").textContent=catObj.icon;
    }
  });
  
  document.getElementById("map-confirm-add")?.addEventListener("click",()=>{
    const name=document.getElementById("map-new-name")?.value.trim();
    if(!name){toast("Enter a marker name","error");return}
    if(!mapNewCoords){toast("Click on the map to place marker","error");return}
    
    const marker={
      id:Date.now(),
      name,
      category:document.getElementById("map-new-cat")?.value||"other",
      notes:document.getElementById("map-new-notes")?.value.trim()||"",
      x:mapNewCoords.x,
      y:mapNewCoords.y,
      addedBy:currentUser?.displayName||"Unknown",
      addedDate:new Date().toISOString()
    };
    D.mapData.push(marker);
    persist();addLog("Map Marker Added",name);
    // Reset add mode state before re-render (render() now handles mapState reset)
    mapNewCoords=null;
    render();
    toast(`Marker "${name}" added!`);
  });
  
  // Click markers
  document.querySelectorAll(".map-marker").forEach(m=>{
    m.addEventListener("click",e=>{
      e.stopPropagation();
      const idx=parseInt(m.dataset.idx);
      const marker=D.mapData[idx];
      if(!marker)return;
      
      // Deselect others
      document.querySelectorAll(".map-marker").forEach(x=>x.classList.remove("selected"));
      m.classList.add("selected");
      
      const cat=MAP_CATEGORIES.find(c=>c.id===marker.category)||MAP_CATEGORIES[5];
      const panel=document.getElementById("map-info");
      panel.innerHTML=`
        <div class="map-info-name"><span>${cat.icon}</span>${marker.name}</div>
        <div class="map-info-cat">${cat.name}</div>
        ${marker.notes?`<div class="map-info-notes">${marker.notes}</div>`:""}
        <div class="map-info-meta">Added by ${marker.addedBy||"Unknown"} • ${marker.addedDate?new Date(marker.addedDate).toLocaleDateString():""}</div>
        ${isContributor()?`<div class="map-info-actions"><button class="btn bg bs" id="map-edit-marker" data-idx="${idx}">✎ Edit</button><button class="btn bd bs" id="map-delete-marker" data-idx="${idx}">✕ Delete</button></div>`:""}
      `;
      panel.style.display="block";
      
      // Bind edit/delete
      document.getElementById("map-edit-marker")?.addEventListener("click",()=>modalEditMarker(idx));
      document.getElementById("map-delete-marker")?.addEventListener("click",()=>{
        if(confirm(`Delete marker "${marker.name}"?`)){
          D.mapData.splice(idx,1);persist();addLog("Map Marker Deleted",marker.name);render();toast("Marker deleted");
        }
      });
    });
  });
  
  // Close info panel when clicking elsewhere
  viewport.addEventListener("click",e=>{
    if(e.target===viewport||e.target===img||e.target.id==="map-wrapper"){
      if(!mapState.addingMarker){
        document.querySelectorAll(".map-marker").forEach(x=>x.classList.remove("selected","highlight"));
        document.getElementById("map-info").style.display="none";
        document.getElementById("map-search-results").style.display="none";
      }
    }
  });
  
  // Initial visibility update
  updateMarkerVisibility();
}

function modalEditMarker(idx){
  const marker=D.mapData[idx];
  if(!marker)return;
  
  let catOpts="";
  MAP_CATEGORIES.forEach(c=>{catOpts+=`<option value="${c.id}"${marker.category===c.id?" selected":""}>${c.icon} ${c.name}</option>`});
  
  openModal("Edit Marker",body=>{
    body.innerHTML=`
      <div class="fg"><label class="fl">Name</label><input class="inp" id="edit-marker-name" value="${marker.name}"></div>
      <div class="fg"><label class="fl">Category</label><select class="inp" id="edit-marker-cat">${catOpts}</select></div>
      <div class="fg"><label class="fl">Notes</label><textarea class="inp" id="edit-marker-notes" rows="3">${marker.notes||""}</textarea></div>
      <div class="actions"><button class="btn bg" onclick="closeModal()">Cancel</button><button class="btn bp" id="save-marker">Save</button></div>
    `;
    document.getElementById("save-marker")?.addEventListener("click",()=>{
      const name=document.getElementById("edit-marker-name")?.value.trim();
      if(!name){toast("Name required","error");return}
      marker.name=name;
      marker.category=document.getElementById("edit-marker-cat")?.value||"other";
      marker.notes=document.getElementById("edit-marker-notes")?.value.trim()||"";
      persist();addLog("Map Marker Updated",name);closeModal();render();toast("Marker updated!");
    });
  });
}

function goldChart(){const now=new Date();const wks=[];for(let i=7;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i*7);wks.push({start:new Date(d.getFullYear(),d.getMonth(),d.getDate()-d.getDay()),label:""})}wks.forEach((w,i)=>{w.end=wks[i+1]?.start||new Date(now.getTime()+864e5);w.label=(w.start.getMonth()+1)+"/"+w.start.getDate()});const data=wks.slice(0,-1).map(w=>{const ir=t=>{const td=new Date(t.date);return td>=w.start&&td<w.end};return{label:w.label,don:G.gt.filter(t=>t.type==="Donate Gold"&&ir(t)).reduce((s,t)=>s+t.amount,0),bor:G.gt.filter(t=>t.type==="Borrow Gold"&&ir(t)).reduce((s,t)=>s+t.amount,0)}});const mx=Math.max(1,...data.map(d=>Math.max(d.don,d.bor)));let h=`<div style="display:flex;gap:16px;margin-bottom:4px"><span style="font-size:10px;color:var(--grn)">● Donated</span><span style="font-size:10px;color:var(--red)">● Borrowed</span></div><div class="chart-bar">`;data.forEach(d=>{h+=`<div class="chart-col"><div class="chart-val" style="color:var(--grn)">${d.don?fmt(d.don):""}</div><div class="chart-fill" style="height:${Math.max(d.don/mx*90,1)}px;background:var(--grn)"></div><div class="chart-fill" style="height:${Math.max(d.bor/mx*90,1)}px;background:var(--red)"></div><div class="chart-val" style="color:var(--red)">${d.bor?fmt(d.bor):""}</div><div class="chart-label">${d.label}</div></div>`});return h+`</div>`}

function tDash(){
  if(!G.p.length)return`<div class="ph"><div class="pt">Dashboard</div></div>`+empty("⊞","Welcome to Guild Guild Manager","Add your first member to get started.",isAdmin()?"+ Add Member":"","empty-add-player");
  const s=gStats(),td=topN("Donate Gold","gold"),tb=topN("Borrow Gold","gold"),f=feed(),mx=td[0]?.value||1;
  const upEv=G.events.filter(e=>e.date>=new Date().toISOString().slice(0,10)).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,3);
  const oReq=G.requests.filter(r=>r.status==="Open").length,oOrd=G.orders.filter(o=>o.status!=="Complete"&&o.status!=="Cancelled").length;
  let h=`<div class="ph"><div class="pt">Dashboard</div><span style="font-size:11px;color:var(--tm)">${G.p.filter(x=>x.status==="Active").length} active / ${G.p.length} total</span></div>`;
  h+=`<div class="cg" style="margin-bottom:14px">${stat("Guild Manager",fmt(s.treasury)+"g","var(--ac)")}${stat("Total In",fmt(s.deposited)+"g","var(--grn)")}${stat("Outstanding",fmt(s.owed)+"g","var(--red)")}${stat("Members",G.p.length,"var(--blu)")}${stat("Open Requests",oReq,"var(--org)")}${stat("Active Orders",oOrd,"var(--pk)")}</div>`;

    h+=`<div style="display:flex;justify-content:space-between;align-items:center">`;
    h+=`<div style="font-size:10px;color:var(--tm)">${fmtD(r.date)}${r.claimedBy?" • Claimed by "+r.claimedBy:""}${r.completedDate?" • Done "+fmtD(r.completedDate):""}</div>`;
    h+=`<div style="display:flex;gap:4px">`;

// Helper to find an item by name (unified - searches craftItems)
function findItemByName(name){return craftItems.find(i=>i.name===name)}
// Check if item is a processed resource (has materials and isResource flag)
function isProcessedResource(name){const item=findItemByName(name);return item&&item.isResource&&item.materials&&Object.keys(item.materials).length>0}
// Check if item is a crafted item (not a resource)
function isCraftedItem(name){const item=findItemByName(name);return item&&!item.isResource}

// Memoized XP-to-level cache — invalidated when skill tables change
const _xpCache={};
function craftGetXPForLevel(lv,skill){
  if(lv<=1)return 0;
  const key=(skill||"")+":"+lv;
  if(_xpCache[key]!==undefined)return _xpCache[key];
  const table=skill&&craftSkillXpTables[skill];
  let t=0;
  for(let i=2;i<=lv;i++){
    if(table&&table[i]!=null)t+=table[i];
    else t+=Math.floor(80*Math.pow(1.12,i-1));
  }
  _xpCache[key]=t;
  return t;
}
function craftClearXpCache(){for(const k in _xpCache)delete _xpCache[k];}
function craftGetXPForLevelStep(lv,skill){
  // XP needed for just one level: lv-1 -> lv
  if(lv<=1)return 0;
  const table=skill&&craftSkillXpTables[skill];
  if(table&&table[lv]!=null)return table[lv];
  return Math.floor(80*Math.pow(1.12,lv-1));
}
function craftGetItemXP(item,lv){return(item.xpByLevel&&item.xpByLevel[lv]!==undefined)?item.xpByLevel[lv]:(item.baseXP||0)}
function craftCalcXP(pLv,iLv,base){const d=pLv-iLv;let m=craftXpMods[999];if(d<=0)m=craftXpMods[0];else if(d<=5)m=craftXpMods[5];else if(d<=10)m=craftXpMods[10];else if(d<=15)m=craftXpMods[15];return Math.floor(base*(m/100))}
function craftMatQty(v){return typeof v==="object"?v.qty||0:v}
// Returns array of {name, qty} alts — handles both legacy single-alt and new multi-alt format
function craftMatAlts(v){
  if(typeof v!=="object")return [];
  if(v.alts&&Array.isArray(v.alts))return v.alts.filter(a=>a&&a.name);
  if(v.alt)return [{name:v.alt,qty:v.qty||1}]; // legacy single alt

// Legacy compat — single alt name for display
function craftMatAlt(v){const a=craftMatAlts(v);return a.length?a.map(x=>`${x.name}${a.length>1?" ×"+x.qty:""}`).join(" / "):null;}
function craftTotalMats(mats){return Object.values(mats).reduce((s,v)=>s+craftMatQty(v),0)}
function craftEfficiency(item,pLv,opt,xpBoostMult=1){if(item.requiredLevel>pLv)return{score:-1,effectiveXP:0};if(item.isRecipe||!item.craftTimeSeconds)return{score:-1,effectiveXP:0};const bxp=craftGetItemXP(item,pLv);const exP=Math.floor(craftCalcXP(pLv,item.requiredLevel,bxp)*xpBoostMult);const tm=craftTotalMats(item.materials);const xps=exP/item.craftTimeSeconds;const xpm=tm>0?exP/tm:exP;let s;if(opt==="time")s=xps;else if(opt==="materials")s=xpm;else s=Math.sqrt(xps*xpm);return{score:s,effectiveXP:exP,xps,xpm,tm}}
function craftFindBest(items,pLv,opt,xpBoostMult=1){let best=null,be={score:-1};for(const it of items){const e=craftEfficiency(it,pLv,opt,xpBoostMult);if(e.score>be.score){best=it;be=e}}return best?{item:best,eff:be}:null}

// Recursively expand craftable materials into raw materials + intermediate crafts
function craftExpandMats(mats,qty=1,depth=0,seen=new Set()){
  if(depth>10)return{raw:{},crafts:{},resourceCrafts:{}};// Prevent infinite loops
  const raw={},crafts={},resourceCrafts={};
  for(const[matName,matVal]of Object.entries(mats)){
    const matQty=craftMatQty(matVal);
    const needed=matQty*qty;
    // Find the item in the unified database
    const item=craftItems.find(i=>i.name===matName);
    const hasMats=item&&item.materials&&Object.keys(item.materials).length>0;
    
    if(item&&hasMats&&!seen.has(matName)){
      // This material has sub-materials
      if(item.isResource){
        // It's a processed resource (like Leather made from Hide)
        resourceCrafts[matName]=(resourceCrafts[matName]||0)+needed;
      }else{
        // It's a crafted item
        crafts[matName]=(crafts[matName]||0)+needed;
      }
      const newSeen=new Set(seen);newSeen.add(matName);
      const sub=craftExpandMats(item.materials,needed,depth+1,newSeen);
      for(const[r,c]of Object.entries(sub.raw))raw[r]=(raw[r]||0)+c;
      for(const[r,c]of Object.entries(sub.crafts))crafts[r]=(crafts[r]||0)+c;
      for(const[r,c]of Object.entries(sub.resourceCrafts))resourceCrafts[r]=(resourceCrafts[r]||0)+c;
    }else{
      // True raw material (no sub-materials or not in database)
      raw[matName]=(raw[matName]||0)+needed;
    }
  }
  return{raw,crafts,resourceCrafts};
}

function craftSimulate(skill,startLv,endLv,opt,itemsOverride,xpBoostMult=1){
  const items=itemsOverride||craftItems.filter(i=>i.skill===skill&&!i.isRecipe&&!i.isResource);
  if(!items.length)return{error:"No items for this skill. Add items in the Item Database first."};

  // Pre-build XP-per-level table once to avoid O(n²) repeated summation
  const xpTable={};
  for(let lv=startLv;lv<=endLv;lv++)xpTable[lv]=craftGetXPForLevel(lv,skill);

  const path=[];const totalMats={};let crafts=0,time=0,cLv=startLv,cXP=xpTable[startLv]||0,step=null;
  let safetyIter=0;const MAX_ITER=500000;

  while(cLv<endLv){
    if(++safetyIter>MAX_ITER)return{error:"Calculation exceeded safe limit. Check that your items have XP values set."};
    const b=craftFindBest(items,cLv,opt,xpBoostMult);
    if(!b)return{error:`No craftable items at level ${cLv}`};

    // Guard: if best item gives 0 effective XP we cannot progress
    if(b.eff.effectiveXP<=0)return{error:`Item "${b.item.name}" gives 0 XP at level ${cLv}. Set XP values in the Item Database.`};

    if(!step||step.item.name!==b.item.name){
      if(step){step.lvEnd=cLv;path.push(step)}
      step={item:b.item,lvStart:cLv,lvEnd:cLv,count:0,xp:0,mats:{},eff:b.eff}
    }

    const nextXP=xpTable[cLv+1]||craftGetXPForLevel(cLv+1,skill);
    const need=nextXP-cXP;
    if(need<=0){cLv++;continue;}

    // Calculate exact crafts needed to reach next level in one shot
    const craftsNeeded=Math.ceil(need/b.eff.effectiveXP);
    const ef=craftEfficiency(b.item,cLv,opt,xpBoostMult);

    step.count+=craftsNeeded;
    step.xp+=ef.effectiveXP*craftsNeeded;
    crafts+=craftsNeeded;
    time+=b.item.craftTimeSeconds*craftsNeeded;
    cXP+=ef.effectiveXP*craftsNeeded;

    for(const[m,v]of Object.entries(b.item.materials)){
      const c=craftMatQty(v);
      const total=c*craftsNeeded;
      step.mats[m]=(step.mats[m]||0)+total;
      totalMats[m]=(totalMats[m]||0)+total;
      const alts=craftMatAlts(v);
      if(alts.length){if(!step.matAlts)step.matAlts={};step.matAlts[m]=alts;}
    }

    // Level up as many times as the accumulated XP allows
    while(cLv<endLv){
      const nxt=xpTable[cLv+1]||craftGetXPForLevel(cLv+1,skill);
      if(cXP<nxt)break;
      cLv++;
      // If best item changes at new level, break to re-evaluate
      const nb=craftFindBest(items,cLv,opt,xpBoostMult);
      if(nb&&nb.item.name!==b.item.name)break;
    }
  }
  if(step){step.lvEnd=cLv;path.push(step)}
  const expanded=craftExpandMats(totalMats);
  return{ok:true,boosted:xpBoostMult>1,path,stats:{crafts,time,totalMats,rawMats:expanded.raw,craftMats:expanded.crafts,resourceCrafts:expanded.resourceCrafts,levels:endLv-startLv,startLv,endLv}}
}
function craftFmtTime(s){if(s<60)return s+"s";if(s<3600){const m=Math.floor(s/60);return m+"m"+(s%60?" "+(s%60)+"s":"")}const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h+"h"+(m?" "+m+"m":"");}
function craftFmtNum(n){if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(1)+"K";return n.toLocaleString()}

function pgShopSearch(){
  const q=(window._shopSearchQ||"").toLowerCase().trim();
  const cityFilter=window._shopCityFilter||"all";
  let results=[];
  if(q.length>=2){
    D.vendorItems.forEach(vi=>{
      if(!vi.itemName.toLowerCase().includes(q))return;
      const vendor=D.vendors.find(v=>v.id===vi.vendorId);
      const city=vendor?D.cities.find(c=>c.id===vendor.cityId):null;
      if(cityFilter!=="all"&&(!city||city.id!==cityFilter))return;
      results.push({vi,vendor,city});
    });
  }
  const totalCities=D.cities.length,totalVendors=D.vendors.length,totalItems=D.vendorItems.length;
  let h=`<div class="ph"><div class="pt">Item Search</div></div>`;
  h+=`<div class="cg" style="grid-template-columns:repeat(auto-fill,minmax(130px,1fr));margin-bottom:16px">${stat("Cities",totalCities,"var(--ac)")}${stat("Vendors",totalVendors,"var(--blu)")}${stat("Items Tracked",totalItems,"var(--grn)")}</div>`;
  h+=`<div class="card" style="margin-bottom:14px"><div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center"><div class="sb" style="flex:1;min-width:200px"><span style="color:var(--tm)">🔍</span><input id="shop-search-input" type="text" placeholder="Search for an item, recipe, or resource..." value="${(window._shopSearchQ||"").replace(/"/g,"&quot;")}" autocomplete="off"></div><select class="inp" id="shop-city-filter" style="width:160px"><option value="all">All Cities</option>${D.cities.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(c=>`<option value="${c.id}"${cityFilter===c.id?" selected":""}>${c.name}</option>`).join("")}</select></div>${q.length>0&&q.length<2?`<div style="font-size:11px;color:var(--tm);margin-top:8px">Type at least 2 characters to search</div>`:""}</div>`;
  h+=`<div id="shop-results">`;
  if(q.length>=2){
    if(!results.length){
      h+=`<div class="card">${empty("🔍","No results found",`No vendors sell "${q}"${cityFilter!=="all"?" in this city":""}.`)}</div>`;
    }else{
      h+=`<div style="font-size:10px;color:var(--tm);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">${results.length} result${results.length!==1?"s":""} for "${q}"</div>`;

      results.forEach(r=>{const cid=r.city?.id||"unknown";if(!byCityId[cid])byCityId[cid]=[];byCityId[cid].push(r);});
      Object.values(byCityId).forEach(group=>{
        const city=group[0].city;
        h+=`<div class="card" style="margin-bottom:10px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bd)"><span style="font-size:16px">🏘️</span><div><div style="font-weight:600;font-size:14px">${city?city.name:"Unknown City"}</div>${city?.region?`<div style="font-size:11px;color:var(--tm)">${city.region}</div>`:""}</div></div>`;
        const byVendor={};
        group.forEach(r=>{const vid=r.vendor?.id||"?";if(!byVendor[vid])byVendor[vid]=[];byVendor[vid].push(r);});
        Object.values(byVendor).forEach(vgroup=>{
          const vendor=vgroup[0].vendor;
          h+=`<div style="margin-bottom:10px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="font-size:12px">🧑‍💼</span><span style="font-weight:600;font-size:12px;color:var(--t2)">${vendor?vendor.name:"Unknown Vendor"}</span>${vendor?.type?`<span class="badge bac" style="font-size:10px">${vendor.type}</span>`:""}</div>`;
          vgroup.forEach(r=>{
            const vi=r.vi;
            h+=`<div style="display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:7px 10px;background:var(--bgi);border:1px solid var(--bd);border-radius:4px;margin-bottom:4px"><div style="font-weight:500;font-size:13px">${vi.itemName}</div><div style="font-size:13px;font-weight:600;color:var(--org)">${vi.price>0?vi.price.toLocaleString()+" "+(vi.currency||"g"):"Free"}</div><div style="font-size:11px;color:var(--tm)">${vi.notes||""}</div></div>`;
          });
          h+=`</div>`;
        });
        h+=`</div>`;
      });
    }
  }else{
    if(!D.cities.length){
      h+=`<div class="card">${empty("🏘️","No cities added yet","Ask an admin or contributor to add cities and vendors.")}</div>`;
    }else{
      h+=`<div style="font-size:10px;color:var(--tm);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Browse by City</div>`;
      D.cities.slice().sort((a,b)=>a.name.localeCompare(b.name)).forEach(city=>{
        const cityVendors=D.vendors.filter(v=>v.cityId===city.id);

      });
    }
  }
  h+=`</div>`;// end #shop-results
  return h;
}

function modalCopyItemsFrom(targetVendorId){
  if(!isContributor())return;
  const targetVendor=D.vendors.find(v=>v.id===targetVendorId);
  if(!targetVendor)return;
  // Build list of all other vendors that have items
  const otherVendors=D.vendors.filter(v=>v.id!==targetVendorId&&D.vendorItems.some(vi=>vi.vendorId===v.id))
    .sort((a,b)=>a.name.localeCompare(b.name));
  if(!otherVendors.length){toast("No other vendors with items to copy from","error");return;}
  openModal("Copy Items From Vendor",body=>{
    body.innerHTML=`
      <div style="font-size:12px;color:var(--tm);margin-bottom:12px">
        Select a vendor to copy all their items into <strong>${targetVendor.name}</strong>.
        Existing items will be kept — only new item names will be added.
      </div>
      <div style="max-height:320px;overflow-y:auto;border:1px solid var(--bd);border-radius:4px">
        ${otherVendors.map(v=>{
          const city=D.cities.find(c=>c.id===v.cityId);
          const itemCount=D.vendorItems.filter(vi=>vi.vendorId===v.id).length;
          return`<div class="shop-copy-source-row" data-vendor-id="${v.id}" style="display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--bd);transition:background .1s">
            <div style="flex:1">
              <div style="font-weight:600;font-size:13px">${v.name}</div>
              <div style="font-size:11px;color:var(--tm)">${city?city.name:"Unknown city"} ${v.type?`• ${v.type}`:""}</div>
            </div>
            <span style="font-size:11px;color:var(--ac);font-weight:600">${itemCount} item${itemCount!==1?"s":""}</span>
          </div>`;
        }).join("")}
      </div>
      <div id="copy-source-preview" style="display:none;margin-top:10px;padding:8px 10px;background:var(--acg);border:1px solid rgba(127,109,242,.3);border-radius:4px;font-size:12px"></div>
      <div class="actions" style="margin-top:14px">
        <button class="btn bg" onclick="closeModal()">Cancel</button>
        <button class="btn bp" id="confirm-copy-items-btn" disabled>Copy Items</button>
      </div>`;
    let selectedSourceId=null;
    body.querySelectorAll(".shop-copy-source-row").forEach(row=>{
      row.addEventListener("click",()=>{
        body.querySelectorAll(".shop-copy-source-row").forEach(r=>r.style.background="");
        row.style.background="var(--acg)";
        selectedSourceId=row.dataset.vendorId;
        const srcItems=D.vendorItems.filter(vi=>vi.vendorId===selectedSourceId);
        const existing=new Set(D.vendorItems.filter(vi=>vi.vendorId===targetVendorId).map(vi=>vi.itemName.toLowerCase()));
        const newItems=srcItems.filter(vi=>!existing.has(vi.itemName.toLowerCase()));
        const preview=body.querySelector("#copy-source-preview");
        preview.style.display="block";
        if(!newItems.length){
          preview.textContent=`All ${srcItems.length} items already exist in ${targetVendor.name}.`;
        }else{
          preview.innerHTML=`Will add <strong>${newItems.length}</strong> new item${newItems.length!==1?"s":""}: ${newItems.slice(0,5).map(i=>i.itemName).join(", ")}${newItems.length>5?` +${newItems.length-5} more`:""}`;
        }
        body.querySelector("#confirm-copy-items-btn").disabled=false;
      });
    });
    body.querySelector("#confirm-copy-items-btn").addEventListener("click",()=>{
      if(!selectedSourceId)return;
      const srcItems=D.vendorItems.filter(vi=>vi.vendorId===selectedSourceId);
      const existing=new Set(D.vendorItems.filter(vi=>vi.vendorId===targetVendorId).map(vi=>vi.itemName.toLowerCase()));
      let added=0;
      srcItems.forEach(vi=>{
        if(!existing.has(vi.itemName.toLowerCase())){
          D.vendorItems.push({...vi,id:uid(),vendorId:targetVendorId});
          added++;
        }
      });
      persist();closeModal();render();
      toast(added?`Copied ${added} item${added!==1?"s":""}!`:"No new items to copy.");
    });
  });
}

function modalCopyVendorTo(sourceVendorId){
  if(!isContributor())return;
  const sourceVendor=D.vendors.find(v=>v.id===sourceVendorId);
  if(!sourceVendor)return;
  const srcItems=D.vendorItems.filter(vi=>vi.vendorId===sourceVendorId);
  const otherCities=D.cities.filter(c=>c.id!==sourceVendor.cityId).sort((a,b)=>a.name.localeCompare(b.name));
  openModal(`Copy "${sourceVendor.name}" To City`,body=>{
    body.innerHTML=`
      <div style="font-size:12px;color:var(--tm);margin-bottom:12px">
        Select one or more cities to copy <strong>${sourceVendor.name}</strong>
        (${srcItems.length} item${srcItems.length!==1?"s":""}) into.
        If that vendor already exists in the city, their items will be merged.
      </div>
      ${!otherCities.length?`<div style="text-align:center;padding:20px;color:var(--tm)">No other cities available.</div>`:`
      <div style="max-height:300px;overflow-y:auto;border:1px solid var(--bd);border-radius:4px" id="city-copy-list">
        ${otherCities.map(c=>{
          const existingVendor=D.vendors.find(v=>v.cityId===c.id&&v.name.toLowerCase()===sourceVendor.name.toLowerCase());
          // member count removed - not needed in copy modal
          return`<label style="display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--bd);transition:background .1s;user-select:none">
            <input type="checkbox" class="city-copy-check" data-city-id="${c.id}" style="width:15px;height:15px;accent-color:var(--ac)">
