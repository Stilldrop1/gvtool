              ${c.region?`<div style="font-size:11px;color:var(--tm)">${c.region}</div>`:""}
              ${existingVendor?`<div style="font-size:10px;color:var(--org)">⚠ "${existingVendor.name}" already exists here — items will be merged</div>`:""}
            </div>
          </label>`;
        }).join("")}
      </div>`}
      <div class="actions" style="margin-top:14px">
        <button class="btn bg" onclick="closeModal()">Cancel</button>
        <button class="btn bp" id="confirm-copy-vendor-btn">Copy to Selected Cities</button>
      </div>`;
    body.querySelector("#confirm-copy-vendor-btn")?.addEventListener("click",()=>{
      const checked=Array.from(body.querySelectorAll(".city-copy-check:checked"));
      if(!checked.length){toast("Select at least one city","error");return;}
      let totalAdded=0,citiesAffected=0;
      checked.forEach(cb=>{
        const cityId=cb.dataset.cityId;
        // Find or create vendor with same name in target city
        let targetVendor=D.vendors.find(v=>v.cityId===cityId&&v.name.toLowerCase()===sourceVendor.name.toLowerCase());
        if(!targetVendor){
          targetVendor={id:uid(),cityId,name:sourceVendor.name,type:sourceVendor.type,notes:sourceVendor.notes};
          D.vendors.push(targetVendor);
        }
        // Copy items that don't already exist
        const existing=new Set(D.vendorItems.filter(vi=>vi.vendorId===targetVendor.id).map(vi=>vi.itemName.toLowerCase()));
        srcItems.forEach(vi=>{
          if(!existing.has(vi.itemName.toLowerCase())){
            D.vendorItems.push({...vi,id:uid(),vendorId:targetVendor.id});
            totalAdded++;
          }
        });
        citiesAffected++;
      });
      persist();closeModal();render();
      toast(`Copied to ${citiesAffected} cit${citiesAffected!==1?"ies":"y"} — ${totalAdded} item${totalAdded!==1?"s":""} added.`);
    });
  });
}


// Updates only the search results section without a full re-render
// Prevents the backwards-typing cursor bug
function shopBuildResults(){
  const q=(window._shopSearchQ||"").toLowerCase().trim();
  const cityFilter=window._shopCityFilter||"all";
  let results=[];
  if(q.length>=2){
    D.vendorItems.forEach(vi=>{
      if(!vi.itemName.toLowerCase().includes(q))return;
      const vendor=D.vendors.find(v=>v.id===vi.vendorId);
      const city=vendor?D.cities.find(c=>c.id===vendor.cityId):null;
      if(cityFilter!=="all"&&(!city||city.id!==cityFilter))return;
      results.push({vi,vendor,city});
    });
  }
  let h="";
  if(q.length>=2){
    if(!results.length){
      h+=`<div class="card">${empty("🔍","No results found",`No vendors sell "${q}"${cityFilter!=="all"?" in this city":""}.`)}</div>`;
    }else{
      h+=`<div style="font-size:10px;color:var(--tm);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">${results.length} result${results.length!==1?"s":""} for "${q}"</div>`;
      const byCityId={};
      results.forEach(r=>{const cid=r.city?.id||"unknown";if(!byCityId[cid])byCityId[cid]=[];byCityId[cid].push(r);});
      Object.values(byCityId).forEach(group=>{
        const city=group[0].city;
        h+=`<div class="card" style="margin-bottom:10px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bd)"><span style="font-size:16px">🏘️</span><div><div style="font-weight:600;font-size:14px">${city?city.name:"Unknown City"}</div>${city?.region?`<div style="font-size:11px;color:var(--tm)">${city.region}</div>`:""}</div></div>`;
        const byVendor={};
        group.forEach(r=>{const vid=r.vendor?.id||"?";if(!byVendor[vid])byVendor[vid]=[];byVendor[vid].push(r);});
        Object.values(byVendor).forEach(vgroup=>{
          const vendor=vgroup[0].vendor;
          h+=`<div style="margin-bottom:10px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="font-size:12px">🧑‍💼</span><span style="font-weight:600;font-size:12px;color:var(--t2)">${vendor?vendor.name:"Unknown Vendor"}</span>${vendor?.type?`<span class="badge bac" style="font-size:10px">${vendor.type}</span>`:""}</div>`;
          vgroup.forEach(r=>{
            const vi=r.vi;
            const priceStr=shopFormatPrice(vi);
            h+=`<div style="display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:7px 10px;background:var(--bgi);border:1px solid var(--bd);border-radius:4px;margin-bottom:4px"><div style="font-weight:500;font-size:13px">${vi.itemName}</div><div style="font-size:13px;font-weight:600;color:var(--org);white-space:nowrap">${priceStr}${vi.notes?`<span style="font-size:10px;color:var(--tm);font-weight:400;margin-left:6px">${vi.notes}</span>`:""}</div></div>`;
          });
          h+=`</div>`;
        });
        h+=`</div>`;
      });
    }
  }else{
    if(!D.cities.length){
      h+=`<div class="card">${empty("🏘️","No cities added yet","Ask an admin or contributor to add cities and vendors.")}</div>`;
    }else{
      h+=`<div style="font-size:10px;color:var(--tm);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Browse by City</div>`;
      D.cities.slice().sort((a,b)=>a.name.localeCompare(b.name)).forEach(city=>{
        const cityVendors=D.vendors.filter(v=>v.cityId===city.id);
        const cityItems=D.vendorItems.filter(vi=>cityVendors.some(v=>v.id===vi.vendorId));
        h+=`<div class="card" style="margin-bottom:8px;cursor:pointer;transition:border-color .15s" id="city-browse-${city.id}"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:20px">🏘️</span><div style="flex:1"><div style="font-weight:600;font-size:13px">${city.name}</div>${city.region?`<div style="font-size:11px;color:var(--tm)">${city.region}</div>`:""}</div><div style="text-align:right"><div style="font-size:12px;color:var(--ac);font-weight:600">${cityVendors.length} vendor${cityVendors.length!==1?"s":""}</div><div style="font-size:11px;color:var(--tm)">${cityItems.length} items</div></div></div></div>`;
      });
    }
  }
  return h;
}

function shopUpdateResults(){
  const resultsEl=document.getElementById("shop-results");
  if(!resultsEl){render();return;} // fallback if container not found
  resultsEl.innerHTML=shopBuildResults();
  // Re-bind city browse click handlers
  document.querySelectorAll("[id^='city-browse-']").forEach(el=>{
    el.addEventListener("click",()=>{
      window._shopCityFilter=el.id.replace("city-browse-","");
      const sel=document.getElementById("shop-city-filter");
      if(sel)sel.value=window._shopCityFilter;
      window._shopSearchQ=" ";
      const inp=document.getElementById("shop-search-input");
      if(inp)inp.value=" ";
      shopUpdateResults();
    });
  });
}

// Format vendor item price from structured currency data
function shopFormatPrice(vi){
  if(vi.priceType==="free")return"Free";
  if(vi.priceType==="tokens")return`${(vi.price||0).toLocaleString()} Valley Tokens`;
  if(vi.priceType==="champions")return`${(vi.price||0).toLocaleString()} Champions Guild Token${(vi.price||0)!==1?"s":""}`;
  if(vi.priceType==="frontier")return`${(vi.price||0).toLocaleString()} Frontier Pass Token${(vi.price||0)!==1?"s":""}`;
  if(vi.priceType==="contribution")return`${(vi.price||0).toLocaleString()} CP`;
  if(vi.priceType==="currency"){
    const parts=[];
    if(vi.pGold>0)parts.push(`${vi.pGold.toLocaleString()}g`);
    if(vi.pSilver>0)parts.push(`${vi.pSilver}s`);
    if(vi.pIronCrown>0)parts.push(`${vi.pIronCrown} Iron Crown${vi.pIronCrown!==1?"s":""}`);
    if(vi.pCopperCrown>0)parts.push(`${vi.pCopperCrown} Copper Crown${vi.pCopperCrown!==1?"s":""}`);
    return parts.length?parts.join(" + "):"Free";
  }
  // Legacy: plain price field
  return vi.price>0?`${vi.price.toLocaleString()} ${vi.currency||"g"}`:"Free";
}

function initShopBindings(){
  const inp=document.getElementById("shop-search-input");
  if(inp){
    // Update state then re-render only the results section (not the whole page)
    // This prevents cursor jumping backwards on each keystroke
    inp.addEventListener("input",e=>{
      window._shopSearchQ=e.target.value;
      shopUpdateResults();
    });
    inp.addEventListener("keydown",e=>{
      if(e.key==="Escape"){
        window._shopSearchQ="";
        inp.value="";
        shopUpdateResults();
      }
    });
    setTimeout(()=>{try{inp.focus()}catch(e){}},50);
  }
  document.getElementById("shop-city-filter")?.addEventListener("change",e=>{
    window._shopCityFilter=e.target.value;
    shopUpdateResults();
  });
  document.querySelectorAll("[id^='city-browse-']").forEach(el=>{
    el.addEventListener("click",()=>{window._shopCityFilter=el.id.replace("city-browse-","");window._shopSearchQ=" ";render();});
  });
  document.querySelectorAll(".shop-city-row").forEach(row=>{
    row.addEventListener("click",e=>{if(e.target.closest("button"))return;window._shopSelCity=row.dataset.cityId;window._shopSelVendor=null;render();});
    const acts=row.querySelector(".shop-city-acts");
    if(acts){row.addEventListener("mouseenter",()=>acts.style.opacity="1");row.addEventListener("mouseleave",()=>acts.style.opacity="0");}
  });
  document.querySelectorAll(".shop-vendor-toggle").forEach(el=>{
    el.addEventListener("click",e=>{if(e.target.closest("button"))return;const vid=el.dataset.vendorId;window._shopSelVendor=window._shopSelVendor===vid?null:vid;render();});
  });
  document.getElementById("shop-add-city-btn")?.addEventListener("click",()=>modalShopCity());
  document.getElementById("shop-add-vendor-btn")?.addEventListener("click",function(){modalShopVendor(null,this.dataset.cityId);});
  document.getElementById("shop-add-item-btn")?.addEventListener("click",function(){modalShopItem(null,this.dataset.vendorId);});
  // Copy items from another vendor
  document.querySelectorAll(".shop-copy-items-btn").forEach(btn=>{
    btn.addEventListener("click",e=>{e.stopPropagation();modalCopyItemsFrom(btn.dataset.vendorId);});
  });
  // Copy whole vendor to other cities
  document.querySelectorAll(".shop-copy-vendor-btn").forEach(btn=>{
    btn.addEventListener("click",e=>{e.stopPropagation();modalCopyVendorTo(btn.dataset.vendorId);});
  });
  document.querySelectorAll(".shop-edit-city").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();modalShopCity(D.cities.find(c=>c.id===el.dataset.id));}));
  document.querySelectorAll(".shop-del-city").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    const city=D.cities.find(c=>c.id===el.dataset.id);if(!city)return;
    confirmAction(`Delete "${city.name}" and all its vendors and items?`,()=>{
      const vids=D.vendors.filter(v=>v.cityId===city.id).map(v=>v.id);
      D.vendorItems=D.vendorItems.filter(vi=>!vids.includes(vi.vendorId));
      D.vendors=D.vendors.filter(v=>v.cityId!==city.id);
      D.cities=D.cities.filter(c=>c.id!==city.id);
      if(window._shopSelCity===city.id){window._shopSelCity=null;window._shopSelVendor=null;}
      persist();render();toast("City deleted");
    });
  }));
  document.querySelectorAll(".shop-edit-vendor").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();modalShopVendor(D.vendors.find(v=>v.id===el.dataset.id));}));
  document.querySelectorAll(".shop-del-vendor").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    const vendor=D.vendors.find(v=>v.id===el.dataset.id);if(!vendor)return;
    confirmAction(`Delete "${vendor.name}" and all their items?`,()=>{
      D.vendorItems=D.vendorItems.filter(vi=>vi.vendorId!==vendor.id);
      D.vendors=D.vendors.filter(v=>v.id!==vendor.id);
      if(window._shopSelVendor===vendor.id)window._shopSelVendor=null;
      persist();render();toast("Vendor deleted");
    });
  }));
  document.querySelectorAll(".shop-edit-item").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();modalShopItem(D.vendorItems.find(vi=>vi.id===el.dataset.id));}));
  document.querySelectorAll(".shop-del-item").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();confirmAction("Remove this item?",()=>{D.vendorItems=D.vendorItems.filter(vi=>vi.id!==el.dataset.id);persist();render();toast("Removed!")});}));
}

function initPlayerXpEditorBindings(){
  // Save
  document.getElementById("pxp-save-btn")?.addEventListener("click",()=>{
    const table={};
    document.querySelectorAll(".pxp-lv-input").forEach(inp=>{
      const lv=parseInt(inp.dataset.lv);
      const val=parseInt(inp.value);
      if(!isNaN(val)&&val>0)table[lv]=val;
    });
    playerXpTable=table;
    savePlayerXpTable();
    render();
    toast("Character XP table saved!");
  });
  // Clear
  document.getElementById("pxp-clear-btn")?.addEventListener("click",()=>{
    if(confirm("Clear the entire character XP table?")){
      playerXpTable={};
      savePlayerXpTable();
      render();
      toast("Cleared!");
    }
  });
  // Paste from clipboard
  document.getElementById("pxp-paste-btn")?.addEventListener("click",async()=>{
    try{
      const text=await navigator.clipboard.readText();
      const vals=text.split(/[\n,;\t]+/).map(v=>v.trim()).filter(v=>v&&!isNaN(v)).map(Number);
      if(!vals.length){toast("No numbers found in clipboard","error");return;}
      const inputs=document.querySelectorAll(".pxp-lv-input");
      vals.forEach((v,i)=>{if(inputs[i])inputs[i].value=Math.max(0,Math.round(v));});
      toast(`Pasted ${Math.min(vals.length,inputs.length)} values — click Save to apply`);
    }catch(e){
      toast("Clipboard access denied — paste manually into the fields","error");
    }
  });
  // Live cumulative tooltip
  document.querySelectorAll(".pxp-lv-input").forEach(inp=>{
    inp.addEventListener("input",()=>{
      const allInputs=Array.from(document.querySelectorAll(".pxp-lv-input"));
      const idx=allInputs.indexOf(inp);
      let cumul=0;
      allInputs.slice(0,idx+1).forEach(i=>{cumul+=parseInt(i.value)||0;});
      inp.title=`Cumulative XP to reach lv ${parseInt(inp.dataset.lv)}: ${cumul.toLocaleString()}`;
    });
  });
}

function pgCraftResCalc(){
  // Build item options grouped by skill
  // Include crafted items AND recipes that have a matching crafted item with materials
  const itemsBySkill={};
  craftItems.forEach(item=>{

    const skill=item.skill||"other";
    if(!itemsBySkill[skill])itemsBySkill[skill]=[];
    if(item.isRecipe){
      // Only include recipe if matching crafted item has materials
      const crafted=craftItems.find(i=>!i.isRecipe&&!i.isResource&&i.name.toLowerCase()===item.name.toLowerCase());
      if(crafted&&Object.keys(crafted.materials||{}).length>0){
        itemsBySkill[skill].push({...item,_resolvedItem:crafted,_isRecipeEntry:true});
      }
      return;
    }
    if(!Object.keys(item.materials||{}).length)return;
    itemsBySkill[skill].push(item);
  });
  let itemOpts=`<option value="">Select an item...</option>`;
  Object.entries(SKILL_NAMES).forEach(([k,v])=>{
    const items=itemsBySkill[k]||[];
    if(items.length){
      itemOpts+=`<optgroup label="${v}">`;
      items.sort((a,b)=>a.name.localeCompare(b.name)).forEach(item=>{
        itemOpts+=`<option value="${item.id}">${item.name}${item._isRecipeEntry?" 📜":""} (Lv ${item.requiredLevel})</option>`;
      });
      itemOpts+=`</optgroup>`;
    }
  });
  
  let h=`<div class="ph"><div class="pt">Resource Calculator</div></div>`;
  h+=`<div style="display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start">`;
  // Config panel
  h+=`<div class="card"><div style="font-size:10px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">What do you want to craft?</div>`;
  h+=`<div class="fg"><label class="fl">Item</label><select class="inp" id="res-calc-item">${itemOpts}</select></div>`;
  h+=`<div class="fg"><label class="fl">Quantity</label><input class="inp" type="number" id="res-calc-qty" min="1" value="1" style="text-align:center"></div>`;
  h+=`<button class="btn bp" id="res-calc-btn" style="width:100%;justify-content:center;padding:8px">📦 Calculate Resources</button>`;
  h+=`</div>`;
  // Results panel
  h+=`<div class="card" id="res-calc-results" style="min-height:300px">`;
  if(resCalcResults&&resCalcResults.ok){
    const{item,qty,directMats,expanded}=resCalcResults;
    const totalTime=item.craftTimeSeconds*qty;
    const di=resCalcResults.displayItem||item;
    const isRecipeCalc=di._isRecipeEntry;
    h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><div style="font-size:10px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.06em">Results for ${qty}× ${di.name}</div>${isRecipeCalc?`<span class="badge bor" style="font-size:10px">📜 From Recipe</span>`:""}</div>`;
    h+=`<div class="cg" style="grid-template-columns:repeat(auto-fill,minmax(120px,1fr));margin-bottom:16px">${stat("Crafts",craftFmtNum(qty),"var(--ac)")}${stat("Time",craftFmtTime(totalTime),"var(--org)")}${stat("Skill",SKILL_NAMES[item.skill]||'Resource',"var(--blu)")}</div>`;
    
    // Direct materials
    const directArr=Object.entries(directMats).sort((a,b)=>b[1]-a[1]);
    if(directArr.length){
      h+=`<div style="font-size:10px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--bd)">Direct Materials Needed</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:4px">`;
      directArr.forEach(([m,c])=>{
        const matItem=findItemByName(m);
        const isCrafted=matItem&&!matItem.isResource;
        const isProcessed=matItem&&matItem.isResource&&matItem.materials&&Object.keys(matItem.materials).length>0;
        const borderColor=isCrafted?'var(--org)':isProcessed?'var(--blu)':'var(--bd)';
        const icon=isCrafted?' <span style="color:var(--org);font-size:9px">⚒</span>':isProcessed?' <span style="color:var(--blu);font-size:9px">⚙</span>':'';
        const alts=(resCalcResults.directAlts||{})[m]||[];
        const hasAlts=alts.length>0;
        h+=`<div style="padding:5px 8px;background:var(--bgi);border:1px solid ${borderColor};border-radius:3px">`;
        h+=`<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:var(--t2)">${m}${icon}</span><span style="font-size:12px;color:var(--org);font-weight:600">×${craftFmtNum(c)}</span></div>`;
        if(hasAlts){
          alts.forEach(a=>{
            h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:3px;padding-top:3px;border-top:1px dashed var(--bd)"><span style="font-size:10px;color:var(--tm)">or ${a.name}</span><span style="font-size:10px;color:var(--tm);font-weight:600">×${craftFmtNum(Math.round(a.qty))}</span></div>`;
          });
        }
        h+=`</div>`;
      });
      h+=`</div>`;
    }
    
    // Intermediate crafts
    const craftMatsArr=Object.entries(expanded.crafts||{}).sort((a,b)=>b[1]-a[1]);
    if(craftMatsArr.length){
      h+=`<div style="font-size:10px;font-weight:600;color:var(--org);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--bd)">⚒ Intermediate Crafts Required</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:4px">`;
      craftMatsArr.forEach(([m,c])=>{
        const cItem=findItemByName(m);
        h+=`<div style="padding:6px 8px;background:var(--orgd);border:1px solid rgba(210,153,34,.3);border-radius:3px">`;
        h+=`<div style="display:flex;justify-content:space-between"><span style="font-size:12px;font-weight:500;color:var(--t1)">${m}</span><span style="font-size:12px;color:var(--org);font-weight:600">×${craftFmtNum(c)}</span></div>`;
        if(cItem&&cItem.materials){
          const matLines=Object.entries(cItem.materials).map(([n,v])=>{
            const q=craftMatQty(v);const alts=craftMatAlts(v);
            return `${n} ×${craftFmtNum(q*c)}`+(alts.length?` <span style="color:var(--ac)">[or: ${alts.map(a=>a.name+' ×'+craftFmtNum(Math.round(a.qty*c))).join(' / ')}]</span>`:'');
          }).join('<br>');
          h+=`<div style="font-size:10px;color:var(--tm);margin-top:3px;line-height:1.6">${matLines}</div>`;
        }
        h+=`</div>`;
      });
      h+=`</div>`;
    }
    
    // Processed resources
    const resourceCraftsArr=Object.entries(expanded.resourceCrafts||{}).sort((a,b)=>b[1]-a[1]);
    if(resourceCraftsArr.length){
      h+=`<div style="font-size:10px;font-weight:600;color:var(--blu);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--bd)">⚙ Processed Resources Required</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:4px">`;
      resourceCraftsArr.forEach(([m,c])=>{
        const resItem=findItemByName(m);
        h+=`<div style="padding:6px 8px;background:var(--blud);border:1px solid rgba(88,166,255,.25);border-radius:3px">`;
        h+=`<div style="display:flex;justify-content:space-between"><span style="font-size:12px;font-weight:500;color:var(--t1)">${m}</span><span style="font-size:12px;color:var(--blu);font-weight:600">×${craftFmtNum(c)}</span></div>`;
        if(resItem&&resItem.materials){
          const matLines=Object.entries(resItem.materials).map(([n,v])=>{
            const q=craftMatQty(v);const alts=craftMatAlts(v);
            return `${n} ×${craftFmtNum(q*c)}`+(alts.length?` <span style="color:var(--ac)">[or: ${alts.map(a=>a.name+' ×'+craftFmtNum(Math.round(a.qty*c))).join(' / ')}]</span>`:'');
          }).join('<br>');
          h+=`<div style="font-size:10px;color:var(--tm);margin-top:3px;line-height:1.6">${matLines}</div>`;
        }
        h+=`</div>`;
      });
      h+=`</div>`;
    }
    
    // Raw materials
    const rawMatsArr=Object.entries(expanded.raw||{}).sort((a,b)=>b[1]-a[1]);
    const hasNested=craftMatsArr.length||resourceCraftsArr.length;
    if(rawMatsArr.length&&hasNested){
      h+=`<div style="font-size:10px;font-weight:600;color:var(--grn);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--bd)">📦 Total Raw Materials (All Expanded)</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:4px">`;
      rawMatsArr.forEach(([m,c])=>{h+=`<div style="display:flex;justify-content:space-between;padding:4px 8px;background:var(--grnd);border:1px solid rgba(86,211,100,.25);border-radius:3px"><span style="font-size:12px;color:var(--t2)">${m}</span><span style="font-size:12px;color:var(--grn);font-weight:600">×${craftFmtNum(c)}</span></div>`});
      h+=`</div>`;
    }
  } else if(resCalcResults&&resCalcResults.error){
    h+=`<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-sub">${resCalcResults.error}</div></div>`;
  } else {
    h+=`<div class="empty"><div class="empty-ico">📦</div><div class="empty-title">Resource Calculator</div><div class="empty-sub">Select an item and quantity to see all required materials, including nested crafting requirements.</div></div>`;
  }
  h+=`</div></div>`;
  return h;
}

  <button class="cdb-type-btn a" data-val="all" style="padding:4px 10px;border-radius:3px;font-size:11px;font-weight:600;border:none;cursor:pointer;background:var(--ac);color:#fff;font-family:inherit;transition:all .12s">All</button>

  <button class="cdb-type-btn" data-val="recipe" style="padding:4px 10px;border-radius:3px;font-size:11px;font-weight:600;border:none;cursor:pointer;background:transparent;color:var(--tm);font-family:inherit;transition:all .12s">📜 Recipes</button>
</div></div></div>`;
  h+=`<div id="cdb-list">`;
  if(!craftItems.length) h+=`<div class="empty"><div class="empty-ico">📦</div><div class="empty-sub">No entries saved yet.</div></div>`;

    }else if(item.isRecipe){
      h+=`<div class="cdb-entry" data-type="recipe" data-skill="${item.skill}" style="display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:8px 10px;background:var(--bgi);border:1px solid var(--org);border-radius:4px;margin-bottom:4px"><div><div style="font-weight:600;font-size:13px">📜 ${item.name}</div><div style="font-size:11px;color:var(--tm)">Min Lv ${item.requiredLevel||1} • ${SKILL_NAMES[item.skill]||item.skill}</div></div><span class="badge bor" style="white-space:nowrap">Recipe</span>${isContributor()?`<div style="display:flex;gap:3px"><button class="btn bg bs cdb-edit" data-idx="${idx}">✎</button><button class="btn bd bs cdb-del" data-idx="${idx}">✕</button></div>`:""}</div>`;
    }else{
      // Build weapon stats snippet for display
      const ws=item.weaponStats;
      let wsSnippet="";
      if(ws){
        const parts=[];
        if(ws.weaponType)parts.push(ws.weaponType);
        if(ws.dmgMin!=null&&ws.dmgMax!=null)parts.push(`${ws.dmgMin}–${ws.dmgMax} dmg`);
        if(ws.tier!=null)parts.push(`Tier ${ws.tier}`);
        if(ws.attackCost!=null)parts.push(`${ws.attackCost} stam`);
        wsSnippet=parts.length?`<div style="font-size:10px;color:var(--org);margin-top:2px">⚔️ ${parts.join(" • ")}</div>`:"";
      }
      const hasWS=!!ws;
      h+=`<div class="cdb-entry" data-type="craft" data-skill="${item.skill}" style="display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:start;padding:8px 10px;background:var(--bgi);border:1px solid ${hasWS?"rgba(210,153,34,.35)":"var(--bd)"};border-radius:4px;margin-bottom:4px"><div><div style="font-weight:600;font-size:13px">${item.name}</div><div style="font-size:11px;color:var(--tm)">Req Lv ${item.requiredLevel} • ${item.craftTimeSeconds}s</div>${wsSnippet}</div><span class="badge bac" style="white-space:nowrap">${SKILL_NAMES[item.skill]||item.skill}</span><span style="font-size:11px;color:var(--grn)">${xpLvs} XP</span>${isContributor()?`<div style="display:flex;gap:3px"><button class="btn bg bs cdb-edit" data-idx="${idx}">✎</button><button class="btn bd bs cdb-del" data-idx="${idx}">✕</button></div>`:""}</div>`;
    }
  });
  h+=`</div></div>`;
  return h;
}

// ─── Update Materials UI without full re-render ─────────────
function updateCraftMatsUI(){
  const list=document.getElementById("cdb-mats-list");
  if(!list)return;
  const mEntries=Object.entries(craftCurMats);
  // Build mat options for alt dropdowns
  const allMatNames=[...new Set([...craftItems.filter(i=>!i.isRecipe).map(i=>i.name)])].sort();
  const altOpts=`<option value="">— none —</option>`+allMatNames.map(n=>`<option value="${n}">${n}</option>`).join("");
  let h="";
  if(!mEntries.length){
    h=`<div style="color:var(--tm);font-size:11px;text-align:center;padding:6px">No materials added</div>`;
  }else{
    mEntries.forEach(([n,v])=>{
      const q=craftMatQty(v);
      const alts=craftMatAlts(v); // [{name,qty},...]
      const dn=n.replace(/"/g,"&quot;");
      h+=`<div style="background:var(--bg2);border-radius:4px;margin-bottom:6px;overflow:hidden">`;
      // Header row
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-bottom:1px solid var(--bd)">`;
      h+=`<span style="font-size:12px;font-weight:600">${n}</span>`;
      h+=`<span style="display:flex;align-items:center;gap:6px"><span style="font-size:12px;color:var(--ac)">×${q}</span><button class="btn bd bs cdb-rm-mat" data-name="${dn}" style="padding:2px 6px;font-size:11px">✕</button></span>`;
      h+=`</div>`;
      // 4 alt slots
      h+=`<div style="padding:6px 8px">`;
      h+=`<div style="font-size:10px;color:var(--tm);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.05em">Alternate materials (swap options)</div>`;
      for(let i=0;i<4;i++){
        const existingAlt=alts[i]||{name:"",qty:""};
        h+=`<div style="display:grid;grid-template-columns:1fr 70px;gap:5px;margin-bottom:3px;align-items:center">`;
        h+=`<select class="inp cdb-alt-sel" data-mat="${dn}" data-idx="${i}" style="padding:3px 6px;font-size:11px"><option value="">— Alt ${i+1} (optional) —</option>${allMatNames.filter(nm=>nm!==n).map(nm=>`<option value="${nm}"${existingAlt.name===nm?" selected":""}>${nm}</option>`).join("")}</select>`;
        h+=`<input class="inp cdb-alt-qty" data-mat="${dn}" data-idx="${i}" type="number" min="1" placeholder="Qty" value="${existingAlt.qty||""}" style="padding:3px 6px;font-size:11px;text-align:center">`;
        h+=`</div>`;
      }
      h+=`</div></div>`;
    });
  }
  list.innerHTML=h;
  // Bind remove buttons
  document.querySelectorAll(".cdb-rm-mat").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    const name=el.dataset.name;
    delete craftCurMats[name];
    updateCraftMatsUI();
  }));
  // Bind alt changes - update craftCurMats alts array on change
  function syncAlts(matName){
    const v=craftCurMats[matName];
    if(v===undefined)return;
    const qty=craftMatQty(v);
    const alts=[];
    for(let i=0;i<4;i++){
      const sel=document.querySelector(`.cdb-alt-sel[data-mat="${matName}"][data-idx="${i}"]`);
      const qtyEl=document.querySelector(`.cdb-alt-qty[data-mat="${matName}"][data-idx="${i}"]`);
      const altName=sel?.value||"";
      const altQty=parseInt(qtyEl?.value)||qty; // default to same qty as primary
      if(altName)alts.push({name:altName,qty:altQty});
    }
    craftCurMats[matName]=alts.length?{qty,alts}:qty;
  }
  document.querySelectorAll(".cdb-alt-sel,.cdb-alt-qty").forEach(el=>{
    el.addEventListener("change",()=>syncAlts(el.dataset.mat));
    el.addEventListener("input",()=>syncAlts(el.dataset.mat));
  });
  // Reset primary select
  const sel=document.getElementById("cdb-mat-sel");if(sel)sel.value="";
}

// ─── Crafting Event Bindings ─────────────────────────────

function initCraftXpEditorBindings(){
  const skill=window._xpEditorSkill||Object.keys(SKILL_NAMES)[0];

  // Skill tab switching
  document.querySelectorAll(".xp-skill-tab").forEach(btn=>{
    btn.addEventListener("click",()=>{
      window._xpEditorSkill=btn.dataset.skill;
      render();
    });
  });

  // Save button - reads all inputs and persists
  document.getElementById("xp-save-btn")?.addEventListener("click",()=>{
    const table={};
    document.querySelectorAll(".xp-lv-input").forEach(inp=>{
      const lv=parseInt(inp.dataset.lv);
      const val=parseInt(inp.value);
      if(!isNaN(val)&&val>0)table[lv]=val;
    });
    craftSkillXpTables[skill]=table;
    craftClearXpCache();
    saveCraftSkillXpTables();
    render();
    toast(`XP table saved for ${SKILL_NAMES[skill]}!`);
  });

  // Reset to built-in GV values
  document.getElementById("xp-fill-formula-btn")?.addEventListener("click",()=>{
    const builtinTable=BUILTIN_XP_TABLES[skill]||{};
    document.querySelectorAll(".xp-lv-input").forEach(inp=>{
      const lv=parseInt(inp.dataset.lv);
      inp.value=builtinTable[String(lv)]||Math.floor(80*Math.pow(1.12,lv-1));
    });
    toast("Filled with GV XP values — click Save to apply");
  });

  // Clear this skill
  document.getElementById("xp-clear-skill-btn")?.addEventListener("click",()=>{
    if(confirm(`Clear all XP data for ${SKILL_NAMES[skill]}?`)){
      delete craftSkillXpTables[skill];
      saveCraftSkillXpTables();
      render();
      toast("Cleared!");
    }
  });

  // Paste from clipboard
  document.getElementById("xp-paste-btn")?.addEventListener("click",async()=>{
    try{
      const text=await navigator.clipboard.readText();
      // Split by newlines, commas, tabs, or semicolons
      const vals=text.split(/[\n,;\t]+/).map(v=>v.trim()).filter(v=>v&&!isNaN(v)).map(Number);
      if(!vals.length){toast("No numbers found in clipboard","error");return;}
      const inputs=document.querySelectorAll(".xp-lv-input");
      vals.forEach((v,i)=>{if(inputs[i])inputs[i].value=Math.max(0,Math.round(v));});
      toast(`Pasted ${Math.min(vals.length,inputs.length)} values — click Save to apply`);
    }catch(e){
      toast("Clipboard access denied — paste manually into the fields","error");
    }
  });

  // Live cumulative tooltip update on input change
  document.querySelectorAll(".xp-lv-input").forEach(inp=>{
    inp.addEventListener("input",()=>{
      // Update title with running cumulative
      const allInputs=Array.from(document.querySelectorAll(".xp-lv-input"));
      const idx=allInputs.indexOf(inp);
      let cumul=0;
      allInputs.slice(0,idx+1).forEach(i=>{
        const v=parseInt(i.value)||parseInt(i.placeholder)||0;
        cumul+=v;
      });
      inp.title=`Cumulative XP to reach lv ${parseInt(inp.dataset.lv)}: ${cumul.toLocaleString()}`;
    });
  });
}

function initCraftBindings(){
  const ab=(id,fn)=>{document.getElementById(id)?.addEventListener("click",fn)};
  // Level Calculator
  ab("craft-calc-btn",()=>{
    const skill=document.getElementById("craft-skill")?.value;
    const s=parseInt(document.getElementById("craft-lv-start")?.value)||1;
    const e=parseInt(document.getElementById("craft-lv-end")?.value)||50;
    const opt=document.querySelector('input[name="craft-opt"]:checked')?.value||"time";
    if(s<1||s>99||e<2||e>100||e<=s){toast("Invalid level range","error");return}
    // Apply recipe filter if toggled on
    const recipeFilterActive=document.getElementById("craft-recipe-filter")?.checked;
    window._craftRecipeFilter=recipeFilterActive!==undefined?recipeFilterActive:window._craftRecipeFilter;
    let usableItems=craftItems.filter(i=>i.skill===skill&&!i.isRecipe&&!i.isResource);
    if(recipeFilterActive){
      // Find the current user's player and their known recipe IDs
      const curPlayer=G.p.find(p=>p.name.toLowerCase()===currentUser?.displayName?.toLowerCase()||p.name.toLowerCase()===currentUser?.username?.toLowerCase()||(currentUser?.discord&&p.discord&&p.discord.toLowerCase()===currentUser.discord.toLowerCase()));
      const knownIds=new Set((D.playerRecipes[curPlayer?.id]||[]).map(String));
      // A crafted item is "known" if there's a recipe entry with the same name that the player has
      const knownRecipeNames=new Set(craftItems.filter(i=>i.isRecipe&&knownIds.has(String(i.id))).map(i=>i.name.toLowerCase()));
      if(knownRecipeNames.size>0){
        usableItems=usableItems.filter(i=>knownRecipeNames.has(i.name.toLowerCase()));
      }else{
        toast("You have no known recipes for this skill yet. Using all items.","warn");
      }
    }
    if(!usableItems.length){toast("No crafted items found for this skill. Add items in the Item Database first.","error");return}
    const hasXP=usableItems.some(i=>(i.baseXP||0)>0||Object.keys(i.xpByLevel||{}).length>0);
    if(!hasXP){toast("None of your items have XP values set. Edit items in the database and add XP before calculating.","error");return}
    // Read xp mods
    document.querySelectorAll(".craft-xp-mod").forEach(inp=>{const d=parseInt(inp.dataset.diff);craftXpMods[d]=Math.max(0,Math.min(100,parseInt(inp.value)||0))});
    const xpBoostActive=document.getElementById("craft-xp-boost")?.checked||false;
    window._craftXpBoost=xpBoostActive;
    craftClearXpCache(); // ensure fresh table-based values
    craftResults=craftSimulate(skill,s,e,opt,recipeFilterActive?usableItems:null,xpBoostActive?1.5:1);
    // If boost is active, also run without boost so we can show the savings
    if(xpBoostActive&&craftResults&&craftResults.ok){
      const noBoost=craftSimulate(skill,s,e,opt,recipeFilterActive?usableItems:null,1);
      if(noBoost&&noBoost.ok){
        craftResults.savedCrafts=noBoost.stats.crafts-craftResults.stats.crafts;
        craftResults.savedTime=noBoost.stats.time-craftResults.stats.time;
        craftResults.craftsWithout=noBoost.stats.crafts;
      }
    }
    render();
  });
  // Resource Calculator
  ab("res-calc-btn",()=>{
    const itemId=document.getElementById("res-calc-item")?.value;
    const qty=parseInt(document.getElementById("res-calc-qty")?.value)||1;
    if(!itemId){toast("Select an item","error");return}
    if(qty<1){toast("Quantity must be at least 1","error");return}
    const rawItem=craftItems.find(i=>String(i.id)===String(itemId));
    if(!rawItem){toast("Item not found","error");return}
    // If this is a recipe entry, resolve materials from the matching crafted item
    const item=rawItem._resolvedItem||rawItem;
    const displayItem=rawItem; // keep recipe name/level for display
    // Calculate direct materials, preserving alt data keyed by material name
    const directMats={};
    const directAlts={}; // {matName: [{name,qty}, ...]}
    Object.entries(item.materials).forEach(([m,v])=>{
      const c=craftMatQty(v);
      directMats[m]=(directMats[m]||0)+c*qty;
      const alts=craftMatAlts(v);
      if(alts.length)directAlts[m]=alts.map(a=>({name:a.name,qty:a.qty*qty}));
    });
    // Also collect alts from nested materials
    function collectAlts(mats,multiplier=1){
      Object.entries(mats||{}).forEach(([m,v])=>{
        const alts=craftMatAlts(v);
        if(alts.length){
          if(!directAlts[m])directAlts[m]=[];
          alts.forEach(a=>{
            const existing=directAlts[m].find(x=>x.name===a.name);
            const scaled=a.qty*(typeof v==="object"?v.qty||1:v)/1*multiplier;
            if(existing)existing.qty+=scaled;
            else directAlts[m].push({name:a.name,qty:scaled});
          });
        }
        const nested=craftItems.find(i=>i.name===m&&!i.isRecipe);
        if(nested&&nested.materials)collectAlts(nested.materials,craftMatQty(v)*multiplier);
      });
    }
    // Expand nested materials
    const expanded=craftExpandMats(directMats);
    resCalcResults={ok:true,item,displayItem:rawItem,qty,directMats,directAlts,expanded};
    render();
  });
  // XP boost toggle - persist state and update highlight
  document.getElementById("craft-xp-boost")?.addEventListener("change",e=>{
    window._craftXpBoost=e.target.checked;
    const lbl=e.target.closest("label");
    if(lbl){
      lbl.style.background=e.target.checked?"var(--grnd)":"var(--bgi)";
      lbl.style.borderColor=e.target.checked?"var(--grn)":"var(--bd)";
    }
  });
  // Recipe filter toggle persistence
  document.getElementById("craft-recipe-filter")?.addEventListener("change",e=>{
    window._craftRecipeFilter=e.target.checked;
    // Re-render just the config panel highlight without full render
    const wrapper=e.target.closest("[style*='background']");
    if(wrapper){
      wrapper.style.background=e.target.checked?"var(--acg)":"var(--bgi)";
      wrapper.style.borderColor=e.target.checked?"rgba(127,109,242,.3)":"var(--bd)";
    }
  });
  // Radio styling
  document.querySelectorAll(".craft-opt").forEach(lbl=>{lbl.addEventListener("click",()=>{document.querySelectorAll(".craft-opt").forEach(l=>l.classList.remove("craft-opt-sel"));lbl.classList.add("craft-opt-sel")})});
  // Show/hide weapon stats when skill changes
  function updateWeaponStatsVisibility(){
    const skill=document.getElementById("cdb-skill")?.value;
    const typeVal=document.querySelector('input[name="cdb-type"]:checked')?.value||'craft';
    const ws=document.getElementById("cdb-weapon-stats");
    if(ws)ws.style.display=(skill==="weapon_forging"&&typeVal==="craft")?"block":"none";
  }
  document.getElementById("cdb-skill")?.addEventListener("change",updateWeaponStatsVisibility);
  updateWeaponStatsVisibility();
  // Entry type toggle
  document.querySelectorAll(".cdb-type-opt").forEach(lbl=>{lbl.addEventListener("click",()=>{
    document.querySelectorAll(".cdb-type-opt").forEach(l=>{l.style.borderColor='var(--bd)'});
    lbl.style.borderColor='var(--ac)';
    const t=lbl.dataset.type;
    const craftFields=document.getElementById("cdb-craft-fields");
    const recipeFields=document.getElementById("cdb-recipe-fields");
    const matsSection=document.getElementById("cdb-mats-section");
    const xpSection=document.getElementById("cdb-xp-section");
    if(craftFields)craftFields.style.display=t==='craft'?'block':'none';
    if(recipeFields)recipeFields.style.display=t==='recipe'?'block':'none';
    if(matsSection)matsSection.style.display=t==='recipe'?'none':'block';
    if(xpSection)xpSection.style.display=t==='recipe'?'none':'block';
    updateWeaponStatsVisibility();
  })});
  // Config toggle
  ab("craft-config-toggle",()=>{const b=document.getElementById("craft-config-body");const a=document.getElementById("craft-cfg-arrow");if(b){b.style.display=b.style.display==="none"?"block":"none";if(a)a.textContent=b.style.display==="none"?"▶":"▼"}});
  // Item DB
  ab("cdb-add-mat",()=>{const s=document.getElementById("cdb-mat-sel");const q=parseInt(document.getElementById("cdb-mat-qty")?.value)||1;if(!s?.value){toast("Select a material","error");return}if(craftCurMats[s.value]!==undefined){toast("That material is already added — edit its alts below","warn");return}craftCurMats[s.value]=q;updateCraftMatsUI();document.getElementById("cdb-mat-sel").value="";document.getElementById("cdb-mat-qty").value="1";});
  document.querySelectorAll(".cdb-rm-mat").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();delete craftCurMats[el.dataset.name];updateCraftMatsUI()}));
  ab("cdb-qfill",()=>{const base=parseInt(document.getElementById("cdb-qbase")?.value)||0;const grow=parseFloat(document.getElementById("cdb-qgrow")?.value)||0;if(!base){toast("Enter base XP","error");return}document.querySelectorAll(".cdb-xp").forEach(inp=>{const lv=parseInt(inp.dataset.level);inp.value=Math.floor(base*Math.pow(1+grow/100,lv-1))});toast("XP filled!")});
  ab("cdb-qclear",()=>{document.querySelectorAll(".cdb-xp").forEach(inp=>inp.value="");toast("Cleared")});
  ab("cdb-clear",()=>{
    craftCurMats={};
    window._craftEditItem=null;
    // Clear weapon stats fields
    ["ws-quality","ws-tier","ws-weptype","ws-dmg-min","ws-dmg-max","ws-range",
     "ws-atkcost","ws-durability","ws-chop","ws-mine","ws-mow",
     "ws-mkt-gold","ws-mkt-silver","ws-mkt-copper","ws-vnd-gold","ws-vnd-silver"
    ].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
    document.querySelectorAll(".ws-dir-mult,.ws-dir-type,.ws-dir-pen").forEach(el=>el.value="");
    // Reset type to "Crafted Item"
    document.getElementById("cdb-type-craft")?.click();
    // Reset all field values
    const nm=document.getElementById("cdb-name");if(nm)nm.value="";
    const sk=document.getElementById("cdb-skill");if(sk)sk.selectedIndex=0;
    const rl=document.getElementById("cdb-reqlv");if(rl)rl.value=1;
    const tm=document.getElementById("cdb-time");if(tm)tm.value=5;
    const rs=document.getElementById("cdb-recipe-skill");if(rs)rs.selectedIndex=0;
    const rml=document.getElementById("cdb-recipe-minlv");if(rml)rml.value=1;
    document.querySelectorAll(".cdb-xp").forEach(i=>i.value="");
    render();toast("Form cleared");
  });
  ab("cdb-save",()=>{
    window._craftEditItem=null;
    const name=document.getElementById("cdb-name")?.value.trim();
    const typeVal=document.querySelector('input[name="cdb-type"]:checked')?.value||'craft';
    const isResource=typeVal==='resource';
    const isRecipeEntry=typeVal==='recipe';
    const skill=document.getElementById("cdb-skill")?.value;
    const reqLv=parseInt(document.getElementById("cdb-reqlv")?.value)||1;
    const time=parseInt(document.getElementById("cdb-time")?.value)||5;
    if(!name){toast("Name required","error");return}
    // Recipe-specific fields
    const recipeSkill=document.getElementById("cdb-recipe-skill")?.value;
    const recipeMinLv=parseInt(document.getElementById("cdb-recipe-minlv")?.value)||1;
    if(isRecipeEntry){
      // Only match existing recipes (not crafted items with same name)
      const existing=craftItems.findIndex(i=>i.name.toLowerCase()===name.toLowerCase()&&i.isRecipe===true);
      if(existing!==-1){if(!confirm(`Replace existing recipe "${name}"?`))return;craftItems.splice(existing,1)}
      craftItems.push({id:Date.now(),name,isRecipe:true,isResource:false,skill:recipeSkill,requiredLevel:recipeMinLv,materials:{},xpByLevel:{},baseXP:0,craftTimeSeconds:0});
      saveCraftItems();addLog("Recipe Added",name);render();toast(`"${name}" saved!`);return;
    }
    const xpByLevel={};document.querySelectorAll(".cdb-xp").forEach(inp=>{const lv=parseInt(inp.dataset.level);const v=parseInt(inp.value)||0;if(v>0)xpByLevel[lv]=v});
    // Only match same type - recipes with same name as a crafted item are allowed
    const existing=craftItems.findIndex(i=>i.name.toLowerCase()===name.toLowerCase()&&!i.isRecipe);
    if(existing!==-1){if(!confirm(`Replace existing "${name}"?`))return;craftItems.splice(existing,1)}
    const lowLv=Object.keys(xpByLevel).length?Math.min(...Object.keys(xpByLevel).map(Number)):1;
    const isRecipe=!isResource&&(document.getElementById("cdb-is-recipe")?.checked||false);
    if(isResource){
      craftItems.push({id:Date.now(),name,isResource:true,materials:{...craftCurMats},xpByLevel,baseXP:xpByLevel[lowLv]||0});
    }else{
      // Read weapon stats if skill is weapon_forging
    let weaponStats=null;
    if(skill==="weapon_forging"){
      const dirs=["overhead","from_right","from_left","stab"];
      const dirAttacks={};
      dirs.forEach(dk=>{
        const mult=parseFloat(document.querySelector(`.ws-dir-mult[data-dir="${dk}"]`)?.value)||null;
        const dtype=document.querySelector(`.ws-dir-type[data-dir="${dk}"]`)?.value||null;
        const pen=parseFloat(document.querySelector(`.ws-dir-pen[data-dir="${dk}"]`)?.value)||null;
        if(mult||dtype||pen)dirAttacks[dk]={mult,type:dtype,pen};
      });
      weaponStats={
        quality:document.getElementById("ws-quality")?.value.trim()||null,
        tier:parseInt(document.getElementById("ws-tier")?.value)||null,
        weaponType:document.getElementById("ws-weptype")?.value||null,
        dmgMin:parseFloat(document.getElementById("ws-dmg-min")?.value)||null,
        dmgMax:parseFloat(document.getElementById("ws-dmg-max")?.value)||null,
        range:parseFloat(document.getElementById("ws-range")?.value)||null,
        dirAttacks:Object.keys(dirAttacks).length?dirAttacks:null,
        attackCost:parseInt(document.getElementById("ws-atkcost")?.value)||null,
        durability:parseInt(document.getElementById("ws-durability")?.value)||null,
        chopping:parseFloat(document.getElementById("ws-chop")?.value)||null,
        mining:parseFloat(document.getElementById("ws-mine")?.value)||null,
        mowing:parseFloat(document.getElementById("ws-mow")?.value)||null,
        mktGold:parseInt(document.getElementById("ws-mkt-gold")?.value)||null,
        mktSilver:parseInt(document.getElementById("ws-mkt-silver")?.value)||null,
        mktCopper:parseInt(document.getElementById("ws-mkt-copper")?.value)||null,
        vndGold:parseInt(document.getElementById("ws-vnd-gold")?.value)||null,
        vndSilver:parseInt(document.getElementById("ws-vnd-silver")?.value)||null,
      };
      // Strip all-null weaponStats
      if(Object.values(weaponStats).every(v=>v===null))weaponStats=null;
    }
    craftItems.push({id:Date.now(),name,isResource:false,isRecipe,skill,requiredLevel:reqLv,craftTimeSeconds:time,materials:{...craftCurMats},xpByLevel,baseXP:xpByLevel[lowLv]||0,...(weaponStats?{weaponStats}:{})});
    }
    saveCraftItems();craftCurMats={};addLog(isResource?"Resource Saved":"Craft Item Saved",name);render();toast(`"${name}" saved!`);
  });
  document.querySelectorAll(".cdb-edit").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();
    const item=craftItems[parseInt(el.dataset.idx)];if(!item)return;
    craftCurMats={...(item.materials||{})};
    window._craftEditItem=item;
    craftItems.splice(parseInt(el.dataset.idx),1);saveCraftItems();render();
    setTimeout(()=>{
      const it=window._craftEditItem;if(!it)return;
      if(it.isResource){document.getElementById("cdb-type-resource")?.click()}else{document.getElementById("cdb-type-craft")?.click()}
      const nm=document.getElementById("cdb-name");if(nm)nm.value=it.name;
      if(it.isRecipe){
        document.getElementById("cdb-type-recipe")?.click();
        setTimeout(()=>{
          const rs=document.getElementById("cdb-recipe-skill");if(rs)rs.value=it.skill||"weapon_forging";
          const rl=document.getElementById("cdb-recipe-minlv");if(rl)rl.value=it.requiredLevel||1;
        },10);
      }else if(!it.isResource){
        const sk=document.getElementById("cdb-skill");if(sk)sk.value=it.skill;
        const rl=document.getElementById("cdb-reqlv");if(rl)rl.value=it.requiredLevel||1;
        const tm=document.getElementById("cdb-time");if(tm)tm.value=it.craftTimeSeconds||5;
        updateWeaponStatsVisibility();
        if(it.weaponStats){
          const ws=it.weaponStats;
          const sf=(id,v)=>{const el=document.getElementById(id);if(el&&v!=null)el.value=v;};
          sf("ws-quality",ws.quality);sf("ws-tier",ws.tier);sf("ws-range",ws.range);
          sf("ws-dmg-min",ws.dmgMin);sf("ws-dmg-max",ws.dmgMax);
          sf("ws-atkcost",ws.attackCost);sf("ws-durability",ws.durability);
          sf("ws-chop",ws.chopping);sf("ws-mine",ws.mining);sf("ws-mow",ws.mowing);
          sf("ws-mkt-gold",ws.mktGold);sf("ws-mkt-silver",ws.mktSilver);sf("ws-mkt-copper",ws.mktCopper);
          sf("ws-vnd-gold",ws.vndGold);sf("ws-vnd-silver",ws.vndSilver);
          const wt=document.getElementById("ws-weptype");if(wt&&ws.weaponType)wt.value=ws.weaponType;
          if(ws.dirAttacks)Object.entries(ws.dirAttacks).forEach(([dk,da])=>{
            const m=document.querySelector('.ws-dir-mult[data-dir="'+dk+'"]');
            const t=document.querySelector('.ws-dir-type[data-dir="'+dk+'"]');
            const p=document.querySelector('.ws-dir-pen[data-dir="'+dk+'"]');
            if(m&&da.mult!=null)m.value=da.mult;
            if(t&&da.type)t.value=da.type;
            if(p&&da.pen!=null)p.value=da.pen;
          });
        }
      }
      if(it.xpByLevel){Object.entries(it.xpByLevel).forEach(([lv,xp])=>{const inp=document.querySelector(`.cdb-xp[data-level="${lv}"]`);if(inp)inp.value=xp})}
      toast("Loaded for editing");
    },50);
  }));
  document.querySelectorAll(".cdb-del").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();const item=craftItems[parseInt(el.dataset.idx)];if(item&&confirm(`Delete "${item.name}"?`)){craftItems.splice(parseInt(el.dataset.idx),1);saveCraftItems();addLog("Entry Deleted",item.name);render();toast("Deleted!")}}));
  // Filters - apply both type and skill filters
  let _cdbTypeFilter='all';
  const applyFilters=()=>{
    const typeVal=_cdbTypeFilter;
    document.querySelectorAll(".cdb-entry").forEach(el=>{
      const t=el.dataset.type;const s=el.dataset.skill;
      let show=true;
      if(typeVal==='all'){show=true;}
      else if(typeVal==='resource'){show=t==='resource';}
      else if(typeVal==='recipe'){show=t==='recipe';}
      else if(typeVal.startsWith('skill:')){
        const sk=typeVal.slice(6);
        show=t==='craft'&&s===sk;
      }else{show=t===typeVal;}
      el.style.display=show?'grid':'none';
    });
  };
  document.querySelectorAll(".cdb-type-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      _cdbTypeFilter=btn.dataset.val;
      document.querySelectorAll(".cdb-type-btn").forEach(b=>{
        const active=b===btn;
        b.style.background=active?"var(--ac)":"transparent";
        b.style.color=active?"#fff":"var(--tm)";
      });
      applyFilters();
    });
  });
}

          w.appendChild(b);w.appendChild(c);w.appendChild(t);cell.appendChild(w);cbSkillValues['cb_skill__'+key]=0;}

function cbInitSkills(){
  document.querySelectorAll('.cb-skill-btn').forEach(s=>{
    s.addEventListener('click',e=>{e.preventDefault();cbHandleSkillClick(s,'inc')});
    s.addEventListener('contextmenu',e=>{e.preventDefault();cbHandleSkillClick(s,'dec')});
  });
  ['cb_skill__first_aid','cb_skill__reaper','cb_skill__bleeding','cb_skill__shield_bash','cb_skill__bound'].forEach(cbUnlockSkill);
}

function cbHandleSkillClick(skill,action){
  if(skill.classList.contains('cb-locked'))return;
  const max=parseInt(skill.dataset.max);let val=cbSkillValues[skill.id]||0;const hasParents=skill.dataset.parents!=='';
  if(action==='inc'){if(val<max&&cbCountPoints()<100){val=hasParents?val+1:(!cbHasTopSkill()?5:val)}}
  else{if(val>0)val=hasParents?val-1:0}
  cbSkillValues[skill.id]=val;const cnt=document.getElementById('cb_cnt__'+skill.id.replace('cb_skill__',''));if(cnt)cnt.textContent=val+'/'+max;
  cbCheckAll();cbCountPoints();cbSetColors();cbUpdateStats();
}

function cbHasTopSkill(){return cbTopSkills.some(id=>(cbSkillValues[id]||0)>=5)}
function cbCountPoints(){let t=Object.values(cbSkillValues).reduce((a,b)=>a+b,0);const el=document.getElementById('cb-pp');if(el)el.textContent='Progress Points: '+(100-t);return t}
function cbCheckAll(){Object.keys(cbSkillValues).forEach(cbLoopParents)}
function cbLoopParents(skillId){const s=document.getElementById(skillId);if(!s||s.dataset.parents==='')return;const parents=s.dataset.parents.split(','),val=cbSkillValues[skillId]||0;if(val>=5)parents.forEach(p=>cbUnlockSkill('cb_skill__'+p));else parents.forEach(p=>{if(!cbCheckIfValid('cb_skill__'+p))cbLockSkill('cb_skill__'+p)})}
function cbCheckIfValid(skillId){return Object.keys(cbSkillValues).some(sid=>{const s=document.getElementById(sid);return s&&s.dataset.parents.split(',').map(p=>'cb_skill__'+p).includes(skillId)&&(cbSkillValues[sid]||0)>=5})}
function cbUnlockSkill(id){const s=document.getElementById(id);if(s)s.classList.remove('cb-locked')}
function cbLockSkill(id){const s=document.getElementById(id),c=document.getElementById('cb_cnt__'+id.replace('cb_skill__',''));if(!s)return;s.classList.add('cb-locked');s.classList.remove('cb-active','cb-maxed');cbSkillValues[id]=0;if(c){c.textContent='0/'+s.dataset.max;c.classList.remove('cb-active','cb-maxed')}}
function cbSetColors(){Object.keys(cbSkillValues).forEach(id=>{const s=document.getElementById(id),c=document.getElementById('cb_cnt__'+id.replace('cb_skill__',''));if(!s||!c)return;const v=cbSkillValues[id]||0,m=parseInt(s.dataset.max);s.classList.remove('cb-active','cb-maxed');c.classList.remove('cb-active','cb-maxed');if(v>=1&&v<m){s.classList.add('cb-active');c.classList.add('cb-active')}else if(v===m){s.classList.add('cb-maxed');c.classList.add('cb-maxed')}})}
function cbCheckTopSkills(){cbTopSkills=[];Object.keys(cbSkillData).forEach(k=>{if(cbSkillData[k].parents==='')cbTopSkills.push('cb_skill__'+k)})}

function cbHandleAttr(input,action){
  let old=parseInt(input.value),tot=parseInt(document.getElementById('cb-pts-used').textContent);
  let inc=old<150?1:old<200?2:3,dec=old<=150?1:old<=200?2:3;let nv,nt;
  if(action==='inc1'){nv=old+1;nt=tot+inc}else if(action==='inc10'){nv=old+10;nt=tot+inc*10}else if(action==='dec1'){nv=old-1;nt=tot-dec}else{nv=old-10;nt=tot-dec*10}
  if(nv<80||nt<0||nt>535)return;
  if(nv>150&&old<150){nv=150;nt=70}if(nv<150&&old>150){nv=150;nt=70}if(nv>200&&old<200){nv=200;nt=170}if(nv<200&&old>200){nv=200;nt=170}
  input.value=nv;document.getElementById('cb-pts-used').textContent=nt;document.getElementById('cb-pts-left').textContent=535-nt;cbUpdateStats();
}

function cbUpdateStats(){
  const str=parseInt(document.getElementById('cb-strength')?.value)||80;
  const con=parseInt(document.getElementById('cb-constitution')?.value)||80;
  const dex=parseInt(document.getElementById('cb-dexterity')?.value)||80;
  let wed=parseFloat(document.getElementById('cb-wepdmg')?.value)||0;
  let food=Math.min(10,Math.max(0,Math.round(parseFloat(document.getElementById('cb-foodq')?.value)||0)));
  const tough=1+(cbSkillValues['cb_skill__tough_one']||0)/100;
  const wdkm=(cbSkillValues['cb_skill__what_doesnt_kill_me']||0)*2;
  const vet=1+(cbSkillValues['cb_skill__veteran']||0)/50;
  const breath=1+(cbSkillValues['cb_skill__breath_control']||0)/33.33;
  const brute=1+(cbSkillValues['cb_skill__brute']||0)/500;
  const hp=(520+con)*tough*(1+food*0.005);
  const hpr=(3.32262282+con*0.02070354)*(1+wdkm/100)*(1+food*0.025);
  const stam=(400+con*1.2+str*0.6)*vet*(1+food*0.005);
  const stamr=(3.46608507+con*0.05866395+str*0.04599350+dex*0.06979389)*breath*(1+food*0.025);
  const el=id=>document.getElementById(id);
  if(el('cb-health'))el('cb-health').textContent=hp.toFixed(0);
  if(el('cb-hpregen'))el('cb-hpregen').textContent=hpr.toFixed(1)+' /s';
  if(el('cb-hptime'))el('cb-hptime').textContent=(hp/hpr).toFixed(1)+' s';
  if(el('cb-stamina'))el('cb-stamina').textContent=stam.toFixed(0);
  if(el('cb-stamregen'))el('cb-stamregen').textContent=stamr.toFixed(1)+' /s';
  if(el('cb-stamtime'))el('cb-stamtime').textContent=(stam/stamr).toFixed(1)+' s';
  if(el('cb-unarmed'))el('cb-unarmed').textContent=(str*0.2857*brute).toFixed(2);
  if(el('cb-bow'))el('cb-bow').textContent=((wed+str*0.0342+dex*0.2229)*brute).toFixed(2);
  if(el('cb-spear'))el('cb-spear').textContent=((wed+str*0.2857)*brute).toFixed(2);
  if(el('cb-dagger'))el('cb-dagger').textContent=((wed+str*0.0428+dex*0.1571)*brute).toFixed(2);
  if(el('cb-sword1h'))el('cb-sword1h').textContent=((wed+str*0.2286+dex*0.1716)*brute).toFixed(2);
  if(el('cb-sword2h'))el('cb-sword2h').textContent=((wed+str*0.2286+dex*0.1571)*brute).toFixed(2);
  if(el('cb-mace'))el('cb-mace').textContent=((wed+str*0.1714)*brute).toFixed(2);
  if(el('cb-pierce'))el('cb-pierce').textContent='+'+(dex/4).toFixed(2);
  if(el('cb-slash'))el('cb-slash').textContent='+'+(str/4).toFixed(2);
  if(el('cb-blunt'))el('cb-blunt').textContent='+'+(con/4).toFixed(2);
}

function cbResetAll(){cbResetAttr();cbResetSkills()}
function cbResetAttr(){['cb-strength','cb-constitution','cb-dexterity'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=80});document.getElementById('cb-pts-left').textContent='535';document.getElementById('cb-pts-used').textContent='0';const fq=document.getElementById('cb-foodq');if(fq)fq.value='3.00';const wd=document.getElementById('cb-wepdmg');if(wd)wd.value='0.00';cbUpdateStats()}
function cbResetSkills(){Object.keys(cbSkillValues).forEach(cbLockSkill);['cb_skill__first_aid','cb_skill__reaper','cb_skill__bleeding','cb_skill__shield_bash','cb_skill__bound'].forEach(cbUnlockSkill);cbCountPoints();cbSetColors()}

function initCharBuilderBindings(){
  cbGenerateSkillGrid();cbCheckTopSkills();cbInitSkills();cbCountPoints();cbSetColors();cbUpdateStats();
  document.querySelectorAll('.cb-attr-btn').forEach(b=>{b.addEventListener('click',function(){const attr=this.dataset.attr,action=this.dataset.action;const input=document.getElementById('cb-'+attr);if(input)cbHandleAttr(input,action)})});

  document.getElementById('cb-reset-attr')?.addEventListener('click',cbResetAttr);
  document.getElementById('cb-reset-all')?.addEventListener('click',cbResetAll);
  document.getElementById('cb-reset-skills')?.addEventListener('click',cbResetSkills);
}

    h+=`<div class="ns"><div class="nst">Character</div><div class="ni${pg==="cb-builder"||pg==="dashboard"?" a":""}" data-page="cb-builder"><span style="font-size:13px;width:16px;text-align:center">⚔️</span>Builder</div><div class="ni${pg==="cb-food"?" a":""}" data-page="cb-food"><span style="font-size:13px;width:16px;text-align:center">🍖</span>Food & Buffs</div><div class="ni${pg==="cb-armor"?" a":""}" data-page="cb-armor"><span style="font-size:13px;width:16px;text-align:center">🛡️</span>Armor Info</div></div>`;
  } else if(activeTool==="announcements"){
    h+=`<div class="ns"><div class="nst">Announcements</div><div class="ni a" data-page="ann-home"><span style="font-size:13px;width:16px;text-align:center">📢</span>All Posts${annC?`<span class="cnt">${annC}</span>`:""}</div></div>`;
  } else if(activeTool==="map"){
    const markers=D.mapData||[];
    const catCounts={};MAP_CATEGORIES.forEach(c=>catCounts[c.id]=markers.filter(m=>m.category===c.id).length);
    h+=`<div class="ns"><div class="nst">Map</div><div class="ni a" data-page="map-home"><span style="font-size:13px;width:16px;text-align:center">🗺️</span>View Map</div></div>`;
    h+=`<div class="ns"><div class="nst" style="display:flex;justify-content:space-between;align-items:center">Legend<button class="map-leg-toggle" id="map-toggle-all" title="Toggle All">👁️</button></div>`;
    MAP_CATEGORIES.forEach(c=>{
      const count=catCounts[c.id]||0;
      const hidden=mapState.hiddenCats[c.id];
      h+=`<div class="map-leg-row${hidden?" off":""}" data-cat="${c.id}">`;
      h+=`<span class="map-leg-icon" style="background:${c.color}">${c.icon}</span>`;
      h+=`<span class="map-leg-name">${c.name}</span>`;
      h+=`<span class="map-leg-count">${count}</span>`;
      h+=`</div>`;
    });
    h+=`</div>`;
  } else if(activeTool==="itemsearch"){
    const cityCount=D.cities.length,vendorCount=D.vendors.length,itemCount=D.vendorItems.length;
    h+=`<div class="ns"><div class="nst">Item Search</div>`;
    h+=`<div class="ni${pg==="shop-search"||pg==="dashboard"?" a":""}" data-page="shop-search"><span style="font-size:13px;width:16px;text-align:center">🔍</span>Search${itemCount?`<span class="cnt">${itemCount}</span>`:""}</div>`;
    h+=`</div>`;
    if(isContributor()){
      h+=`<div class="ns"><div class="nst">System</div>`;
      h+=`<div class="ni${pg==="shop-cities"?" a":""}" data-page="shop-cities"><span style="font-size:13px;width:16px;text-align:center">🏘️</span>Shop Entries${cityCount?`<span class="cnt">${cityCount}</span>`:""}</div>`;
      h+=`</div>`;
    }
  } else if(activeTool==="wiki"){
    h+=`<div class="ns"><div class="nst">Wiki</div><div class="ni a" data-page="wiki-home"><span style="font-size:13px;width:16px;text-align:center">📖</span>Articles</div></div>`;
  }
  h+=`</div>`;
  // Settings footer - visible on all tools for admins
  if(isAdmin()){
    h+=`<div style="padding:6px 10px;border-top:1px solid var(--bd)"><div class="ni${pg==="settings"&&activeTool==="treasury"?" a":""}" id="global-settings-btn" style="font-size:11px"><span style="font-size:13px;width:16px;text-align:center">⚙</span>Settings</div></div>`;
  }
  sb.innerHTML=h;
}

function render(){
  // Guest mode: allow browsing public tools without login
  // Guild Manager always requires login
  if(!currentUser){
    if(activeTool==="treasury"){
      // Guild Manager requires login
      renderGuest();return;
    }
    // All other tools: render in guest mode
    renderGuest();return;
  }
  // Set currentGuildId FIRST before any other logic
  if(!isSiteAdmin()&&currentUser.guildId)currentGuildId=currentUser.guildId;
  if(isSiteAdmin()&&!currentGuildId&&D.guilds.length)currentGuildId=D.guilds[0].id;
  rebuildG();
  // Check if user needs to change temp password
  if(currentUser.tempPassword){
    document.getElementById("root").innerHTML=`<div id="app"><div id="sidebar"></div><div id="main"></div></div>`;
    document.getElementById("mob-toggle").style.display="";
    renderSidebar();
    document.getElementById("main").innerHTML=`<div style="display:flex;align-items:center;justify-content:center;min-height:60vh"><div class="card" style="max-width:400px;text-align:center"><div style="font-size:48px;margin-bottom:12px">🔐</div><div style="font-size:16px;font-weight:600;margin-bottom:8px">Password Change Required</div><div style="font-size:13px;color:var(--tm);margin-bottom:16px">Your account was created with a temporary password. Please set a new password to continue.</div><button class="btn bp" id="force-change-pw">Set New Password</button></div></div>`;
    document.getElementById("force-change-pw")?.addEventListener("click",()=>modalForceChangePassword());
    return;
  }
  // Redirect non-admins away from admin-only pages
  const memberPages=["gold-request","events","orders","requests","leaderboards","settings"];
  if(!currentGuildId&&!isSiteAdmin()&&currentUser?.role!=="guild_leader"){
    // Regular member with no guild - show pending/join screen
    renderNoPendingGuild();return;
  }
  if(!isAdmin()&&activeTool==="treasury"&&!memberPages.includes(pg)){
    pg="gold-request";
  }
  document.getElementById("root").innerHTML=`<div id="app"><div id="sidebar"></div><div id="main"></div></div>`;
  document.getElementById("mob-toggle").style.display="";
  renderSidebar();
  const m=document.getElementById("main");F.s="";
  if(activeTool==="treasury"){
    const pages={dashboard:tDash,players:tPlayers,"player-detail":tPlayerDetail,gold:tGold,itemtx:tItemTx,bank:tBank,events:tEvents,orders:tOrders,requests:tRequests,leaderboards:tLeaderboards,activity:tActivity,audit:tAudit,settings:tSettings,"gold-request":tGoldRequest,"gold-request-manage":tGoldRequestManage};
    // For non-admins, restrict to allowed pages
    if(!isAdmin()&&!memberPages.includes(pg)){
      m.innerHTML=tGoldRequest();
    } else {
      m.innerHTML=(pages[pg]||tGoldRequest)();
    }
  } else if(activeTool==="crafting"){
    if(!toolEnabled('crafting')){
      m.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;min-height:60vh"><div class="card" style="max-width:420px;text-align:center;padding:40px 32px"><div style="font-size:52px;margin-bottom:16px">⚒️</div><div style="font-size:20px;font-weight:700;margin-bottom:10px">Crafting Tools</div><div style="font-size:14px;color:var(--ac);font-weight:600;margin-bottom:12px">Coming Soon</div><div style="font-size:13px;color:var(--tm);line-height:1.7">The crafting calculator, resource calculator, XP tables, and item database are currently in development and will be available in a future update.</div></div></div>`;
    } else {
      // Redirect non-contributors/admins away from system pages
      if(!isContributor()&&(pg==="craft-items"||pg==="craft-xp-editor"||pg==="player-xp-editor")){
        pg="craft-calc";
      }
      const cpg={"craft-calc":pgCraftCalc,"craft-res-calc":pgCraftResCalc,"craft-xp-editor":pgCraftXpEditor,"player-xp-editor":pgPlayerXpEditor,"craft-items":pgCraftItemDB};
      m.innerHTML=(cpg[pg]||pgCraftCalc)();
      initCraftBindings();
      if(pg==="craft-xp-editor")initCraftXpEditorBindings();
      if(pg==="player-xp-editor")initPlayerXpEditorBindings();
    }
  } else if(activeTool==="charbuilder"){
    const cbpg={"cb-builder":pgCharBuilder,"cb-food":pgCharFood,"cb-armor":pgCharArmor};
    m.innerHTML=(cbpg[pg]||pgCharBuilder)();
    initCharBuilderBindings();
  } else if(activeTool==="announcements"){
    m.innerHTML=pgAnnouncements();
  } else if(activeTool==="map"){
    mapState.addingMarker=false;
    mapState.dragging=false;
    mapNewCoords=null;
    m.innerHTML=pgMap();
    initMapBindings();
  } else if(activeTool==="itemsearch"){
    if(pg==="dashboard")pg="shop-search";
    const spg={"shop-search":pgShopSearch,"shop-cities":pgShopCities};
    m.innerHTML=(spg[pg]||pgShopSearch)();
    initShopBindings();
  } else if(activeTool==="wiki"){
    m.innerHTML=pgWiki();
  }
  bindAll();
}

function bindAll(){

  // Logout
  document.getElementById("logout-btn")?.addEventListener("click",()=>{currentUser=null;render()});
  document.getElementById("global-settings-btn")?.addEventListener("click",()=>{activeTool="treasury";pg="settings";render();});
  // Nav
  document.querySelectorAll("[data-page]:not([data-bound])").forEach(el=>{el.setAttribute("data-bound","1");el.addEventListener("click",()=>{pg=el.dataset.page;render()})});
  document.querySelectorAll(".plink:not([data-bound])").forEach(el=>{el.setAttribute("data-bound","1");el.addEventListener("click",e=>{e.stopPropagation();selP=el.dataset.pid;pg="player-detail";F.dTab="gold";activeTool="treasury";render()})});
  document.getElementById("back-btn")?.addEventListener("click",()=>{pg="players";render()});

  document.getElementById("mob-toggle")?.addEventListener("click",()=>{sOpen=!sOpen;document.getElementById("sidebar")?.classList.toggle("hide",!sOpen)});

  // Filters
