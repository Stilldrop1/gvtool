  bS("frank","rank");bS("fstat","status");bS("fgttype","gtType");bS("fittype","itType");bS("finvcat","invCat");bS("factf","actF");bS("fevf","evF");bS("fordf","ordF");bS("freqf","reqF");bS("fannf","annF");bS("fgoldreqf","goldReqF");

  // Search
  ["psearch","gsearch","isearch"].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener("input",()=>{F.s=el.value;document.getElementById("main").innerHTML=(pg==="players"?tPlayers:pg==="gold"?tGold:tItemTx)();bindAll();document.getElementById(id)?.focus()})});

  // Add buttons (admin only)
  const ab=(id,fn)=>{document.getElementById(id)?.addEventListener("click",fn)};
  ab("add-player-btn",()=>modalPlayer());ab("add-player-btn2",()=>modalPlayer());ab("empty-add-player",()=>{pg="players";render();setTimeout(()=>modalPlayer(),50)});
  ab("add-gold-btn",()=>modalGoldTx());ab("add-gold-btn2",()=>modalGoldTx());
  ab("add-item-btn",()=>modalItemTx());ab("add-item-btn2",()=>modalItemTx());
  ab("add-event-btn",()=>modalEvent());ab("add-event-btn2",()=>modalEvent());
  ab("add-order-btn",()=>modalOrder());ab("add-order-btn2",()=>modalOrder());
  ab("add-req-btn",()=>modalRequest());ab("add-req-btn2",()=>modalRequest());
  ab("add-ann-btn",()=>modalAnnouncement());ab("add-ann-btn2",()=>modalAnnouncement());
  ab("add-user-btn",()=>modalUser());

  // Edit/Delete (admin gated inside modals)
  document.querySelectorAll(".edit-p").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();modalPlayer(G.p.find(x=>x.id===el.dataset.id))}));
  document.querySelectorAll(".del-p").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();const p=G.p.find(x=>x.id===el.dataset.id);if(p)confirmAction(`Delete ${p.name}?`,()=>{D.gt=D.gt.filter(t=>t.playerId!==p.id);D.it=D.it.filter(t=>t.playerId!==p.id);D.gear=D.gear.filter(g=>g.playerId!==p.id);delete D.playerRecipes[p.id];D.p=D.p.filter(x=>x.id!==p.id);addLog("Deleted",p.name);persist();if(pg==="player-detail")pg="players";render();toast("Deleted!")})}));
  document.querySelectorAll(".edit-gt").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();modalGoldTx(G.gt.find(x=>x.id===el.dataset.id))}));
  document.querySelectorAll(".del-gt").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();confirmAction("Delete?",()=>{D.gt=D.gt.filter(x=>x.id!==el.dataset.id);persist();render();toast("Deleted!")})}));
  document.querySelectorAll(".edit-it").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();modalItemTx(G.it.find(x=>x.id===el.dataset.id))}));
  document.querySelectorAll(".del-it").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();confirmAction("Delete?",()=>{D.it=D.it.filter(x=>x.id!==el.dataset.id);persist();render();toast("Deleted!")})}));
  document.querySelectorAll(".edit-ev").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();modalEvent(G.events.find(x=>x.id===el.dataset.id))}));
  document.querySelectorAll(".del-ev").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();confirmAction("Delete event?",()=>{D.events=D.events.filter(x=>x.id!==el.dataset.id);persist();render();toast("Deleted!")})}));
  document.querySelectorAll(".rsvp-ev").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();modalRSVP(el.dataset.id)}));
  document.querySelectorAll(".edit-ord").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();modalOrder(G.orders.find(x=>x.id===el.dataset.id))}));
  document.querySelectorAll(".complete-ord").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();const o=G.orders.find(x=>x.id===el.dataset.id);if(o){o.status="Complete";addLog("Order Done",o.itemName);persist();render();toast("Complete!")}}));
  document.querySelectorAll(".del-ord").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();confirmAction("Delete?",()=>{D.orders=D.orders.filter(x=>x.id!==el.dataset.id);persist();render();toast("Deleted!")})}));
  document.querySelectorAll(".edit-req").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();modalRequest(G.requests.find(x=>x.id===el.dataset.id))}));
  document.querySelectorAll(".fulfill-req").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();const r=G.requests.find(x=>x.id===el.dataset.id);if(r){r.status="Fulfilled";addLog("Fulfilled",r.itemName);persist();render();toast("Fulfilled!")}}));
  document.querySelectorAll(".del-req").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();confirmAction("Delete?",()=>{D.requests=D.requests.filter(x=>x.id!==el.dataset.id);persist();render();toast("Deleted!")})}));
  // Announcements
  document.querySelectorAll(".edit-ann").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();modalAnnouncement(G.announcements.find(x=>x.id===el.dataset.id))}));
  document.querySelectorAll(".del-ann").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();confirmAction("Delete announcement?",()=>{D.announcements=D.announcements.filter(x=>x.id!==el.dataset.id);persist();render();toast("Deleted!")})}));
  document.querySelectorAll(".pin-ann").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();const a=G.announcements.find(x=>x.id===el.dataset.id);if(a){a.pinned=!a.pinned;persist();render()}}));
  // Player detail
  document.getElementById("toggle-status")?.addEventListener("click",()=>{const p=G.p.find(x=>x.id===selP);if(p){p.status=p.status==="Active"?"Inactive":"Active";addLog("Status",p.name+" → "+p.status);persist();render()}});
  document.getElementById("forgive-debt")?.addEventListener("click",()=>{const p=G.p.find(x=>x.id===selP);if(p){const gs=pGold(p.id);if(gs.debt>0)confirmAction(`Forgive ${fmt(gs.debt)}g?`,()=>{D.gt.push({id:uid(),playerId:p.id,date:new Date().toISOString().slice(0,10),amount:gs.debt,type:"Repay Gold",notes:"Debt forgiven",guildId:currentGuildId});addLog("Debt Forgiven",p.name);persist();render();toast("Forgiven!")})}});
  // Gear assignments
  ab("assign-gear-btn",()=>{if(selP)modalGear(null,selP)});
  document.querySelectorAll(".edit-gear").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();const g=G.gear.find(x=>x.id===el.dataset.id);if(g)modalGear(g,g.playerId)}));
  document.querySelectorAll(".del-gear").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();confirmAction("Remove this gear assignment?",()=>{const g=G.gear.find(x=>x.id===el.dataset.id);D.gear=D.gear.filter(x=>x.id!==el.dataset.id);if(g)addLog("Gear Removed",g.itemName);persist();render();toast("Removed!")})}));
  // Recipe checklist toggles
  document.querySelectorAll(".recipe-editable").forEach(lbl=>{
    lbl.addEventListener("click",e=>{
      e.preventDefault();
      const recipeId=String(lbl.dataset.recipeId);
      const playerId=lbl.dataset.playerId;
      if(!D.playerRecipes[playerId])D.playerRecipes[playerId]=[];
      const arr=D.playerRecipes[playerId].map(String);
      const idx=arr.indexOf(recipeId);
      if(idx>=0)D.playerRecipes[playerId].splice(idx,1);
      else D.playerRecipes[playerId].push(recipeId);
      persist();
      // Fast DOM update without full re-render
      const cb=lbl.querySelector("input[type=checkbox]");
      const nameEl=lbl.querySelector("span");
      const known=idx<0;
      if(cb)cb.checked=known;
      lbl.style.background=known?"var(--grnd)":"var(--bgi)";
      lbl.style.borderColor=known?"var(--grn)":"var(--bd)";
      if(nameEl){nameEl.style.fontWeight=known?"600":"400";nameEl.style.color=known?"var(--grn)":"var(--t2)";}
      // Update the tab count and progress bar without full re-render
      const allRecipes=craftItems.filter(i=>i.isRecipe);
      const knownCount=(D.playerRecipes[playerId]||[]).length;
      const pct=allRecipes.length?Math.round(knownCount/allRecipes.length*100):0;
      const pf=document.querySelector(".pf");if(pf){pf.style.width=pct+"%";pf.style.background=pct===100?"var(--grn)":"var(--ac)";}
      const progLabel=document.querySelector(".card .pf")?.closest(".card")?.querySelector("span");
      document.querySelectorAll(".tb .ti").forEach(ti=>{if(ti.dataset.tab==="recipes")ti.textContent=`Recipes (${knownCount}/${allRecipes.length})`});
      // Update skill group counters
      document.querySelectorAll("[data-skill-group]").forEach(grp=>{
        const sk=grp.dataset.skillGroup;
        const items=grp.querySelectorAll(".recipe-item");
        const kn=grp.querySelectorAll("input:checked").length;
        const tot=items.length;
        const counter=grp.querySelector("span[style*='color:var(--tm)']");
        if(counter)counter.textContent=`${kn}/${tot}`;
      });
    });
  });
  // Recipe search button - navigate to item search with query pre-filled
  document.querySelectorAll(".recipe-search-btn").forEach(btn=>{
    btn.addEventListener("click",e=>{
      e.stopPropagation();
      window._shopSearchQ=btn.dataset.name;
      window._shopCityFilter="all";
      activeTool="itemsearch";
      pg="shop-search";
      render();
    });
  });
  // Recipe bank button - open a material request modal pre-filled
  document.querySelectorAll(".recipe-bank-btn").forEach(btn=>{
    btn.addEventListener("click",e=>{
      e.stopPropagation();
      const itemName=btn.dataset.name;
      const playerId=btn.dataset.playerId;
      const player=G.p.find(x=>x.id===playerId);
      // Pre-fill and open a request modal
      openModal("Request from Guild Bank",body=>{
        body.innerHTML=`
          <div style="padding:10px;background:var(--grnd);border:1px solid rgba(86,211,100,.25);border-radius:4px;margin-bottom:14px;font-size:12px;color:var(--grn)">
            📦 This item is currently in stock in the guild bank.
          </div>
          <div class="fg"><label class="fl">Item</label><input class="inp" id="mf-item" value="${itemName}" readonly></div>
          <div class="fg"><label class="fl">Requested By</label><select class="inp" id="mf-player">
            ${G.p.map(p=>`<option value="${p.id}"${p.id===playerId?" selected":""}>${p.name}</option>`).join("")}
          </select></div>
          <div class="fg"><label class="fl">Qty</label><input class="inp" type="number" id="mf-qty" value="1" min="1"></div>
          <div class="fg"><label class="fl">Priority</label><select class="inp" id="mf-pri">
            ${["Low","Medium","High"].map(o=>`<option${o==="Medium"?" selected":""}>${o}</option>`).join("")}
          </select></div>
          <div class="fg"><label class="fl">Notes</label><input class="inp" id="mf-notes" value="Recipe request" placeholder="Notes..."></div>
          <div class="actions" style="margin-top:14px">
            <button class="btn bg" onclick="closeModal()">Cancel</button>
            <button class="btn bp" id="mf-req-save">Submit Request</button>
          </div>`;
        setTimeout(()=>document.getElementById("mf-req-save")?.addEventListener("click",()=>{
          const reqPlayer=document.getElementById("mf-player")?.value;
          const reqItem=document.getElementById("mf-item")?.value.trim();
          const qty=parseInt(document.getElementById("mf-qty")?.value)||1;
          const priority=document.getElementById("mf-pri")?.value||"Medium";
          const notes=document.getElementById("mf-notes")?.value.trim();
          if(!reqPlayer||!reqItem){toast("Player and item required","error");return}
          D.requests.push({id:uid(),playerId:reqPlayer,itemName:reqItem,qty,priority,notes,status:"Open",date:new Date().toISOString().slice(0,10),guildId:currentGuildId});
          addLog("Request Created",reqItem);
          persist();closeModal();render();toast("Request submitted!");
        }),0);
      });
    });
  });
  // Recipe filter buttons
  document.querySelectorAll(".recipe-filter-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      document.querySelectorAll(".recipe-filter-btn").forEach(b=>{b.style.background="transparent";b.style.color="var(--tm)";});
      btn.style.background="var(--ac)";btn.style.color="#fff";
      const filter=btn.dataset.filter;
      document.querySelectorAll(".recipe-item").forEach(item=>{
        const known=item.querySelector("input")?.checked;
        if(filter==="all")item.style.display="";
        else if(filter==="known")item.style.display=known?"":"none";
        else item.style.display=known?"none":"";
      });
      // Hide empty skill groups
      document.querySelectorAll("[data-skill-group]").forEach(grp=>{
        const visible=Array.from(grp.querySelectorAll(".recipe-item")).some(i=>i.style.display!=="none");
        grp.style.display=visible?"":"none";
      });
    });
  });
  // Users
  document.querySelectorAll(".edit-user").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();modalUser(D.users.find(x=>x.id===el.dataset.id))}));
  // Approve pending application
  document.querySelectorAll(".approve-user").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    const u=D.users.find(x=>x.id===el.dataset.id);
    if(u){u.status="active";addLog("User Approved",u.displayName);persist();render();toast(u.displayName+" approved!");}
  }));
  // Deny pending application
  document.querySelectorAll(".deny-user").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    confirmAction("Deny and remove this application?",()=>{
      D.users=D.users.filter(x=>x.id!==el.dataset.id);
      persist();render();toast("Application denied.");
    });
  }));
  // Tool availability toggles (site admin)
  document.querySelectorAll(".tool-avail-toggle").forEach(el=>{
    el.addEventListener("change",e=>{
      e.stopPropagation();
      const tool=el.dataset.toolKey;
      if(!D.toolStatus)D.toolStatus={};
      D.toolStatus[tool]=el.checked;
      persist();render();
      toast((el.checked?"Enabled":"Disabled")+" "+TOOLS.find(t=>t.k===tool)?.l);
    });
    // Also stop click from bubbling to the nav
    el.addEventListener("click",e=>e.stopPropagation());
  });
  // Site admin guild switcher
  document.querySelectorAll(".switch-guild-btn").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    currentGuildId=el.dataset.gid;
    rebuildG();pg="dashboard";render();toast("Switched to "+D.guilds.find(g=>g.id===currentGuildId)?.name);
  }));
  // Gold Requests
  ab("gr-submit",()=>{
    const amount=parseInt(document.getElementById("gr-amount")?.value,10);
    const reason=document.getElementById("gr-reason")?.value.trim();
    if(!amount||amount<=0||isNaN(amount)){toast("Enter a valid amount","error");return}
    if(!reason){toast("Please provide a reason","error");return}
    D.goldRequests.push({id:uid(),requesterId:currentUser.id,amount,reason,status:"Pending",date:new Date().toISOString().slice(0,10),guildId:currentGuildId});
    addLog("Gold Request",`${currentUser.displayName} requested ${amount}g`);
    persist();render();toast("Request submitted!");
  });
  document.querySelectorAll(".claim-gr").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    const r=G.goldRequests.find(x=>x.id===el.dataset.id);
    if(r){r.status="Claimed";r.claimedBy=currentUser.displayName;addLog("Gold Request Claimed",`${r.amount}g for ${D.users.find(u=>u.id===r.requesterId)?.displayName||"Unknown"}`);persist();render();toast("Claimed!")}
  }));
  document.querySelectorAll(".complete-gr").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    const r=G.goldRequests.find(x=>x.id===el.dataset.id);
    if(r){
      // Find the player linked to the requester
      const requester=D.users.find(u=>u.id===r.requesterId);
      const player=G.p.find(p=>
        p.name.toLowerCase()===requester?.displayName?.toLowerCase()||
        p.name.toLowerCase()===requester?.username?.toLowerCase()||
        (requester?.discord&&p.discord&&p.discord.toLowerCase()===requester.discord.toLowerCase())
      );
      
      if(!player){
        toast("No matching member found for this user. Create a member first.","error");
        return;
      }
      
      // Create the borrow transaction automatically
      D.gt.push({
        id:uid(),
        playerId:player.id,
        date:new Date().toISOString().slice(0,10),
        amount:r.amount,
        type:"Borrow Gold",
        notes:`Gold request #${r.id.slice(-4)} fulfilled by ${currentUser.displayName}`,
        guildId:currentGuildId
      });
      
      // Mark the request as completed
      r.status="Completed";
      r.completedDate=new Date().toISOString().slice(0,10);
      addLog("Gold Request Completed",`${r.amount}g for ${requester?.displayName||"Unknown"} (auto-logged as borrow)`);
      persist();render();toast("Completed & logged to ledger!");
    }
  }));
  document.querySelectorAll(".del-gr").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    confirmAction("Delete this request?",()=>{D.goldRequests=D.goldRequests.filter(x=>x.id!==el.dataset.id);persist();render();toast("Deleted!")});
  }));
  // CSV
  ab("csv-players",()=>{exportCSV([["Name","Discord","Rank","Tags","Debt","Status"],...G.p.map(p=>{const gs=pGold(p.id);return[p.name,p.discord,p.rank,(p.tags||[]).join("; "),gs.debt,p.status]})],"members.csv")});
  ab("csv-gold",()=>{exportCSV([["Date","Player","Type","Amount","Notes"],...G.gt.sort((a,b)=>b.date.localeCompare(a.date)).map(t=>[t.date,pN(t.playerId),t.type,t.amount,t.notes||""])],"gold.csv")});
  ab("csv-items",()=>{exportCSV([["Date","Player","Item","Type","Qty","Notes"],...G.it.sort((a,b)=>b.date.localeCompare(a.date)).map(t=>[t.date,pN(t.playerId),iN(t.itemId),t.type,t.qty,t.notes||""])],"items.csv")});
  // Settings
  ab("save-name",()=>{const g=D.guilds.find(x=>x.id===currentGuildId);if(g){g.cfg=g.cfg||{...DEFAULT_CFG};g.cfg.guildName=document.getElementById("cfg-name").value.trim()||"My Guild";}persist();render();toast("Saved!")});
  ab("add-tag",()=>{const v=document.getElementById("cfg-tag").value.trim();const g=D.guilds.find(x=>x.id===currentGuildId);if(g&&v&&!currentGuildCfg().tags.includes(v)){g.cfg=g.cfg||{...DEFAULT_CFG};g.cfg.tags.push(v);persist();render();toast("Added!")}});
  ab("change-pw-btn",()=>modalChangePassword());
  ab("export-btn",exportJSON);ab("import-btn",()=>document.getElementById("import-file")?.click());
  document.getElementById("import-file")?.addEventListener("change",e=>{if(e.target.files[0])importJSON(e.target.files[0])});
  ab("reset-btn",()=>confirmAction("Delete guild data? This will remove all members, gold, items and logs for this guild.",()=>{
  const gid=currentGuildId;
  D.p=D.p.filter(x=>x.guildId!==gid);
  D.gt=D.gt.filter(x=>x.guildId!==gid);
  D.it=D.it.filter(x=>x.guildId!==gid);
  D.items=D.items.filter(x=>x.guildId!==gid);
  D.log=D.log.filter(x=>x.guildId!==gid);
  D.events=D.events.filter(x=>x.guildId!==gid);
  D.orders=D.orders.filter(x=>x.guildId!==gid);
  D.requests=D.requests.filter(x=>x.guildId!==gid);
  D.announcements=D.announcements.filter(x=>x.guildId!==gid);
  D.gear=D.gear.filter(x=>x.guildId!==gid);
  D.goldRequests=D.goldRequests.filter(x=>x.guildId!==gid);
  const g=D.guilds.find(x=>x.id===gid);if(g)g.cfg={...DEFAULT_CFG,guildName:g.name};
  persist();pg="dashboard";render();toast("Guild data cleared!");
}));
  ab("clear-log",()=>confirmAction("Clear log?",()=>{D.log=D.log.filter(x=>x.guildId!==currentGuildId);persist();render();toast("Cleared!")}));
}

// ═══════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════
render();
</script>
</body>
</html>
